<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>دراكو - الطيار</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: #F7F7F7; color: #1A1A1A; max-width: 430px; margin: auto; height: 100%; overflow: hidden; }
    :root { --brand: #E8180E; --brand-dark: #B80F09; --brand-glow: rgba(232,24,14,0.18); --bg: #F7F7F7; --card: #FFFFFF; --text: #1A1A1A; --text-muted: #7A7A7A; --border: #EBEBEB; --radius: 18px; }
    .app-container { display: flex; flex-direction: column; height: 100vh; }
    .auth-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--bg); }
    .auth-wrapper.hide { display: none; }
    .auth-card { background: white; border-radius: 24px; padding: 32px 24px; width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; }
    .auth-card h1 { font-size: 32px; font-weight: 900; color: var(--brand); margin-bottom: 6px; }
    .auth-card p { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }
    .field-group { margin-bottom: 16px; text-align: right; }
    .field-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; }
    .field-wrap { position: relative; }
    .field-wrap input { width: 100%; height: 52px; background: #F9F9F9; border: 1px solid var(--border); border-radius: 12px; padding: 0 48px 0 16px; font-size: 15px; outline: none; }
    .field-wrap input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-glow); }
    .field-icon { position: absolute; top: 50%; right: 14px; transform: translateY(-50%); font-size: 18px; color: var(--text-muted); }
    .btn { width: 100%; height: 52px; background: var(--brand); border: none; border-radius: 14px; color: white; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn:hover { background: var(--brand-dark); }
    .error-msg { color: #F44336; font-size: 13px; margin-top: 8px; display: none; }

    .main-app { display: none; flex-direction: column; height: 100%; }
    .main-app.active { display: flex; }
    .header { padding: 16px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .header h2 { font-size: 20px; }
    .icon-btn { background: #F5F5F5; border: none; width: 40px; height: 40px; border-radius: 12px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .tabs { display: flex; padding: 12px 16px; background: white; gap: 8px; border-bottom: 1px solid var(--border); }
    .tab { padding: 8px 16px; border-radius: 20px; background: #F5F5F5; font-size: 14px; font-weight: 600; cursor: pointer; }
    .tab.active { background: var(--brand); color: white; }
    .content { flex: 1; overflow-y: auto; padding: 16px; }
    .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .order-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .order-details { flex: 1; }
    .order-details h4 { font-size: 16px; margin-bottom: 4px; }
    .order-details p { color: #888; font-size: 13px; }
    .btn-sm { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }
    .btn-accept { background: var(--brand); color: white; }
    .btn-status { background: #E3F2FD; color: #1565C0; }
    .btn-success { background: #E8F5E9; color: #2E7D32; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .badge-ready { background: #FFF3E0; color: #E65100; }
    .badge-otw { background: #E3F2FD; color: #0D47A1; }
    .badge-delivered { background: #E8F5E9; color: #1B5E20; }
    .stat-row { display: flex; justify-content: space-between; padding: 8px 0; }
    .stat-label { color: #888; }
    .stat-value { font-weight: bold; }
    .toggle-switch { position: relative; width: 52px; height: 28px; background: #ccc; border-radius: 28px; cursor: pointer; transition: 0.3s; }
    .toggle-switch.active { background: #4CAF50; }
    .toggle-switch::after { content: ''; position: absolute; top: 3px; right: 3px; width: 22px; height: 22px; background: white; border-radius: 50%; transition: 0.3s; }
    .toggle-switch.active::after { right: 27px; }
    .empty { text-align: center; color: #888; margin-top: 40px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A1A1A; color: white; padding: 12px 24px; border-radius: 100px; z-index: 9999; transition: 0.35s; opacity: 0; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
<div class="app-container">
  <!-- شاشة تسجيل الدخول -->
  <div class="auth-wrapper" id="authWrapper">
    <div class="auth-card">
      <div style="font-size: 48px; margin-bottom: 8px;">🛵</div>
      <h1>Drako Driver</h1>
      <p>سجّل دخولك لبدء استلام الطلبات</p>
      <div class="field-group">
        <label class="field-label">رقم الهاتف</label>
        <div class="field-wrap">
          <span class="field-icon">📱</span>
          <input type="tel" id="driverPhone" placeholder="01xxxxxxxxx">
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">كلمة المرور</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input type="password" id="driverPass" placeholder="••••••••">
        </div>
      </div>
      <button class="btn" onclick="driverLogin()">دخول</button>
      <div class="error-msg" id="loginError">رقم الهاتف أو كلمة المرور غير صحيحة</div>
    </div>
  </div>

  <!-- الواجهة الرئيسية -->
  <div class="main-app" id="mainApp">
    <div class="header">
      <h2 id="headerTitle">الرئيسية</h2>
      <button class="icon-btn" onclick="logout()">🚪</button>
    </div>
    <div class="tabs" id="mainTabs">
      <div class="tab active" data-tab="available" onclick="switchTab('available')">🆕 طلبات متاحة</div>
      <div class="tab" data-tab="active" onclick="switchTab('active')">📋 طلباتي النشطة</div>
      <div class="tab" data-tab="history" onclick="switchTab('history')">📜 السجل</div>
      <div class="tab" data-tab="account" onclick="switchTab('account')">👤 حسابي</div>
    </div>
    <div class="content" id="tabContent"></div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const API = '/api';
let currentDriver = null;
let socket = null;
let currentTab = 'available';

// ========== Helper Functions ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ========== Auth ==========
async function driverLogin() {
  const phone = document.getElementById('driverPhone').value.trim();
  const password = document.getElementById('driverPass').value;
  if (!phone || !password) return showToast('⚠️ أكمل البيانات');
  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password })
    });
    const data = await res.json();
    if (data.error) {
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    // التحقق من أن الدور DRIVER
    if (data.user.role !== 'DRIVER') {
      showToast('❌ هذا الحساب ليس طياراً');
      return;
    }
    currentDriver = data.user;
    document.getElementById('authWrapper').classList.add('hide');
    document.getElementById('mainApp').classList.add('active');
    initSocket();
    switchTab('available');
  } catch (e) {
    showToast('❌ فشل الاتصال');
  }
}

function logout() {
  if (socket) socket.disconnect();
  fetch('/logout');
  currentDriver = null;
  document.getElementById('mainApp').classList.remove('active');
  document.getElementById('authWrapper').classList.remove('hide');
  document.getElementById('driverPhone').value = '';
  document.getElementById('driverPass').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// ========== Socket ==========
function initSocket() {
  if (socket) return;
  socket = io();
  socket.on('orderStatusUpdate', (data) => {
    if (currentTab === 'active' || currentTab === 'available') {
      loadCurrentTab();
    }
  });
  socket.on('driver:newJob', (data) => {
    showToast(`🆕 يوجد ${data.count} طلب جديد جاهز`);
    if (currentTab === 'available') loadCurrentTab();
  });
}

// ========== Tab Navigation ==========
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`#mainTabs .tab[data-tab="${tab}"]`).classList.add('active');
  const titles = { available: 'الطلبات المتاحة', active: 'طلباتي النشطة', history: 'السجل', account: 'حسابي' };
  document.getElementById('headerTitle').textContent = titles[tab] || '';
  loadCurrentTab();
}

function loadCurrentTab() {
  switch (currentTab) {
    case 'available': loadAvailableOrders(); break;
    case 'active': loadMyActiveOrders(); break;
    case 'history': loadHistory(); break;
    case 'account': loadAccount(); break;
  }
}

// ========== Available Orders ==========
async function loadAvailableOrders() {
  const container = document.getElementById('tabContent');
  try {
    const res = await fetch(API + '/driver/available-orders', { credentials: 'include' });
    if (res.status === 401) { logout(); return; }
    const orders = await res.json();
    if (!orders.length) {
      container.innerHTML = '<div class="empty">🎉 لا توجد طلبات متاحة حالياً</div>';
      return;
    }
    container.innerHTML = orders.map(order => `
      <div class="card">
        <div class="card-header">
          <strong>#${order.id.slice(-6)}</strong>
          <span class="badge badge-ready">جاهز</span>
        </div>
        <p><strong>المطعم:</strong> ${order.restaurantName || '—'}</p>
        <p><strong>العنوان:</strong> ${order.customerAddress || order.address || '—'}</p>
        <p><strong>العميل:</strong> ${order.customerName}</p>
        <p><strong>الإجمالي:</strong> ${order.total} ج</p>
        <button class="btn-sm btn-accept" style="width:100%; margin-top:12px;" onclick="acceptOrder('${order.id}')">🚀 استلام الطلب</button>
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = '<div class="empty">⚠️ خطأ في التحميل</div>';
  }
}

async function acceptOrder(orderId) {
  try {
    const res = await fetch(API + '/driver/orders/' + orderId + '/accept', {
      method: 'PATCH',
      credentials: 'include'
    });
    if (!res.ok) {
      const err = await res.json();
      showToast('❌ ' + (err.error || 'فشل الاستلام'));
      return;
    }
    showToast('✅ تم استلام الطلب');
    switchTab('active');
  } catch (e) {
    showToast('❌ فشل الاتصال');
  }
}

// ========== My Active Orders ==========
async function loadMyActiveOrders() {
  const container = document.getElementById('tabContent');
  try {
    const res = await fetch(API + '/driver/my-orders', { credentials: 'include' });
    if (res.status === 401) { logout(); return; }
    const orders = await res.json();
    if (!orders.length) {
      container.innerHTML = '<div class="empty">📭 لا توجد طلبات نشطة</div>';
      return;
    }
    container.innerHTML = orders.map(order => `
      <div class="card">
        <div class="card-header">
          <strong>#${order.id.slice(-6)}</strong>
          <span class="badge ${order.status === 'DRIVER_ASSIGNED' ? 'badge-ready' : 'badge-otw'}">${getStatusText(order.status)}</span>
        </div>
        <p><strong>المطعم:</strong> ${order.restaurantName || '—'}</p>
        <p><strong>العميل:</strong> ${order.customerName}</p>
        <p><strong>العنوان:</strong> ${order.customerAddress || order.address || '—'}</p>
        <div style="display:flex; gap:8px; margin-top:12px;">
          ${order.status === 'DRIVER_ASSIGNED' ? `
            <button class="btn-sm btn-status" onclick="updateOrderStatus('${order.id}', 'ON_THE_WAY')" style="flex:1;">🚗 في الطريق</button>
          ` : ''}
          ${order.status === 'ON_THE_WAY' ? `
            <button class="btn-sm btn-success" onclick="updateOrderStatus('${order.id}', 'DELIVERED')" style="flex:1;">✅ تم التوصيل</button>
          ` : ''}
        </div>
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = '<div class="empty">⚠️ خطأ في التحميل</div>';
  }
}

async function updateOrderStatus(orderId, status) {
  try {
    const res = await fetch(API + '/driver/orders/' + orderId + '/status', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ status })
    });
    if (!res.ok) {
      const err = await res.json();
      showToast('❌ ' + (err.error || 'فشل التحديث'));
      return;
    }
    showToast('✅ تم تحديث الحالة');
    if (status === 'DELIVERED') {
      switchTab('history');
    } else {
      loadMyActiveOrders();
    }
  } catch (e) {
    showToast('❌ فشل الاتصال');
  }
}

// ========== History ==========
async function loadHistory() {
  const container = document.getElementById('tabContent');
  try {
    const res = await fetch(API + '/driver/history', { credentials: 'include' });
    if (res.status === 401) { logout(); return; }
    const orders = await res.json();
    if (!orders.length) {
      container.innerHTML = '<div class="empty">📜 لا يوجد سجل توصيلات</div>';
      return;
    }
    container.innerHTML = orders.map(order => `
      <div class="card">
        <p><strong>#${order.id.slice(-6)}</strong> - <span class="badge badge-delivered">تم التوصيل</span></p>
        <p><strong>المطعم:</strong> ${order.restaurantName || '—'}</p>
        <p><strong>العميل:</strong> ${order.customerName}</p>
        <p><strong>التاريخ:</strong> ${new Date(order.deliveredAt).toLocaleDateString('ar-EG')}</p>
        <div class="stat-row"><span class="stat-label">قيمة الطلب</span><span>${order.total} ج</span></div>
        <div class="stat-row"><span class="stat-label">رسوم التوصيل</span><span class="stat-value">${order.deliveryFee || 10} ج</span></div>
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = '<div class="empty">⚠️ خطأ في التحميل</div>';
  }
}

// ========== Account ==========
async function loadAccount() {
  const container = document.getElementById('tabContent');
  try {
    const [profileRes, earningsRes] = await Promise.all([
      fetch(API + '/driver/profile', { credentials: 'include' }),
      fetch(API + '/driver/earnings', { credentials: 'include' })
    ]);
    if (profileRes.status === 401) { logout(); return; }
    const profile = await profileRes.json();
    const earnings = await earningsRes.json();

    container.innerHTML = `
      <div class="card">
        <div style="text-align:center; font-size:64px;">🛵</div>
        <h2 style="text-align:center;">${profile.name}</h2>
        <p style="text-align:center; color:#888;">${profile.phone}</p>
        <div class="stat-row">
          <span class="stat-label">إجمالي الأرباح</span>
          <span class="stat-value">${earnings.total} ج</span>
        </div>
        <div class="stat-row" style="margin-top:12px; align-items:center;">
          <span class="stat-label">متاح للعمل</span>
          <div class="toggle-switch ${profile.isAvailable ? 'active' : ''}" id="availabilityToggle" onclick="toggleAvailability()"></div>
        </div>
        <button class="btn" style="margin-top:20px; background:#666;" onclick="logout()">تسجيل الخروج</button>
      </div>
    `;
  } catch (e) {
    container.innerHTML = '<div class="empty">⚠️ خطأ في التحميل</div>';
  }
}

async function toggleAvailability() {
  try {
    const res = await fetch(API + '/driver/toggle-status', {
      method: 'PATCH',
      credentials: 'include'
    });
    const data = await res.json();
    const toggle = document.getElementById('availabilityToggle');
    if (toggle) {
      if (data.isAvailable) toggle.classList.add('active');
      else toggle.classList.remove('active');
    }
    showToast(data.isAvailable ? '✅ أنت متاح الآن' : '⏸️ تم إيقاف التوفر');
  } catch (e) {
    showToast('❌ فشل الاتصال');
  }
}

function getStatusText(status) {
  const map = {
    DRIVER_ASSIGNED: 'بانتظار التحرك',
    ON_THE_WAY: 'في الطريق',
    DELIVERED: 'تم التوصيل'
  };
  return map[status] || status;
}

// ========== Initialization ==========
// التحقق من وجود جلسة سابقة عبر /api/whoami
async function checkSession() {
  try {
    const res = await fetch(API + '/whoami', { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      if (data.user.role === 'DRIVER') {
        currentDriver = data.user;
        document.getElementById('authWrapper').classList.add('hide');
        document.getElementById('mainApp').classList.add('active');
        initSocket();
        switchTab('available');
      }
    }
  } catch (e) {}
}
checkSession();
</script>
</body>
</html>
