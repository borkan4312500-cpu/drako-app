<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - Drako</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif; }
    body { background:#0D0F14; color:#F0F2F8; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .login-box { background:#161B24; border:1px solid #2A3348; border-radius:20px; padding:40px 30px; width:100%; max-width:400px; text-align:center; }
    .logo { font-size:32px; font-weight:900; background:linear-gradient(135deg,#FF6B00,#ff9f5a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:10px; }
    .sub { color:#8B95A8; margin-bottom:30px; }
    .field { margin-bottom:20px; text-align:right; }
    .field label { display:block; margin-bottom:6px; font-size:14px; color:#8B95A8; }
    .field input { width:100%; padding:12px 15px; background:#1E2535; border:1px solid #2A3348; border-radius:12px; color:#fff; font-size:16px; outline:none; }
    .field input:focus { border-color:#FF6B00; }
    .btn { width:100%; padding:14px; background:linear-gradient(135deg,#FF6B00,#ff8a33); border:none; border-radius:14px; color:white; font-size:18px; font-weight:bold; cursor:pointer; transition:.2s; margin-top:10px; }
    .btn:hover { transform:translateY(-2px); }
    .error { color:#F05252; margin-top:10px; font-size:14px; display:none; }
    .btn:disabled { opacity:0.6; pointer-events:none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">Drako</div>
    <div class="sub">لوحة التحكم</div>
    <div class="field">
      <label>رقم الهاتف</label>
      <input type="text" id="phone" placeholder="01xxxxxxxxx" required>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="password" placeholder="********" required>
    </div>
    <button class="btn" id="loginBtn" onclick="login()">دخول</button>
    <div class="error" id="error"></div>
  </div>
  <script>
    async function login() {
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';
      if (!phone || !password) {
        errorEl.textContent = 'يرجى ملء جميع الحقول';
        errorEl.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'جاري الدخول...';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'فشل تسجيل الدخول');
        }
        // تخزين التوكن والمستخدم
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        // توجيه إلى اللوحة المناسبة
        let target = '/';
        switch (data.user.role) {
          case 'ADMIN': target = '/admin'; break;
          case 'RESTAURANT': target = '/restaurant'; break;
          case 'DRIVER': target = '/driver'; break;
          case 'MARKET': target = '/market'; break;
          case 'PHARMACY': target = '/pharmacy'; break;
        }
        window.location.href = target;
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'دخول';
      }
    }
  </script>
</body>
</html>
