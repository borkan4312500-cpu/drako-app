<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>دراكو - لوحة الماركت</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* جميع التنسيقات كما هي (لم تتغير) */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      background: #0D0F14;
      color: #F0F2F8;
      padding-bottom: 16px;
    }
    .header {
      background: #161B24;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2A3348;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #FF6B00, #FF8C3A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-actions {
      display: flex;
      gap: 10px;
    }
    .icon-btn {
      background: #1E2535;
      border: none;
      color: #8B95A8;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }
    .icon-btn:active {
      background: #FF6B00;
      color: white;
    }
    .stats-row {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .stat-card {
      background: #161B24;
      border: 1px solid #2A3348;
      border-radius: 16px;
      padding: 12px;
      min-width: 100px;
      text-align: center;
    }
    .stat-title {
      font-size: 11px;
      color: #8B95A8;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: #FF6B00;
    }
    .orders-container {
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .order-card {
      background: #161B24;
      border: 1px solid #2A3348;
      border-radius: 20px;
      overflow: hidden;
    }
    .order-header {
      background: #1E2535;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .order-id {
      font-weight: 700;
      color: #FF6B00;
      font-size: 13px;
    }
    .order-status {
      background: rgba(255,107,0,0.15);
      color: #FF6B00;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 11px;
    }
    .order-body {
      padding: 12px 16px;
    }
    .customer-info {
      background: #1E2535;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .customer-name {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .customer-phone, .customer-address {
      font-size: 12px;
      color: #8B95A8;
    }
    .products-title {
      font-size: 13px;
      font-weight: 700;
      margin: 10px 0 8px;
    }
    .product-item {
      background: #1E2535;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .product-info {
      flex: 1;
    }
    .product-name {
      font-weight: 600;
      font-size: 14px;
    }
    .product-details {
      font-size: 11px;
      color: #8B95A8;
      margin-top: 2px;
    }
    .product-actions {
      display: flex;
      gap: 8px;
    }
    .edit-product, .delete-product {
      background: none;
      border: none;
      font-size: 16px;
      padding: 6px;
      border-radius: 8px;
      cursor: pointer;
    }
    .edit-product { color: #3B82F6; }
    .delete-product { color: #F05252; }
    .add-product-btn {
      background: #1E2535;
      border: 1px dashed #FF6B00;
      color: #FF6B00;
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      margin: 10px 0;
      font-size: 13px;
      cursor: pointer;
    }
    .invoice-section {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }
    .invoice-input {
      flex: 1;
      background: #1E2535;
      border: 1px solid #2A3348;
      border-radius: 12px;
      padding: 10px;
      color: white;
      font-size: 14px;
    }
    .btn {
      background: #FF6B00;
      border: none;
      padding: 10px 16px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      color: white;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #FF6B00;
      color: #FF6B00;
    }
    .order-footer {
      padding: 12px 16px;
      border-top: 1px solid #2A3348;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-amount {
      font-size: 16px;
      font-weight: 700;
    }
    .total-amount span {
      color: #FF6B00;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #161B24;
      border: 1px solid #2A3348;
      border-radius: 24px;
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }
    .close-modal {
      background: none;
      border: none;
      color: #8B95A8;
      font-size: 22px;
      cursor: pointer;
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
      color: #8B95A8;
    }
    .field input, .field textarea {
      width: 100%;
      background: #1E2535;
      border: 1px solid #2A3348;
      border-radius: 12px;
      padding: 10px;
      color: white;
      font-size: 14px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1E2535;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      z-index: 300;
      transition: 0.3s;
      opacity: 0;
      pointer-events: none;
      font-size: 13px;
    }
    .toast.show {
      opacity: 1;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #8B95A8;
    }
    .error-box {
      background: rgba(240,82,82,0.1);
      border: 1px solid #F05252;
      border-radius: 16px;
      padding: 20px;
      margin: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">دراكو - الماركت</div>
  <div class="header-actions">
    <button class="icon-btn" onclick="refreshOrders()"><i class="fas fa-sync-alt"></i></button>
    <button class="icon-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
  </div>
</div>
<div class="stats-row" id="statsContainer"></div>
<div class="orders-container" id="ordersContainer"></div>
<div class="error-box" id="errorBox" style="display: none;">
  <i class="fas fa-exclamation-triangle"></i>
  <div id="errorMessage"></div>
</div>

<div class="modal" id="productModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">تعديل المنتج</div>
      <button class="close-modal" onclick="closeProductModal()">✕</button>
    </div>
    <div class="field">
      <label>اسم المنتج</label>
      <input type="text" id="productName" placeholder="مثال: حليب">
    </div>
    <div class="field">
      <label>سعر الوحدة (ج)</label>
      <input type="number" id="productPrice" placeholder="0">
    </div>
    <div class="field">
      <label>الكمية</label>
      <input type="number" id="productQuantity" min="1" value="1">
    </div>
    <div class="field">
      <label>ملاحظات (اختياري)</label>
      <textarea id="productNotes" rows="2" placeholder="مثل: طازج"></textarea>
    </div>
    <button class="btn" onclick="saveProductChanges()" style="width:100%">حفظ</button>
  </div>
</div>

<div class="toast" id="toast">تم الحفظ</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ========== Global ==========
  const API = '/api';
  let currentUser = null;

  // Helper to show/hide error and redirect
  function showErrorAndRedirect(msg) {
    const errorBox = document.getElementById('errorBox');
    const errorMsg = document.getElementById('errorMessage');
    errorMsg.innerText = msg;
    errorBox.style.display = 'block';
    document.getElementById('ordersContainer').innerHTML = '';
    document.getElementById('statsContainer').innerHTML = '';
    setTimeout(() => {
      window.location.href = '/login.html';
    }, 3000);
  }

  // Check authentication and role
  async function checkAuth() {
    try {
      const res = await fetch(API + '/market/orders', { credentials: 'include' });
      if (res.status === 403) {
        showErrorAndRedirect('ليس لديك صلاحية الوصول لهذه الصفحة. تأكد من أن حسابك من نوع ماركت.');
        return false;
      }
      if (res.status === 401) {
        showErrorAndRedirect('انتهت الجلسة أو لم يتم تسجيل الدخول. جاري إعادة التوجيه...');
        return false;
      }
      return true;
    } catch(e) {
      showErrorAndRedirect('فشل الاتصال بالسيرفر');
      return false;
    }
  }

  let currentOrderId = null;
  let currentProductIndex = null;
  let ordersData = [];

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = isError ? '#F05252' : '#1E2535';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  async function apiFetch(url, options = {}) {
    const res = await fetch(url, { ...options, credentials: 'include', headers: { ...(options.headers||{}), 'Content-Type': options.body instanceof FormData ? undefined : 'application/json' } });
    if (!res.ok) {
      if (res.status === 403) {
        showErrorAndRedirect('غير مصرح بالوصول، سيتم إعادة التوجيه');
        throw new Error('Forbidden');
      }
      throw new Error(await res.text());
    }
    return res.json();
  }

  async function loadOrders() {
    try {
      const orders = await apiFetch(API + '/market/orders');
      ordersData = orders;
      renderStats(orders);
      renderOrders(orders);
    } catch(e) {
      console.error(e);
      showToast('فشل تحميل الطلبات', true);
    }
  }

  function renderStats(orders) {
    const pending = orders.filter(o => o.status === 'PENDING').length;
    const accepted = orders.filter(o => o.status === 'ACCEPTED').length;
    const ready = orders.filter(o => o.status === 'READY').length;
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card"><div class="stat-title">جديد</div><div class="stat-value">${pending}</div></div>
      <div class="stat-card"><div class="stat-title">تحضير</div><div class="stat-value">${accepted}</div></div>
      <div class="stat-card"><div class="stat-title">جاهز</div><div class="stat-value">${ready}</div></div>
      <div class="stat-card"><div class="stat-title">إجمالي</div><div class="stat-value">${orders.length}</div></div>
    `;
  }

  function renderOrders(orders) {
    const container = document.getElementById('ordersContainer');
    if (!orders.length) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><div>لا توجد طلبات حالياً</div></div>';
      return;
    }
    container.innerHTML = orders.map(order => `
      <div class="order-card" data-order-id="${order.id}">
        <div class="order-header">
          <div class="order-id">طلب #${order.id.slice(-8)}</div>
          <div class="order-status">${getStatusText(order.status)}</div>
        </div>
        <div class="order-body">
          <div class="customer-info">
            <div class="customer-name">${escapeHtml(order.customerName)}</div>
            <div class="customer-phone">📞 ${order.customerPhone}</div>
            <div class="customer-address">📍 ${order.address || '—'}</div>
          </div>
          <div class="products-title">المنتجات المطلوبة</div>
          <div id="products-list-${order.id}">
            ${renderProducts(order.items, order.id)}
          </div>
          <button class="add-product-btn" onclick="addProductToOrder('${order.id}')">+ إضافة منتج جديد</button>
          ${(order.status === 'PENDING' || order.status === 'ACCEPTED') ? `
            <div class="invoice-section">
              <input type="number" id="invoice-${order.id}" placeholder="قيمة الفاتورة الفعلية (ج)" class="invoice-input">
              <button class="btn" onclick="setInvoice('${order.id}')">تحديد الفاتورة</button>
            </div>
          ` : ''}
          ${order.invoiceAmount ? `<div class="invoice-section">💰 قيمة الفاتورة: ${order.invoiceAmount} ج</div>` : ''}
        </div>
        <div class="order-footer">
          <div class="total-amount">الإجمالي: <span>${order.total} ج</span></div>
          <div>
            ${order.status === 'PENDING' ? `<button class="btn btn-outline" onclick="acceptOrder('${order.id}')">قبول</button>` : ''}
            ${order.status === 'ACCEPTED' ? `<button class="btn" onclick="markReady('${order.id}')">تجهيز</button>` : ''}
            ${order.status === 'READY' ? '<span style="color:#2ECC71">جاهز للتوصيل</span>' : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderProducts(items, orderId) {
    if (!items || !items.length) return '<div style="color:#8B95A8">لا توجد منتجات</div>';
    return items.map((item, idx) => `
      <div class="product-item">
        <div class="product-info">
          <div class="product-name">${escapeHtml(item.name)}</div>
          <div class="product-details">${item.quantity} × ${item.price} ج | ${item.notes ? '📝 '+escapeHtml(item.notes) : ''}</div>
        </div>
        <div class="product-actions">
          <button class="edit-product" onclick="editProduct('${orderId}', ${idx})"><i class="fas fa-edit"></i></button>
          <button class="delete-product" onclick="deleteProduct('${orderId}', ${idx})"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function editProduct(orderId, idx) {
    const order = ordersData.find(o => o.id === orderId);
    if (!order) return;
    const product = order.items[idx];
    if (!product) return;
    currentOrderId = orderId;
    currentProductIndex = idx;
    document.getElementById('modalTitle').innerText = 'تعديل المنتج';
    document.getElementById('productName').value = product.name;
    document.getElementById('productPrice').value = product.price;
    document.getElementById('productQuantity').value = product.quantity;
    document.getElementById('productNotes').value = product.notes || '';
    document.getElementById('productModal').classList.add('active');
  }

  function deleteProduct(orderId, idx) {
    if (confirm('هل تريد حذف هذا المنتج من الطلب؟')) {
      updateOrderProducts(orderId, (items) => {
        items.splice(idx, 1);
        return items;
      });
    }
  }

  function addProductToOrder(orderId) {
    currentOrderId = orderId;
    currentProductIndex = -1;
    document.getElementById('modalTitle').innerText = 'إضافة منتج جديد';
    document.getElementById('productName').value = '';
    document.getElementById('productPrice').value = '';
    document.getElementById('productQuantity').value = 1;
    document.getElementById('productNotes').value = '';
    document.getElementById('productModal').classList.add('active');
  }

  async function saveProductChanges() {
    const name = document.getElementById('productName').value.trim();
    const price = parseFloat(document.getElementById('productPrice').value);
    const quantity = parseInt(document.getElementById('productQuantity').value);
    const notes = document.getElementById('productNotes').value;

    if (!name || isNaN(price) || price <= 0 || isNaN(quantity) || quantity < 1) {
      showToast('البيانات غير صحيحة', true);
      return;
    }
    const newProduct = { productId: null, name, price, quantity, notes };
    if (currentProductIndex === -1) {
      await updateOrderProducts(currentOrderId, (items) => [...items, newProduct]);
    } else {
      await updateOrderProducts(currentOrderId, (items) => {
        items[currentProductIndex] = newProduct;
        return items;
      });
    }
    closeProductModal();
  }

  async function updateOrderProducts(orderId, updateFn) {
    try {
      const order = ordersData.find(o => o.id === orderId);
      if (!order) throw new Error('Order not found');
      const newItems = updateFn([...order.items]);
      const newTotal = newItems.reduce((sum, p) => sum + (p.price * p.quantity), 0) + (order.deliveryFee || 0);
      await apiFetch(API + '/market/orders/' + orderId + '/items', {
        method: 'PATCH',
        body: JSON.stringify({ items: newItems, total: newTotal })
      });
      order.items = newItems;
      order.total = newTotal;
      refreshOrderUI(orderId);
      showToast('تم تحديث الطلب');
    } catch(e) {
      showToast('فشل التحديث', true);
      console.error(e);
    }
  }

  function refreshOrderUI(orderId) {
    const order = ordersData.find(o => o.id === orderId);
    if (!order) return;
    const container = document.getElementById(`products-list-${orderId}`);
    if (container) container.innerHTML = renderProducts(order.items, orderId);
    const orderCard = document.querySelector(`.order-card[data-order-id="${orderId}"]`);
    if (orderCard) {
      const totalSpan = orderCard.querySelector('.total-amount span');
      if (totalSpan) totalSpan.innerText = order.total + ' ج';
    }
  }

  async function acceptOrder(orderId) {
    await apiFetch(API + '/market/orders/' + orderId + '/accept', { method: 'PATCH' });
    showToast('تم قبول الطلب');
    loadOrders();
  }

  async function setInvoice(orderId) {
    const invoiceAmount = parseFloat(document.getElementById(`invoice-${orderId}`).value);
    if (isNaN(invoiceAmount) || invoiceAmount <= 0) {
      showToast('أدخل قيمة الفاتورة الصحيحة', true);
      return;
    }
    await apiFetch(API + '/market/orders/' + orderId + '/invoice', { method: 'PATCH', body: JSON.stringify({ invoiceAmount }) });
    showToast('تم تحديث الفاتورة');
    loadOrders();
  }

  async function markReady(orderId) {
    await apiFetch(API + '/market/orders/' + orderId + '/ready', { method: 'PATCH' });
    showToast('تم تجهيز الطلب');
    loadOrders();
  }

  function getStatusText(status) {
    const map = { PENDING: 'جديد', ACCEPTED: 'قيد التحضير', READY: 'جاهز', DELIVERED: 'تم التوصيل', CANCELLED: 'ملغي' };
    return map[status] || status;
  }

  function closeProductModal() {
    document.getElementById('productModal').classList.remove('active');
  }

  function refreshOrders() {
    loadOrders();
  }

  function logout() {
    localStorage.removeItem('drako_user');
    window.location.href = '/login.html';
  }

  // Socket updates
  const socket = io();
  socket.on('orderStatusUpdate', (data) => {
    if (data.orderId) loadOrders();
  });
  socket.on('newSpecialOrder', () => loadOrders());

  // Initialization
  (async function init() {
    const ok = await checkAuth();
    if (ok) {
      loadOrders();
    }
  })();
</script>
</body>
</html>
