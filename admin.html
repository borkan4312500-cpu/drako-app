<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>دراكو - لوحة الأدمن</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root{
      --bg:#0D0F14; --surface:#161B24; --surface2:#1E2535; --surface3:#252D40;
      --border:#2A3348; --orange:#FF6B00; --orange2:#FF8C3A;
      --orange-glow:rgba(255,107,0,.18); --orange-dim:rgba(255,107,0,.08);
      --text:#F0F2F8; --text2:#8B95A8; --text3:#55627A;
      --green:#00D68F; --blue:#3B82F6; --red:#F05252; --yellow:#FBBF24;
      --radius:14px; --radius-lg:20px;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
    body{background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow:hidden;}

    .sidebar{ width:260px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto; }
    .sb-logo{padding:20px 18px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
    .sb-logo-mark{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;box-shadow:0 4px 16px var(--orange-glow);}
    .sb-logo-text{display:flex;flex-direction:column;}
    .sb-logo-name{font-size:18px;font-weight:900;color:var(--text);}
    .sb-nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
    .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--text2);transition:all .18s;}
    .nav-item:hover{background:var(--surface2);color:var(--text);}
    .nav-item.active{background:var(--orange-dim);color:var(--orange);}
    .nav-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--surface2);}
    .nav-item.active .nav-icon{background:var(--orange-dim);}
    .sb-footer{padding:12px 10px;border-top:1px solid var(--border);}
    .sb-user{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius);background:var(--surface2);}
    .sb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
    .sb-user-name{font-size:13px;font-weight:700;}
    .sb-user-role{font-size:11px;color:var(--text3);}
    .sb-logout{color:var(--text3);font-size:18px;cursor:pointer;text-decoration:none;}

    .main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
    .topbar{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;}
    .topbar-title{font-size:20px;font-weight:800;}
    .topbar-sub{font-size:12px;color:var(--text3);}
    .content{flex:1;overflow-y:auto;padding:24px;}

    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:all .2s;}
    .stat-card:hover{border-color:rgba(255,107,0,.3);transform:translateY(-2px);}
    .sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
    .sc-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .sc-value{font-size:28px;font-weight:900;}
    .sc-label{font-size:12px;color:var(--text3);}

    .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:20px;overflow:hidden;}
    .sec-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
    .sec-title{font-size:15px;font-weight:800;}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:10px 20px;text-align:right;font-size:11px;font-weight:700;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);}
    tbody td{padding:13px 20px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
    tbody tr:hover{background:var(--surface2);}

    .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;}
    .badge-green{background:rgba(0,214,143,.12);color:var(--green);}
    .badge-orange{background:var(--orange-dim);color:var(--orange);}
    .badge-red{background:rgba(240,82,82,.12);color:var(--red);}
    .badge-blue{background:rgba(59,130,246,.12);color:var(--blue);}

    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;border:none;transition:all .18s;}
    .btn-primary{background:var(--orange);color:#fff;}
    .btn-primary:hover{background:var(--orange2);}
    .btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
    .btn-ghost:hover{background:var(--surface3);color:var(--text);}
    .btn-danger{background:rgba(240,82,82,.12);color:var(--red);border:1px solid rgba(240,82,82,.2);}
    .btn-success{background:rgba(0,214,143,.12);color:var(--green);border:1px solid rgba(0,214,143,.2);}
    .btn-sm{padding:5px 10px;font-size:12px;border-radius:8px;}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0;width:100%;max-width:500px;overflow:hidden;}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}
    .modal-title{font-size:16px;font-weight:800;}
    .modal-close{width:30px;height:30px;background:var(--surface2);border:none;border-radius:8px;cursor:pointer;color:var(--text3);font-size:18px;display:flex;align-items:center;justify-content:center;}
    .modal-body{padding:20px;max-height:60vh;overflow-y:auto;}
    .modal-foot{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);}
    .modal-foot .btn{flex:1;height:42px;justify-content:center;}

    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    .field label{font-size:12px;font-weight:700;color:var(--text3);}
    .field input,.field select{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:13px;font-family:'Cairo';color:var(--text);outline:none;}

    .filter-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
    .filter-bar input[type="date"]{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;font-family:'Cairo',sans-serif;color:var(--text);outline:none;}

    .empty-state{text-align:center;padding:48px;color:var(--text3);}
    .empty-state .icon{font-size:40px;margin-bottom:12px;}
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark">D</div><div class="sb-logo-text"><div class="sb-logo-name">Drako</div><div class="sb-logo-sub">لوحة الأدمن</div></div></div>
  <div class="sb-nav">
    <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')"><div class="nav-icon">📊</div>لوحة التحكم</div>
    <div class="nav-item" id="nav-orders" onclick="navigate('orders')"><div class="nav-icon">📦</div>الطلبات</div>
    <div class="nav-item" id="nav-restaurants" onclick="navigate('restaurants')"><div class="nav-icon">🍔</div>المطاعم</div>
    <div class="nav-item" id="nav-drivers" onclick="navigate('drivers')"><div class="nav-icon">🛵</div>الطيارين</div>
    <div class="nav-item" id="nav-regions" onclick="navigate('regions')"><div class="nav-icon">📍</div>المناطق</div>
    <div class="nav-item" id="nav-customers" onclick="navigate('customers')"><div class="nav-icon">👥</div>العملاء</div>
    <div class="nav-item" id="nav-reports" onclick="navigate('reports')"><div class="nav-icon">💰</div>التقارير</div>
    <div class="nav-item" id="nav-markets" onclick="navigate('markets')"><div class="nav-icon">🛒</div>الماركت</div>
    <div class="nav-item" id="nav-pharmacies" onclick="navigate('pharmacies')"><div class="nav-icon">💊</div>الصيدليات</div>
  </div>
  <div class="sb-footer"><div class="sb-user"><div class="sb-avatar">A</div><div><div class="sb-user-name" id="adminName">الأدمن</div></div><a href="/logout" class="sb-logout">⏻</a></div></div>
</div>

<div class="main-wrap">
  <div class="topbar"><div><div class="topbar-title" id="topbar-title">لوحة التحكم</div><div class="topbar-sub">مرحباً بك</div></div></div>
  <div class="content" id="content"></div>
</div>

<div class="modal-overlay" id="modal"><div class="modal"><div class="modal-head"><div class="modal-title" id="modal-title"></div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modal-body"></div><div class="modal-foot" id="modal-foot"></div></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ========== الإعدادات الأساسية ==========
  const API = '/api';
  const PAGE_ROLE = 'ADMIN';
  const TOKEN_KEY = 'auth_token';
  let currentPage = 'dashboard';
  let currentMarketsData = [];
  let currentPharmaciesData = [];

  // ========== إدارة التوكن ==========
  function getToken() {
    return localStorage.getItem(TOKEN_KEY);
  }

  async function apiFetch(url, options = {}) {
    const token = getToken();
    if (!token) {
      document.body.innerHTML = `<div style="text-align:center;margin-top:60px;font-family:Cairo;">
        <h2>الجلسة منتهية</h2>
        <a href="/login.html" style="color:#FF6B00;">تسجيل الدخول</a>
      </div>`;
      throw new Error('NO_TOKEN');
    }
    const res = await fetch(url, {
      ...options,
      headers: {
        ...options.headers,
        'Authorization': 'Bearer ' + token,
        'Content-Type': options.body instanceof FormData ? undefined : 'application/json'
      }
    });
    if (res.status === 401) {
      localStorage.removeItem(TOKEN_KEY);
      document.body.innerHTML = `<div style="text-align:center;margin-top:60px;font-family:Cairo;">
        <h2>الجلسة منتهية</h2>
        <a href="/login.html" style="color:#FF6B00;">تسجيل الدخول</a>
      </div>`;
      throw new Error('TOKEN_EXPIRED');
    }
    return res;
  }

  // ========== دوال مساعدة ==========
  function showToast(msg, isError = false) {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1E2535;color:#fff;padding:12px 24px;border-radius:12px;z-index:9999;font-weight:600;';
    t.textContent = (isError ? '❌ ' : '✅ ') + msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function openModal(title, bodyHTML, footHTML) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHTML;
    document.getElementById('modal-foot').innerHTML = footHTML || '';
    document.getElementById('modal').classList.add('open');
  }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  function navigate(page) {
    currentPage = page;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + page).classList.add('active');
    const titles = {
      dashboard: 'لوحة التحكم',
      orders: 'الطلبات',
      restaurants: 'المطاعم',
      drivers: 'الطيارين',
      regions: 'المناطق',
      customers: 'العملاء',
      reports: 'التقارير',
      markets: 'الماركت',
      pharmacies: 'الصيدليات'
    };
    document.getElementById('topbar-title').textContent = titles[page] || page;
    renderPage(page);
  }

  async function renderPage(page) {
    const c = document.getElementById('content');
    c.innerHTML = '<div style="text-align:center;padding:48px;color:var(--text3)">⏳ جاري التحميل...</div>';
    try {
      if (page === 'dashboard') await renderDashboard();
      else if (page === 'orders') await renderOrders();
      else if (page === 'restaurants') await renderRestaurants();
      else if (page === 'drivers') await renderDrivers();
      else if (page === 'regions') await renderRegions();
      else if (page === 'customers') await renderCustomers();
      else if (page === 'reports') await renderReports();
      else if (page === 'markets') await renderMarkets();
      else if (page === 'pharmacies') await renderPharmacies();
    } catch (e) {
      if (e.message !== 'NO_TOKEN' && e.message !== 'TOKEN_EXPIRED') {
        c.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>حدث خطأ أثناء التحميل</div></div>';
      }
    }
  }

  // ==================== DASHBOARD ====================
  async function renderDashboard() {
    const res = await apiFetch(API + '/admin/dashboard');
    const data = await res.json();
    document.getElementById('content').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card" onclick="navigate('orders')">
          <div class="sc-top"><div><div class="sc-value">${data.todayOrders}</div><div class="sc-label">طلبات اليوم</div></div><div class="sc-icon" style="background:var(--orange-dim)">📦</div></div>
        </div>
        <div class="stat-card">
          <div class="sc-top"><div><div class="sc-value">${data.activeOrders}</div><div class="sc-label">طلبات نشطة</div></div><div class="sc-icon" style="background:rgba(59,130,246,.12)">⚡</div></div>
        </div>
        <div class="stat-card" onclick="navigate('restaurants')">
          <div class="sc-top"><div><div class="sc-value">${data.restaurants}</div><div class="sc-label">المطاعم</div></div><div class="sc-icon" style="background:rgba(0,214,143,.12)">🍔</div></div>
        </div>
        <div class="stat-card" onclick="navigate('drivers')">
          <div class="sc-top"><div><div class="sc-value">${data.drivers}</div><div class="sc-label">الطيارين</div></div><div class="sc-icon" style="background:rgba(251,191,36,.12)">🛵</div></div>
        </div>
      </div>
      <div class="section">
        <div class="sec-head"><div class="sec-title">آخر الطلبات</div></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>الطلب</th><th>العميل</th><th>المطعم</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th></tr></thead>
            <tbody>
              ${data.recentOrders.slice(0,10).map(o => `
                <tr>
                  <td>#${o.id.slice(-6)}</td>
                  <td>${o.customerName || '-'}</td>
                  <td>${o.restaurantName || 'طلب خاص'}</td>
                  <td>${o.total} ج</td>
                  <td><span class="badge badge-orange">${getStatusText(o.status)}</span></td>
                  <td>${new Date(o.createdAt).toLocaleDateString('ar-EG')}</td>
                </tr>
              `).join('')}
              ${!data.recentOrders.length ? '<tr><td colspan="6">لا توجد طلبات</td></tr>' : ''}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  function getStatusText(s) {
    const map = { PENDING:'قيد الانتظار', ACCEPTED:'مقبول', PREPARING:'تحضير', READY:'جاهز', DRIVER_ASSIGNED:'مع طيار', ON_THE_WAY:'في الطريق', DELIVERED:'تم', CANCELLED:'ملغي' };
    return map[s] || s;
  }

  // ==================== ORDERS ====================
  async function renderOrders() {
    const res = await apiFetch(API + '/orders');
    const orders = await res.json();
    const activeOrders = orders.filter(o => !['DELIVERED','CANCELLED'].includes(o.status));
    const completedOrders = orders.filter(o => ['DELIVERED','CANCELLED'].includes(o.status));

    document.getElementById('content').innerHTML = `
      <div class="section">
        <div class="sec-head"><div class="sec-title">الطلبات النشطة (${activeOrders.length})</div></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>الطلب</th><th>العميل</th><th>المطعم</th><th>الإجمالي</th><th>الحالة</th><th>الطيار</th><th>إجراءات</th></tr></thead>
            <tbody>
              ${activeOrders.map(o => `
                <tr>
                  <td>#${o.id.slice(-6)}</td>
                  <td>${o.customerName || '-'}</td>
                  <td>${o.restaurantName || 'طلب خاص'}</td>
                  <td>${o.total} ج</td>
                  <td><span class="badge badge-orange">${getStatusText(o.status)}</span></td>
                  <td>${o.driverName || '-'}</td>
                  <td>
                    ${!o.adminApproved ? `<button class="btn btn-sm btn-success" onclick="approveOrder('${o.id}')">موافقة</button>
                    <button class="btn btn-sm btn-danger" onclick="rejectOrder('${o.id}')">رفض</button>` : ''}
                    ${o.status === 'READY' ? `<button class="btn btn-sm btn-primary" onclick="assignDriverModal('${o.id}')">تعيين طيار</button>` : ''}
                    <button class="btn btn-sm btn-ghost" onclick="editOrderModal('${o.id}')">✏️</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="section">
        <div class="sec-head"><div class="sec-title">الطلبات المكتملة (${completedOrders.length})</div></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>الطلب</th><th>العميل</th><th>المطعم</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th></tr></thead>
            <tbody>
              ${completedOrders.map(o => `
                <tr>
                  <td>#${o.id.slice(-6)}</td>
                  <td>${o.customerName || '-'}</td>
                  <td>${o.restaurantName || 'طلب خاص'}</td>
                  <td>${o.total} ج</td>
                  <td><span class="badge ${o.status==='DELIVERED'?'badge-green':'badge-red'}">${getStatusText(o.status)}</span></td>
                  <td>${new Date(o.createdAt).toLocaleDateString('ar-EG')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  async function approveOrder(id) {
    await apiFetch(API + '/admin/orders/' + id + '/approve', { method: 'PATCH' });
    showToast('تمت الموافقة');
    renderOrders();
  }

  async function rejectOrder(id) {
    const reason = prompt('سبب الرفض:');
    await apiFetch(API + '/admin/orders/' + id + '/reject', { method: 'PATCH', body: JSON.stringify({ reason }) });
    showToast('تم الرفض');
    renderOrders();
  }

  async function assignDriverModal(orderId) {
    const res = await apiFetch(API + '/admin/dashboard');
    const data = await res.json();
    const drivers = data.availableDrivers.filter(d => d.isAvailable && d.isActive);
    let html = '<div class="field"><label>اختر طيار</label><select id="driverSelect">';
    drivers.forEach(d => html += `<option value="${d.id}">${d.name} (${d.phone}) - طلبات نشطة: ${d.activeOrdersCount}</option>`);
    html += '</select></div>';
    openModal('تعيين طيار', html, `<button class="btn btn-primary" onclick="assignDriver('${orderId}')">تعيين</button><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>`);
  }

  async function assignDriver(orderId) {
    const driverId = document.getElementById('driverSelect').value;
    await apiFetch(API + '/admin/orders/' + orderId + '/assign-driver', { method: 'PATCH', body: JSON.stringify({ driverId }) });
    showToast('تم التعيين');
    closeModal();
    renderOrders();
  }

  function editOrderModal(orderId) {
    openModal('تعديل طلب', `
      <div class="field"><label>ملاحظات الأدمن</label><input id="adminNotes" placeholder="ملاحظات"></div>
      <div class="field"><label>تعديل ملاحظات الطلب</label><input id="orderNotes" placeholder="ملاحظات الطلب"></div>
    `, `<button class="btn btn-primary" onclick="saveOrderEdit('${orderId}')">حفظ</button>`);
  }

  async function saveOrderEdit(orderId) {
    const adminNotes = document.getElementById('adminNotes').value;
    const orderNotes = document.getElementById('orderNotes').value;
    await apiFetch(API + '/admin/orders/' + orderId, { method: 'PATCH', body: JSON.stringify({ adminNotes, orderNotes }) });
    showToast('تم الحفظ');
    closeModal();
    renderOrders();
  }

  // ==================== RESTAURANTS ====================
  async function renderRestaurants() {
    const res = await apiFetch(API + '/admin/restaurants');
    const restaurants = await res.json();
    document.getElementById('content').innerHTML = `
      <button class="btn btn-primary" onclick="addRestaurantModal()">+ إضافة مطعم</button>
      <div class="section" style="margin-top:16px;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>الاسم</th><th>رقم المالك</th><th>الحالة</th><th>إجراءات</th></tr></thead>
            <tbody>
              ${restaurants.map(r => `
                <tr>
                  <td>${r.name}</td>
