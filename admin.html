<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drako — لوحة الإدارة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --bg: #0D0F14;
      --surface: #161B24;
      --surface2: #1E2535;
      --border: #2A3348;
      --orange: #FF6B00;
      --orange-dim: rgba(255,107,0,0.08);
      --text: #F0F2F8;
      --text2: #8B95A8;
      --text3: #55627A;
      --green: #00D68F;
      --red: #F05252;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      overflow: hidden;
    }
    /* الشريط الجانبي */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sb-logo { padding: 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .sb-logo-mark {
      width: 42px; height: 42px; background: linear-gradient(135deg, var(--orange), #ff9f5a);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: white;
    }
    .sb-logo-name { font-size: 18px; font-weight: 800; }
    .sb-nav { padding: 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px;
      border-radius: 10px; cursor: pointer; color: var(--text2); font-size: 14px;
      transition: 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--orange-dim);
      color: var(--orange);
    }
    .nav-icon { width: 32px; font-size: 18px; }
    .nav-badge {
      margin-right: auto;
      background: var(--orange);
      color: #fff;
      font-size: 11px;
      border-radius: 30px;
      padding: 2px 8px;
    }
    .sb-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    /* المحتوى الرئيسي */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar-title { font-size: 20px; font-weight: 800; }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    /* البطاقات */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--orange); }
    /* الجداول */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .sec-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: right;
      padding: 12px 16px;
      background: var(--surface2);
      color: var(--text3);
      font-size: 12px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    tr:hover { background: var(--surface2); }
    .badge {
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-green { background: rgba(0,214,143,0.12); color: var(--green); }
    .badge-red { background: rgba(240,82,82,0.12); color: var(--red); }
    .badge-orange { background: var(--orange-dim); color: var(--orange); }
    .btn {
      border: none;
      background: var(--orange);
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--orange);
      color: var(--orange);
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 90%;
      max-width: 480px;
      padding: 24px;
    }
    .modal input, .modal select, .modal textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      color: white;
      margin-top: 4px;
    }
    .field { margin-bottom: 16px; }
    .field label { font-size: 12px; color: var(--text3); display: block; margin-bottom: 4px; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      z-index: 1100;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark">D</div><div class="sb-logo-name">Drako</div></div>
  <div class="sb-nav">
    <div class="nav-item active" onclick="navigate('dashboard')"><div class="nav-icon">🏠</div>لوحة التحكم</div>
    <div class="nav-item" onclick="navigate('orders')"><div class="nav-icon">📦</div>الطلبات<div class="nav-badge" id="pendingBadge">0</div></div>
    <div class="nav-item" onclick="navigate('dispatch')"><div class="nav-icon">🛵</div>توزيع الطلبات</div>
    <div class="nav-item" onclick="navigate('restaurants')"><div class="nav-icon">🍽️</div>المطاعم</div>
    <div class="nav-item" onclick="navigate('markets')"><div class="nav-icon">🛒</div>الأسواق</div>
    <div class="nav-item" onclick="navigate('pharmacies')"><div class="nav-icon">💊</div>الصيدليات</div>
    <div class="nav-item" onclick="navigate('drivers')"><div class="nav-icon">👨‍✈️</div>الطيارين</div>
    <div class="nav-item" onclick="navigate('products')"><div class="nav-icon">📋</div>المنتجات</div>
    <div class="nav-item" onclick="navigate('categories')"><div class="nav-icon">🏷️</div>التصنيفات</div>
    <div class="nav-item" onclick="navigate('regions')"><div class="nav-icon">🌍</div>المناطق</div>
    <div class="nav-item" onclick="navigate('customers')"><div class="nav-icon">👥</div>العملاء</div>
    <div class="nav-item" onclick="navigate('reports')"><div class="nav-icon">📊</div>التقارير</div>
  </div>
  <div class="sb-footer"><div class="sb-avatar" style="background: var(--orange); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;">A</div><div>أدمن دراكو</div><a href="/logout" style="color:var(--text3); margin-right:auto;">⏻</a></div>
</div>
<div class="main-content">
  <div class="topbar"><div class="topbar-title" id="topbarTitle">لوحة التحكم</div><div><button class="btn btn-sm" onclick="refreshPage()">🔄 تحديث</button></div></div>
  <div class="content" id="content"></div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal"><div id="modalContent"></div></div>
</div>
<div class="toast" id="toastMsg">تم</div>
<script src="/socket.io/socket.io.js"></script>
<script>
// ========== التوكن والتحقق ==========
async function checkAuth() {
  try {
    const res = await fetch('/api/admin/stats', { credentials: 'include' });
    if (res.status === 401) window.location.href = '/login.html';
  } catch(e) { window.location.href = '/login.html'; }
}
checkAuth();

// ========== دوال مساعدة ==========
function toast(msg, type='success') {
  const t = document.getElementById('toastMsg');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#F05252' : '#1E2535';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
async function apiFetch(url, options={}) {
  const res = await fetch(url, { ...options, credentials: 'include', headers: { ...(options.headers||{}), 'Content-Type': options.body instanceof FormData ? undefined : 'application/json' } });
  if (!res.ok && res.status !== 400) toast(`خطأ ${res.status}`, 'error');
  return res;
}
function formatTime(iso) { return iso ? new Date(iso).toLocaleTimeString('ar-EG', {hour:'2-digit',minute:'2-digit'}) : '—'; }
function formatDate(iso) { return iso ? new Date(iso).toLocaleDateString('ar-EG') : '—'; }

// ========== المتغيرات العامة ==========
let currentPage = 'dashboard';
let allOrders = [], allRestaurants = [], allDrivers = [], allMarkets = [], allPharmacies = [];

// ========== التنقل ==========
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item[onclick="navigate('${page}')"]`).classList.add('active');
  document.getElementById('topbarTitle').innerText = 
    {dashboard:'لوحة التحكم',orders:'الطلبات',dispatch:'توزيع الطلبات',restaurants:'المطاعم',markets:'الأسواق',pharmacies:'الصيدليات',drivers:'الطيارين',products:'المنتجات',categories:'التصنيفات',regions:'المناطق',customers:'العملاء',reports:'التقارير'}[page] || page;
  renderPage(page);
}
async function renderPage(page) {
  document.getElementById('content').innerHTML = '<div style="text-align:center;padding:50px;">⏳ جاري التحميل...</div>';
  if (page === 'dashboard') await loadDashboard();
  else if (page === 'orders') await loadOrders();
  else if (page === 'dispatch') await loadDispatch();
  else if (page === 'restaurants') await loadRestaurants();
  else if (page === 'markets') await loadMarkets();
  else if (page === 'pharmacies') await loadPharmacies();
  else if (page === 'drivers') await loadDrivers();
  else if (page === 'products') await loadProducts();
  else if (page === 'categories') await loadCategories();
  else if (page === 'regions') await loadRegions();
  else if (page === 'customers') await loadCustomers();
  else if (page === 'reports') await loadReports();
}
function refreshPage() { renderPage(currentPage); }

// ========== لوحة التحكم ==========
async function loadDashboard() {
  const stats = await apiFetch('/api/admin/stats').then(r=>r.json()).catch(()=>({}));
  const orders = await apiFetch('/api/orders').then(r=>r.json()).catch(()=>[]);
  const platform = await apiFetch('/api/admin/platform-revenue').then(r=>r.json()).catch(()=>({}));
  allOrders = orders;
  const pending = orders.filter(o=>o.status==='PENDING').length;
  document.getElementById('pendingBadge').innerText = pending;
  const todayOrders = orders.filter(o=>new Date(o.createdAt).toDateString()===new Date().toDateString());
  const active = orders.filter(o=>!['DELIVERED','CANCELLED'].includes(o.status));
  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${platform.today || 0} ج</div><div>نسبة المنصة اليوم</div></div>
      <div class="stat-card"><div class="stat-value">${todayOrders.length}</div><div>طلبات اليوم</div></div>
      <div class="stat-card"><div class="stat-value">${active.length}</div><div>طلبات نشطة</div></div>
      <div class="stat-card"><div class="stat-value">${stats.restaurants || 0}</div><div>المطاعم</div></div>
    </div>
    <div class="section"><div class="sec-head"><div class="sec-title">📦 آخر الطلبات</div></div><div class="table-wrap"><table><thead><tr><th>رقم</th><th>العميل</th><th>المبلغ</th><th>الحالة</th></tr></thead><tbody>${orders.slice(-5).reverse().map(o=>`<tr><td>#${o.id.slice(-6)}</td><td>${o.customerName||'—'}</td><td>${o.total} ج</td><td><span class="badge badge-orange">${o.status}</span></td></tr>`).join('')}</tbody></table></div></div>
  `;
}

// ========== الطلبات ==========
async function loadOrders() {
  const res = await apiFetch('/api/orders');
  const orders = await res.json();
  allOrders = orders;
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="sec-head"><div class="sec-title">📋 قائمة الطلبات</div><input type="text" id="searchOrder" placeholder="بحث..." style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px;width:200px" oninput="filterOrders()"></div>
    <div class="table-wrap"><table><thead><tr><th>#</th><th>العميل</th><th>المطعم</th><th>المبلغ</th><th>الحالة</th><th>الطيار</th><th>إجراءات</th></tr></thead><tbody id="ordersTable">${renderOrdersTable(orders)}</tbody></table></div></div>
  `;
}
function renderOrdersTable(orders) {
  return orders.slice().reverse().map(o=>`
    <tr>
      <td>#${o.id.slice(-6)}</td><td>${o.customerName||'—'}</td><td>${o.restaurantName||'—'}</td>
      <td>${o.total} ج</td><td><span class="badge badge-orange">${o.status}</span></td>
      <td>${o.driverName||'—'}</td>
      <td><button class="btn btn-sm btn-outline" onclick="viewOrder('${o.id}')">تفاصيل</button> ${!o.adminApproved ? '<button class="btn btn-sm" onclick="approveOrder(\''+o.id+'\')">موافقة</button>' : ''}</td>
    </tr>
  `).join('');
}
function filterOrders() {
  const q = document.getElementById('searchOrder').value.toLowerCase();
  const filtered = allOrders.filter(o=> (o.customerName||'').includes(q) || (o.id||'').includes(q));
  document.getElementById('ordersTable').innerHTML = renderOrdersTable(filtered);
}
async function approveOrder(id) { await apiFetch(`/api/admin/orders/${id}/approve`,{method:'PATCH'}); toast('تمت الموافقة'); loadOrders(); }
async function viewOrder(id) {
  const o = allOrders.find(o=>o.id===id);
  if(!o) return;
  openModal(`<div class="field"><label>الطلب #${id.slice(-6)}</label><textarea readonly style="background:var(--surface2);width:100%">${JSON.stringify(o,null,2)}</textarea></div><div style="text-align:left;"><button class="btn btn-sm" onclick="closeModal()">إغلاق</button></div>`);
}

// ========== توزيع الطلبات ==========
async function loadDispatch() {
  const [orders, drivers] = await Promise.all([apiFetch('/api/orders').then(r=>r.json()), apiFetch('/api/admin/drivers').then(r=>r.json())]);
  const ready = orders.filter(o=>o.status==='READY' && !o.driverId);
  const availableDrivers = drivers.filter(d=>d.isAvailable);
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="sec-head"><div class="sec-title">🛵 الطلبات الجاهزة للتوزيع (${ready.length})</div></div>
    <div class="table-wrap"><table><thead><tr><th>الطلب</th><th>العميل</th><th>المطعم</th><th>المنطقة</th><th>تعيين طيار</th></tr></thead><tbody>
    ${ready.map(o=>`<tr><td>#${o.id.slice(-6)}</td><td>${o.customerName}</td><td>${o.restaurantName||'—'}</td><td>${o.regionName||o.address||'—'}</td><td><select id="driver-${o.id}" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px;"><option value="">اختر طيار</option>${availableDrivers.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select><button class="btn btn-sm" onclick="assignDriver('${o.id}')">تعيين</button></td></tr>`).join('')}
    </tbody></table></div></div>
  `;
}
async function assignDriver(orderId) {
  const driverId = document.getElementById(`driver-${orderId}`).value;
  if(!driverId) return toast('اختر طياراً','error');
  await apiFetch(`/api/admin/orders/${orderId}/assign-driver`,{method:'PATCH',body:JSON.stringify({driverId})});
  toast('تم التعيين'); loadDispatch();
}

// ========== المطاعم ==========
async function loadRestaurants() {
  const res = await apiFetch('/api/admin/restaurants');
  const data = await res.json();
  allRestaurants = data;
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="sec-head"><div class="sec-title">🍽️ المطاعم</div><button class="btn btn-sm" onclick="showAddRestaurant()">+ إضافة</button></div>
    <div class="table-wrap"><table><thead><tr><th>الاسم</th><th>المالك</th><th>الهاتف</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>
    ${data.map(r=>`<tr><td>${r.name}</td><td>${r.ownerName||'—'}</td><td>${r.ownerPhone||'—'}</td><td><span class="badge ${r.isOpen?'badge-green':'badge-red'}">${r.isOpen?'مفتوح':'مغلق'}</span></td><td><button class="btn btn-sm btn-outline" onclick="toggleRestaurant('${r.id}')">${r.isOpen?'إغلاق':'فتح'}</button></td></tr>`).join('')}
    </tbody></table></div></div>
  `;
}
async function toggleRestaurant(id) { await apiFetch(`/api/admin/restaurants/${id}/toggle`,{method:'PATCH'}); loadRestaurants(); }
function showAddRestaurant() {
  openModal(`<div class="field"><label>اسم المطعم</label><input id="r-name"></div><div class="field"><label>هاتف المالك</label><input id="r-phone"></div><div class="field"><label>كلمة المرور</label><input id="r-pass" type="password"></div><div class="field"><button class="btn" onclick="addRestaurant()">إضافة</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button></div>`);
}
async function addRestaurant() {
  const name = document.getElementById('r-name').value.trim();
  const phone = document.getElementById('r-phone').value.trim();
  const pass = document.getElementById('r-pass').value;
  if(!name||!phone||!pass) return toast('أكمل الحقول','error');
  const res = await apiFetch('/api/admin/restaurants',{method:'POST',body:JSON.stringify({name,ownerPhone:phone,ownerPassword:pass})});
  if(res.ok) { toast('تمت الإضافة'); closeModal(); loadRestaurants(); }
  else toast('فشل','error');
}

// ========== الأسواق (مع رفع صورة) ==========
async function loadMarkets() {
  const res = await apiFetch('/api/admin/markets');
  const data = await res.json();
  allMarkets = data;
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="sec-head"><div class="sec-title">🛒 الأسواق</div><button class="btn btn-sm" onclick="showAddMarket()">+ إضافة</button></div>
    <div class="table-wrap"><table><thead><tr><th>الشعار</th><th>الاسم</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>
    ${data.map(m=>`<tr><td><img src="${m.logo||''}" style="width:40px;height:40px;border-radius:8px;object-fit:cover"></td><td>${m.name}</td><td><span class="badge ${m.isOpen?'badge-green':'badge-red'}">${m.isOpen?'مفتوح':'مغلق'}</span></td><td><button class="btn btn-sm btn-outline" onclick="toggleMarket('${m.id}')">${m.isOpen?'إغلاق':'فتح'}</button> <button class="btn btn-sm btn-outline" onclick="deleteMarket('${m.id}')">🗑️</button></td></tr>`).join('')}
    </tbody></table></div></div>
  `;
}
function showAddMarket() {
  openModal(`
    <div class="field"><label>اسم السوق</label><input id="m-name"></div>
    <div class="field"><label>رقم هاتف المالك</label><input id="m-phone"></div>
    <div class="field"><label>كلمة المرور</label><input id="m-pass" type="password"></div>
    <div class="field"><label>شعار السوق (صورة)</label><input type="file" id="m-logo" accept="image/*"></div>
    <div class="field"><button class="btn" onclick="addMarket()">إضافة</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button></div>
  `);
}
async function addMarket() {
  const name = document.getElementById('m-name').value.trim();
  const phone = document.getElementById('m-phone').value.trim();
  const pass = document.getElementById('m-pass').value;
  const logoFile = document.getElementById('m-logo').files[0];
  if(!name||!phone||!pass) return toast('الاسم والهاتف وكلمة المرور مطلوبة','error');
  const fd = new FormData();
  fd.append('name', name);
  fd.append('ownerPhone', phone);
  fd.append('ownerPassword', pass);
  if(logoFile) fd.append('logo', logoFile);
  const res = await apiFetch('/api/admin/markets', { method: 'POST', body: fd });
  if(res.ok) { toast('تمت الإضافة'); closeModal(); loadMarkets(); }
  else { const err = await res.json(); toast(err.error || 'فشل','error'); }
}
async function toggleMarket(id) { await apiFetch(`/api/admin/markets/${id}/toggle`,{method:'PATCH'}); loadMarkets(); }
async function deleteMarket(id) { if(confirm('حذف هذا السوق؟')) await apiFetch(`/api/admin/markets/${id}`,{method:'DELETE'}); loadMarkets(); }

// ========== الصيدليات (مثل الأسواق) ==========
async function loadPharmacies() {
  const res = await apiFetch('/api/admin/pharmacies');
  const data = await res.json();
  allPharmacies = data;
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="sec-head"><div class="sec-title">💊 الصيدليات</div><button class="btn btn-sm" onclick="showAddPharmacy()">+ إضافة</button></div>
    <div class="table-wrap"><table><thead><tr><th>الشعار</th><th>الاسم</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>
    ${data.map(p=>`<tr><td><img src="${p.logo||''}" style="width:40px;height:40px;border-radius:8px;object-fit:cover"></td><td>${p.name}</td><td><span class="badge ${p.isOpen?'badge-green':'badge-red'}">${p.isOpen?'مفتوح':'مغلق'}</span></td><td><button class="btn btn-sm btn-outline" onclick="togglePharmacy('${p.id}')">${p.isOpen?'إغلاق':'فتح'}</button> <button class="btn btn-sm btn-outline" onclick="deletePharmacy('${p.id}')">🗑️</button></td></tr>`).join('')}
    </tbody></table></div></div>
  `;
}
function showAddPharmacy() {
  openModal(`
    <div class="field"><label>اسم الصيدلية</label><input id="ph-name"></div>
    <div class="field"><label>رقم هاتف المالك</label><input id="ph-phone"></div>
    <div class="field"><label>كلمة المرور</label><input id="ph-pass" type="password"></div>
    <div class="field"><label>شعار الصيدلية (صورة)</label><input type="file" id="ph-logo" accept="image/*"></div>
    <div class="field"><button class="btn" onclick="addPharmacy()">إضافة</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button></div>
  `);
}
async function addPharmacy() {
  const name = document.getElementById('ph-name').value.trim();
  const phone = document.getElementById('ph-phone').value.trim();
  const pass = document.getElementById('ph-pass').value;
  const logoFile = document.getElementById('ph-logo').files[0];
  if(!name||!phone||!pass) return toast('الاسم والهاتف وكلمة المرور مطلوبة','error');
  const fd = new FormData();
  fd.append('name', name);
  fd.append('ownerPhone', phone);
  fd.append('ownerPassword', pass);
  if(logoFile) fd.append('logo', logoFile);
  const res = await apiFetch('/api/admin/pharmacies', { method: 'POST', body: fd });
  if(res.ok) { toast('تمت الإضافة'); closeModal(); loadPharmacies(); }
  else { const err = await res.json(); toast(err.error || 'فشل','error'); }
}
async function togglePharmacy(id) { await apiFetch(`/api/admin/pharmacies/${id}/toggle`,{method:'PATCH'}); loadPharmacies(); }
async function deletePharmacy(id) { if(confirm('حذف هذه الصيدلية؟')) await apiFetch(`/api/admin/pharmacies/${id}`,{method:'DELETE'}); loadPharmacies(); }

// ========== الطيارين ==========
async function loadDrivers() {
  const res = await apiFetch('/api/admin/drivers');
  const data = await res.json();
  allDrivers = data;
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="sec-head"><div class="sec-title">👨‍✈️ الطيارين</div><button class="btn btn-sm" onclick="showAddDriver()">+ إضافة</button></div>
    <div class="table-wrap"><table><thead><tr><th>الاسم</th><th>الهاتف</th><th>الأرباح</th><th>متاح</th><th>إجراءات</th></tr></thead><tbody>
    ${data.map(d=>`<tr><td>${d.name}</td><td>${d.phone}</td><td>${d.earnings} ج</td><td><span class="badge ${d.isAvailable?'badge-green':'badge-red'}">${d.isAvailable?'متاح':'مشغول'}</span></td><td><button class="btn btn-sm btn-outline" onclick="toggleDriver('${d.id}')">${d.isAvailable?'تعطيل':'تفعيل'}</button> <button class="btn btn-sm btn-outline" onclick="viewDriverDetails('${d.id}')">تفاصيل</button></td></tr>`).join('')}
    </tbody></table></div></div>
  `;
}
function showAddDriver() {
  openModal(`<div class="field"><label>الاسم</label><input id="d-name"></div><div class="field"><label>الهاتف</label><input id="d-phone"></div><div class="field"><label>كلمة المرور</label><input id="d-pass" type="password"></div><div class="field"><button class="btn" onclick="addDriver()">إضافة</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button></div>`);
}
async function addDriver() {
  const name = document.getElementById('d-name').value.trim();
  const phone = document.getElementById('d-phone').value.trim();
  const pass = document.getElementById('d-pass').value;
  if(!name||!phone||!pass) return toast('أكمل الحقول','error');
  const res = await apiFetch('/api/admin/drivers',{method:'POST',body:JSON.stringify({name,phone,password:pass})});
  if(res.ok) { toast('تمت الإضافة'); closeModal(); loadDrivers(); }
  else toast('فشل','error');
}
async function toggleDriver(id) { await apiFetch(`/api/admin/drivers/${id}/toggle`,{method:'PATCH'}); loadDrivers(); }
async function viewDriverDetails(id) {
  const res = await apiFetch(`/api/admin/drivers/${id}/details`);
  const d = await res.json();
  if(d.error) return toast(d.error,'error');
  openModal(`<div><strong>${d.name}</strong><br>📞 ${d.phone}<br>💰 أرباح اليوم: ${d.todayRevenue} ج<br>📦 طلبات اليوم: ${d.todayOrdersCount}<br><hr><strong>الطلبات:</strong><br>${d.todayOrders.map(o=>`#${o.id.slice(-6)} - ${o.customerName} - ${o.total} ج`).join('<br>')||'لا توجد'}</div><button class="btn" onclick="closeModal()">إغلاق</button>`);
}

// ========== المنتجات ==========
async function loadProducts() {
  const products = await apiFetch('/api/admin/products').then(r=>r.json());
  const restaurants = await apiFetch('/api/admin/restaurants').then(r=>r.json());
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="sec-head"><div class="sec-title">📋 المنتجات</div><button class="btn btn-sm" onclick="showAddProduct()">+ إضافة</button></div>
    <div class="table-wrap"><table><thead><tr><th>الصورة</th><th>الاسم</th><th>المطعم</th><th>السعر</th><th>إجراءات</th></tr></thead><tbody>
    ${products.map(p=>`<tr><td>${p.image?`<img src="${p.image}" width="40" height="40" style="border-radius:8px;object-fit:cover">`:'—'}</td><td>${p.name}</td><td>${p.restaurantName||'—'}</td><td>${p.price} ج</td><td><button class="btn btn-sm btn-outline" onclick="deleteProduct('${p.id}')">🗑️</button></td></tr>`).join('')}
    </tbody></table></div></div>
  `;
}
function showAddProduct() {
  fetch('/api/admin/restaurants').then(r=>r.json()).then(rests=>{
    openModal(`<div class="field"><label>الاسم</label><input id="prod-name"></div><div class="field"><label>السعر</label><input id="prod-price" type="number"></div><div class="field"><label>المطعم</label><select id="prod-rest">${rests.map(r=>`<option value="${r.id}">${r.name}</option>`).join('')}</select></div><div class="field"><label>صورة</label><input type="file" id="prod-img" accept="image/*"></div><div class="field"><button class="btn" onclick="addProduct()">إضافة</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button></div>`);
  });
}
async function addProduct() {
  const fd = new FormData();
  fd.append('name', document.getElementById('prod-name').value);
  fd.append('price', document.getElementById('prod-price').value);
  fd.append('restaurantId', document.getElementById('prod-rest').value);
  const img = document.getElementById('prod-img').files[0];
  if(img) fd.append('image', img);
  const res = await apiFetch('/api/admin/products', { method: 'POST', body: fd });
  if(res.ok) { toast('تمت الإضافة'); closeModal(); loadProducts(); }
  else toast('فشل','error');
}
async function deleteProduct(id) { if(confirm('حذف؟')) await apiFetch(`/api/admin/products/${id}`,{method:'DELETE'}); loadProducts(); }

// ========== التصنيفات ==========
async function loadCategories() {
  const cats = await apiFetch('/api/admin/categories').then(r=>r.json());
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="sec-head"><div class="sec-title">🏷️ التصنيفات</div><button class="btn btn-sm" onclick="showAddCategory()">+ إضافة</button></div>
    <div class="table-wrap"><table><thead><tr><th>الاسم</th><th>إجراءات</th></tr></thead><tbody>${cats.map(c=>`<tr><td>${c.name}</td><td><button class="btn btn-sm btn-outline" onclick="deleteCategory('${c.id}')">🗑️</button></td></tr>`).join('')}</tbody></table></div></div>
  `;
}
function showAddCategory() { openModal(`<div class="field"><label>الاسم</label><input id="cat-name"></div><button class="btn" onclick="addCategory()">إضافة</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button>`); }
async function addCategory() {
  const name = document.getElementById('cat-name').value.trim();
  if(!name) return toast('أدخل اسماً','error');
  await apiFetch('/api/admin/categories',{method:'POST',body:JSON.stringify({name})});
  toast('تمت الإضافة'); closeModal(); loadCategories();
}
async function deleteCategory(id) { if(confirm('حذف؟')) await apiFetch(`/api/admin/categories/${id}`,{method:'DELETE'}); loadCategories(); }

// ========== المناطق ==========
async function loadRegions() {
  const regions = await apiFetch('/api/admin/regions').then(r=>r.json());
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="sec-head"><div class="sec-title">🌍 مناطق التوصيل</div><button class="btn btn-sm" onclick="showAddRegion()">+ إضافة</button></div>
    <div class="table-wrap"><table><thead><tr><th>الاسم</th><th>الرسوم</th><th>إجراءات</th></tr></thead><tbody>${regions.map(r=>`<tr><td>${r.name}</td><td>${r.fee} ج</td><td><button class="btn btn-sm btn-outline" onclick="editRegion('${r.id}','${r.name}',${r.fee})">✏️</button> <button class="btn btn-sm btn-outline" onclick="deleteRegion('${r.id}')">🗑️</button></td></tr>`).join('')}</tbody></table></div></div>
  `;
}
function showAddRegion() { openModal(`<div class="field"><label>الاسم</label><input id="reg-name"></div><div class="field"><label>الرسوم</label><input id="reg-fee" type="number"></div><button class="btn" onclick="addRegion()">إضافة</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button>`); }
async function addRegion() {
  const name = document.getElementById('reg-name').value.trim();
  const fee = Number(document.getElementById('reg-fee').value);
  if(!name||!fee) return toast('أكمل الحقول','error');
  await apiFetch('/api/admin/regions',{method:'POST',body:JSON.stringify({name,fee})});
  toast('تمت الإضافة'); closeModal(); loadRegions();
}
function editRegion(id,name,fee) {
  openModal(`<div class="field"><label>الاسم</label><input id="reg-name-e" value="${name}"></div><div class="field"><label>الرسوم</label><input id="reg-fee-e" type="number" value="${fee}"></div><button class="btn" onclick="updateRegion('${id}')">حفظ</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button>`);
}
async function updateRegion(id) {
  const name = document.getElementById('reg-name-e').value.trim();
  const fee = Number(document.getElementById('reg-fee-e').value);
  await apiFetch(`/api/admin/regions/${id}`,{method:'PATCH',body:JSON.stringify({name,fee})});
  toast('تم التعديل'); closeModal(); loadRegions();
}
async function deleteRegion(id) { if(confirm('حذف؟')) await apiFetch(`/api/admin/regions/${id}`,{method:'DELETE'}); loadRegions(); }

// ========== العملاء ==========
async function loadCustomers() {
  const customers = await apiFetch('/api/admin/customers').then(r=>r.json());
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="sec-head"><div class="sec-title">👥 العملاء</div><input type="text" id="custSearch" placeholder="بحث..." style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px;width:200px" oninput="filterCustomers()"></div>
    <div class="table-wrap"><table><thead><tr><th>الاسم</th><th>الهاتف</th><th>المنطقة</th><th>عدد الطلبات</th><th>آخر طلب</th><th>إجراءات</th></tr></thead><tbody id="customersTable">${renderCustomersTable(customers)}</tbody></table></div></div>
  `;
}
function renderCustomersTable(customers) {
  return customers.map(c=>`<tr><td>${c.name}</td><td>${c.phone}</td><td>${c.regionName||'—'}</td><td>${c.totalOrders}</td><td>${c.lastOrderDate?new Date(c.lastOrderDate).toLocaleDateString():'—'}</td><td><button class="btn btn-sm btn-outline" onclick="editCustomer('${c.id}')">✏️</button></td></tr>`).join('');
}
function filterCustomers() {
  const q = document.getElementById('custSearch').value.toLowerCase();
  fetch(`/api/admin/customers?search=${encodeURIComponent(q)}`).then(r=>r.json()).then(customers=>{
    document.getElementById('customersTable').innerHTML = renderCustomersTable(customers);
  });
}
async function editCustomer(id) {
  const customer = await apiFetch(`/api/admin/customers/${id}`).then(r=>r.json());
  const regions = await apiFetch('/api/admin/regions').then(r=>r.json());
  openModal(`<div class="field"><label>الاسم</label><input id="cust-name" value="${customer.name}"></div>
    <div class="field"><label>الهاتف</label><input id="cust-phone" value="${customer.phone}"></div>
    <div class="field"><label>المنطقة</label><select id="cust-region">${regions.map(r=>`<option value="${r.id}" ${r.id===customer.regionId?'selected':''}>${r.name}</option>`).join('')}</select></div>
    <div class="field"><label>العنوان</label><input id="cust-address" value="${customer.address}"></div>
    <button class="btn" onclick="saveCustomer('${id}')">حفظ</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button>`);
}
async function saveCustomer(id) {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const regionId = document.getElementById('cust-region').value;
  const address = document.getElementById('cust-address').value.trim();
  if(!name||!phone) return toast('أكمل الحقول','error');
  await apiFetch(`/api/admin/customers/${id}`,{method:'PATCH',body:JSON.stringify({name,phone,regionId,address})});
  toast('تم التعديل'); closeModal(); loadCustomers();
}

// ========== التقارير ==========
async function loadReports() {
  const reports = await apiFetch('/api/admin/reports/full').then(r=>r.json());
  document.getElementById('content').innerHTML = `<pre style="background:var(--surface);padding:20px;border-radius:12px;">${JSON.stringify(reports,null,2)}</pre>`;
}

// ========== Socket.IO ==========
const socket = io();
socket.on('newOrder',()=>{ toast('طلب جديد'); refreshPage(); });
socket.on('orderCancelled',()=>toast('تم إلغاء طلب','error'));
socket.on('driverArrived',()=>toast('وصل الطيار'));

// بدء التشغيل
navigate('dashboard');
</script>
</body>
</html>
