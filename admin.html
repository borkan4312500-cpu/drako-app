<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>دراكو - لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: #F7F7F7; color: #1A1A1A; max-width: 430px; margin: auto; height: 100vh; overflow: hidden; }
    :root { --brand: #E8180E; --brand-dark: #B80F09; --bg: #F7F7F7; --card: #FFFFFF; --text: #1A1A1A; --text-muted: #7A7A7A; --border: #EBEBEB; }
    .app-container { display: flex; flex-direction: column; height: 100%; }
    .auth-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--bg); }
    .auth-wrapper.hide { display: none; }
    .auth-card { background: white; border-radius: 24px; padding: 32px 24px; width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; }
    .auth-card h1 { font-size: 32px; font-weight: 900; color: var(--brand); margin-bottom: 6px; }
    .field-group { margin-bottom: 16px; text-align: right; }
    .field-wrap input { width: 100%; height: 52px; background: #F9F9F9; border: 1px solid var(--border); border-radius: 12px; padding: 0 48px 0 16px; font-size: 15px; }
    .btn { width: 100%; height: 52px; background: var(--brand); border: none; border-radius: 14px; color: white; font-size: 17px; font-weight: 700; cursor: pointer; }
    .error-msg { color: #F44336; font-size: 13px; margin-top: 8px; display: none; }

    .main-app { display: none; flex-direction: column; height: 100%; }
    .main-app.active { display: flex; }
    .header { padding: 16px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .header h2 { font-size: 20px; }
    .icon-btn { background: #F5F5F5; border: none; width: 40px; height: 40px; border-radius: 12px; font-size: 20px; cursor: pointer; }
    .tabs { display: flex; padding: 12px 16px; background: white; gap: 8px; border-bottom: 1px solid var(--border); overflow-x: auto; flex-wrap: wrap; }
    .tab { padding: 8px 16px; border-radius: 20px; background: #F5F5F5; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .tab.active { background: var(--brand); color: white; }
    .content { flex: 1; overflow-y: auto; padding: 16px; }
    .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .stat-grid { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: white; border-radius: 16px; padding: 16px; flex: 1 1 45%; box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-align: center; }
    .stat-card h3 { font-size: 14px; color: var(--text-muted); }
    .stat-card .number { font-size: 28px; font-weight: 900; color: var(--brand); }
    .table-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; align-items: center; font-size: 14px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .badge-pending { background: #FFF3E0; color: #E65100; }
    .badge-approved { background: #E8F5E9; color: #1B5E20; }
    .badge-rejected { background: #FFEBEE; color: #B71C1C; }
    .btn-sm { padding: 6px 12px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; margin: 0 4px; }
    .btn-approve { background: #4CAF50; color: white; }
    .btn-reject { background: #F44336; color: white; }
    .empty { text-align: center; color: #888; margin-top: 40px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A1A1A; color: white; padding: 12px 24px; border-radius: 100px; z-index: 9999; transition: 0.35s; opacity: 0; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
<div class="app-container">
  <!-- شاشة تسجيل الدخول -->
  <div class="auth-wrapper" id="authWrapper">
    <div class="auth-card">
      <div style="font-size: 48px;">🛡️</div>
      <h1>لوحة التحكم</h1>
      <p>سجّل دخولك كأدمن</p>
      <div class="field-group">
        <label>رقم الهاتف</label>
        <div class="field-wrap"><span style="position:absolute; right:14px; top:14px;">📱</span><input type="tel" id="adminPhone" placeholder="01000000000"></div>
      </div>
      <div class="field-group">
        <label>كلمة المرور</label>
        <div class="field-wrap"><span style="position:absolute; right:14px; top:14px;">🔒</span><input type="password" id="adminPass" placeholder="123456"></div>
      </div>
      <button class="btn" onclick="adminLogin()">دخول</button>
      <div class="error-msg" id="loginError">بيانات الدخول خاطئة</div>
    </div>
  </div>

  <!-- الواجهة الرئيسية -->
  <div class="main-app" id="mainApp">
    <div class="header">
      <h2 id="headerTitle">لوحة التحكم</h2>
      <button class="icon-btn" onclick="logout()">🚪</button>
    </div>
    <div class="tabs" id="mainTabs">
      <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 الرئيسية</div>
      <div class="tab" data-tab="restaurants" onclick="switchTab('restaurants')">🍽️ مطاعم</div>
      <div class="tab" data-tab="drivers" onclick="switchTab('drivers')">🛵 طيارين</div>
      <div class="tab" data-tab="markets" onclick="switchTab('markets')">🛒 أسواق</div>
      <div class="tab" data-tab="pharmacies" onclick="switchTab('pharmacies')">💊 صيدليات</div>
      <div class="tab" data-tab="customers" onclick="switchTab('customers')">👥 عملاء</div>
      <div class="tab" data-tab="regions" onclick="switchTab('regions')">📍 مناطق</div>
      <div class="tab" data-tab="recharge" onclick="switchTab('recharge')">💰 طلبات الشحن</div>
    </div>
    <div class="content" id="tabContent"></div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const API = '/api';
let currentAdmin = null;
let currentTab = 'dashboard';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ========== Auth ==========
async function adminLogin() {
  const phone = document.getElementById('adminPhone').value.trim();
  const pass = document.getElementById('adminPass').value;
  if (!phone || !pass) return showToast('⚠️ أكمل البيانات');
  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password: pass })
    });
    const data = await res.json();
    if (data.error || data.user.role !== 'ADMIN') {
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    currentAdmin = data.user;
    document.getElementById('authWrapper').classList.add('hide');
    document.getElementById('mainApp').classList.add('active');
    switchTab('dashboard');
  } catch (e) { showToast('❌ فشل الاتصال'); }
}

function logout() {
  fetch('/logout');
  currentAdmin = null;
  document.getElementById('mainApp').classList.remove('active');
  document.getElementById('authWrapper').classList.remove('hide');
}

// ========== Tab Navigation ==========
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('headerTitle').innerText = {
    dashboard: 'لوحة التحكم',
    restaurants: 'المطاعم',
    drivers: 'الطيارين',
    markets: 'الأسواق',
    pharmacies: 'الصيدليات',
    customers: 'العملاء',
    regions: 'المناطق',
    recharge: 'طلبات الشحن'
  }[tab] || '';
  loadTabContent(tab);
}

async function loadTabContent(tab) {
  const container = document.getElementById('tabContent');
  switch (tab) {
    case 'dashboard': await loadDashboard(); break;
    case 'restaurants': await loadRestaurants(); break;
    case 'drivers': await loadDrivers(); break;
    case 'markets': await loadMarkets(); break;
    case 'pharmacies': await loadPharmacies(); break;
    case 'customers': await loadCustomers(); break;
    case 'regions': await loadRegions(); break;
    case 'recharge': await loadRechargeRequests(); break;
  }
}

// ========== Dashboard ==========
async function loadDashboard() {
  const container = document.getElementById('tabContent');
  try {
    const res = await fetch(API + '/admin/dashboard', { credentials: 'include' });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    container.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><h3>طلبات اليوم</h3><div class="number">${data.todayOrders}</div></div>
        <div class="stat-card"><h3>طلبات نشطة</h3><div class="number">${data.activeOrders}</div></div>
        <div class="stat-card"><h3>المطاعم</h3><div class="number">${data.restaurants}</div></div>
        <div class="stat-card"><h3>الطيارين</h3><div class="number">${data.drivers}</div></div>
      </div>
      <div class="card"><h3>إجمالي الإيرادات</h3><div style="font-size:24px; font-weight:900; color:var(--brand);">${data.totalRevenue} ج</div></div>
    `;
  } catch(e) { container.innerHTML = '<div class="empty">⚠️ خطأ في التحميل</div>'; }
}

// ========== Recharge Requests (القسم الجديد) ==========
async function loadRechargeRequests() {
  const container = document.getElementById('tabContent');
  container.innerHTML = '<div class="empty">⏳ جاري التحميل...</div>';
  try {
    const res = await fetch(API + '/admin/recharge-requests?status=PENDING', { credentials: 'include' });
    if (res.status === 401) { logout(); return; }
    const requests = await res.json();
    if (!requests.length) {
      container.innerHTML = '<div class="empty">✅ لا توجد طلبات شحن معلقة</div>';
      return;
    }
    let html = '<h3 style="margin-bottom:16px;">طلبات الشحن المعلقة</h3>';
    requests.forEach(req => {
      html += `
        <div class="card">
          <div class="table-row"><span>🧑‍✈️ السائق</span><strong>${req.driverName || '—'}</strong></div>
          <div class="table-row"><span>📱 الهاتف</span><strong>${req.driverPhone || '—'}</strong></div>
          <div class="table-row"><span>💰 المبلغ</span><strong>${req.amount} ج</strong></div>
          <div class="table-row"><span>🔢 آخر 4 أرقام</span><strong>${req.last4digits}</strong></div>
          <div class="table-row"><span>📅 التاريخ</span><strong>${new Date(req.createdAt).toLocaleString('ar-EG')}</strong></div>
          <div style="margin-top:12px; display:flex; gap:8px;">
            <button class="btn-sm btn-approve" onclick="approveRecharge('${req.id}')">✅ موافقة</button>
            <button class="btn-sm btn-reject" onclick="rejectRecharge('${req.id}')">❌ رفض</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<div class="empty">⚠️ خطأ في التحميل</div>';
  }
}

async function approveRecharge(id) {
  if (!confirm('تأكيد الموافقة على طلب الشحن؟ سيتم إضافة الرصيد للسائق.')) return;
  try {
    const res = await fetch(API + '/admin/recharge-requests/' + id + '/approve', {
      method: 'PATCH',
      credentials: 'include'
    });
    const data = await res.json();
    if (data.error) return showToast('❌ ' + data.error);
    showToast('✅ تمت الموافقة وإضافة الرصيد');
    loadRechargeRequests(); // تحديث القائمة
  } catch(e) { showToast('❌ فشل الاتصال'); }
}

async function rejectRecharge(id) {
  if (!confirm('تأكيد رفض طلب الشحن؟')) return;
  try {
    const res = await fetch(API + '/admin/recharge-requests/' + id + '/reject', {
      method: 'PATCH',
      credentials: 'include'
    });
    const data = await res.json();
    if (data.error) return showToast('❌ ' + data.error);
    showToast('🚫 تم رفض الطلب');
    loadRechargeRequests();
  } catch(e) { showToast('❌ فشل الاتصال'); }
}

// ========== باقي الأقسام (بشكل مختصر للتوضيح) ==========
async function loadRestaurants() {
  const container = document.getElementById('tabContent');
  try {
    const res = await fetch(API + '/admin/restaurants', { credentials: 'include' });
    const list = await res.json();
    container.innerHTML = list.length ? list.map(r => `<div class="card"><strong>${r.name}</strong> | المالك: ${r.ownerName || ''} | ${r.isOpen ? '🟢 مفتوح' : '🔴 مغلق'}</div>`).join('') : '<div class="empty">لا توجد مطاعم</div>';
  } catch(e) { container.innerHTML = '<div class="empty">⚠️ خطأ</div>'; }
}

async function loadDrivers() {
  const container = document.getElementById('tabContent');
  try {
    const res = await fetch(API + '/admin/drivers', { credentials: 'include' });
    const list = await res.json();
    container.innerHTML = list.length ? list.map(d => `<div class="card"><strong>${d.name}</strong> | 📱 ${d.phone} | أرباح: ${d.earnings} ج | متاح: ${d.isAvailable ? '✅' : '❌'}</div>`).join('') : '<div class="empty">لا يوجد طيارين</div>';
  } catch(e) { container.innerHTML = '<div class="empty">⚠️ خطأ</div>'; }
}

async function loadMarkets() {
  const container = document.getElementById('tabContent');
  try {
    const res = await fetch(API + '/admin/markets', { credentials: 'include' });
    const list = await res.json();
    container.innerHTML = list.length ? list.map(m => `<div class="card"><strong>${m.name}</strong> | ${m.isOpen ? '🟢' : '🔴'}</div>`).join('') : '<div class="empty">لا توجد أسواق</div>';
  } catch(e) { container.innerHTML = '<div class="empty">⚠️ خطأ</div>'; }
}

async function loadPharmacies() {
  const container = document.getElementById('tabContent');
  try {
    const res = await fetch(API + '/admin/pharmacies', { credentials: 'include' });
    const list = await res.json();
    container.innerHTML = list.length ? list.map(p => `<div class="card"><strong>${p.name}</strong> | ${p.isOpen ? '🟢' : '🔴'}</div>`).join('') : '<div class="empty">لا توجد صيدليات</div>';
  } catch(e) { container.innerHTML = '<div class="empty">⚠️ خطأ</div>'; }
}

async function loadCustomers() {
  const container = document.getElementById('tabContent');
  try {
    const res = await fetch(API + '/admin/customers', { credentials: 'include' });
    const list = await res.json();
    container.innerHTML = list.length ? list.map(c => `<div class="card"><strong>${c.name}</strong> | 📱 ${c.phone} | منطقة: ${c.regionName}</div>`).join('') : '<div class="empty">لا يوجد عملاء</div>';
  } catch(e) { container.innerHTML = '<div class="empty">⚠️ خطأ</div>'; }
}

async function loadRegions() {
  const container = document.getElementById('tabContent');
  try {
    const res = await fetch(API + '/admin/regions', { credentials: 'include' });
    const list = await res.json();
    container.innerHTML = list.length ? list.map(r => `<div class="card"><strong>${r.name}</strong> | رسوم: ${r.fee} ج</div>`).join('') : '<div class="empty">لا توجد مناطق</div>';
  } catch(e) { container.innerHTML = '<div class="empty">⚠️ خطأ</div>'; }
}

// ========== Check session on load ==========
async function checkSession() {
  try {
    const res = await fetch(API + '/whoami', { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      if (data.user.role === 'ADMIN') {
        currentAdmin = data.user;
        document.getElementById('authWrapper').classList.add('hide');
        document.getElementById('mainApp').classList.add('active');
        switchTab('dashboard');
      }
    }
  } catch(e) {}
}
checkSession();
</script>
</body>
</html>
