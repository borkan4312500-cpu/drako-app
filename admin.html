<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drako — لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<style>
:root{
  --bg:#0D0F14; --surface:#161B24; --surface2:#1E2535; --surface3:#252D40;
  --border:#2A3348; --orange:#FF6B00; --orange2:#FF8C3A;
  --orange-glow:rgba(255,107,0,.18); --orange-dim:rgba(255,107,0,.08);
  --text:#F0F2F8; --text2:#8B95A8; --text3:#55627A;
  --green:#00D68F; --blue:#3B82F6; --red:#F05252; --yellow:#FBBF24;
  --sidebar-w:260px; --header-h:64px; --radius:14px; --radius-lg:20px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
body{background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow:hidden;}

.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--surface);
  border-left:1px solid var(--border);display:flex;flex-direction:column;
  height:100vh;position:sticky;top:0;overflow-y:auto;z-index:10;
}
.sb-logo{padding:20px 18px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.sb-logo-mark{
  width:42px;height:42px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;color:#fff;
  box-shadow:0 4px 16px var(--orange-glow);
}
.sb-logo-name{font-size:18px;font-weight:900;color:var(--text);}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;
  border-radius:11px;cursor:pointer;font-size:13.5px;font-weight:600;
  color:var(--text2);transition:all .18s;position:relative;
}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--orange-dim);color:var(--orange);}
.nav-item.active::before{content:'';position:absolute;right:-10px;top:20%;height:60%;width:3px;background:var(--orange);border-radius:99px;}
.nav-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--surface2);}
.nav-item.active .nav-icon{background:var(--orange-dim);}
.nav-badge{margin-right:auto;background:var(--orange);color:#fff;font-size:10px;font-weight:800;border-radius:99px;padding:1px 7px;min-width:20px;text-align:center;}
.sb-footer{padding:12px 10px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius);background:var(--surface2);}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.sb-user-name{font-size:13px;font-weight:700;}
.sb-logout{color:var(--text3);font-size:18px;cursor:pointer;text-decoration:none;}

.main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;}
.topbar-title{font-size:20px;font-weight:800;}
.topbar-actions{margin-right:auto;display:flex;align-items:center;gap:10px;}
.tb-icon-btn{width:38px;height:38px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;}
.tb-icon-btn:hover{background:var(--surface3);}
.content{flex:1;overflow-y:auto;padding:24px;}

.toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;min-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:toastIn .3s ease;}
.toast.success{border-color:var(--green);} .toast.error{border-color:var(--red);}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:all .2s;}
.stat-card:hover{border-color:rgba(255,107,0,.3);transform:translateY(-2px);}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.sc-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.sc-value{font-size:28px;font-weight:900;}
.sc-label{font-size:12px;color:var(--text3);}

.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:20px;overflow:hidden;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.sec-title{font-size:15px;font-weight:800;}
.table-wrap{overflow-x:auto;max-height:500px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 20px;text-align:right;font-size:11px;font-weight:700;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);text-transform:uppercase;position:sticky;top:0;z-index:1;}
tbody td{padding:13px 20px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:hover{background:var(--surface2);}

.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-green{background:rgba(0,214,143,.12);color:var(--green);}
.badge-orange{background:var(--orange-dim);color:var(--orange);}
.badge-red{background:rgba(240,82,82,.12);color:var(--red);}
.badge-gray{background:var(--surface3);color:var(--text3);}
.badge-blue{background:rgba(59,130,246,.12);color:var(--blue);}
.badge-yellow{background:rgba(251,191,36,.12);color:var(--yellow);}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .18s;}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:var(--orange2);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface3);color:var(--text);}
.btn-danger{background:rgba(240,82,82,.12);color:var(--red);border:1px solid rgba(240,82,82,.2);}
.btn-success{background:rgba(0,214,143,.12);color:var(--green);border:1px solid rgba(0,214,143,.2);}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:8px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0;width:100%;max-width:500px;overflow:hidden;animation:modalUp .3s cubic-bezier(.34,1.2,.64,1);}
@keyframes modalUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}
.modal-title{font-size:16px;font-weight:800;}
.modal-close{width:30px;height:30px;background:var(--surface2);border:none;border-radius:8px;cursor:pointer;color:var(--text3);font-size:18px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--surface3);color:var(--red);}
.modal-body{padding:20px;}
.modal-foot{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);}
.modal-foot .btn{flex:1;height:42px;justify-content:center;}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:12px;font-weight:700;color:var(--text3);}
.field input,.field select,.field textarea{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:13px;font-family:'Cairo';color:var(--text);outline:none;}
.field input:focus,.field select:focus{border-color:var(--orange);}
.field input[type="file"]{padding:5px;background:var(--surface2);}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:22px;font-weight:900;}
.page-sub{font-size:12px;color:var(--text3);}
.empty-state{text-align:center;padding:48px;color:var(--text3);}
.empty-state .icon{font-size:40px;margin-bottom:12px;}
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius);}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.tab-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .2s;}
.tab-btn.active{background:var(--orange);color:#fff;border-color:var(--orange);}
</style>
</head>
<body>
<div class="toast-wrap" id="toast-wrap"></div>

<div class="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark">D</div><div><div class="sb-logo-name">Drako</div></div></div>
  <div class="sb-nav">
    <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')"><div class="nav-icon">🏠</div>لوحة التحكم</div>
    <div class="nav-item" id="nav-orders" onclick="navigate('orders')"><div class="nav-icon">📦</div>الطلبات<div class="nav-badge" id="pending-badge">0</div></div>
    <div class="nav-item" id="nav-dispatch" onclick="navigate('dispatch')"><div class="nav-icon">🛵</div>توزيع الطلبات</div>
    <div class="nav-item" id="nav-restaurants" onclick="navigate('restaurants')"><div class="nav-icon">🍽️</div>المطاعم</div>
    <div class="nav-item" id="nav-markets" onclick="navigate('markets')"><div class="nav-icon">🛒</div>الأسواق</div>
    <div class="nav-item" id="nav-pharmacies" onclick="navigate('pharmacies')"><div class="nav-icon">💊</div>الصيدليات</div>
    <div class="nav-item" id="nav-drivers" onclick="navigate('drivers')"><div class="nav-icon">👨‍✈️</div>الطيارين</div>
    <div class="nav-item" id="nav-products" onclick="navigate('products')"><div class="nav-icon">📋</div>المنتجات</div>
    <div class="nav-item" id="nav-categories" onclick="navigate('categories')"><div class="nav-icon">🏷️</div>التصنيفات</div>
    <div class="nav-item" id="nav-regions" onclick="navigate('regions')"><div class="nav-icon">🌍</div>المناطق</div>
    <div class="nav-item" id="nav-customers" onclick="navigate('customers')"><div class="nav-icon">👥</div>العملاء</div>
    <div class="nav-item" id="nav-reports" onclick="navigate('reports')"><div class="nav-icon">📊</div>التقارير</div>
    <div class="nav-item" id="nav-settings" onclick="navigate('settings')"><div class="nav-icon">⚙️</div>الإعدادات</div>
  </div>
  <div class="sb-footer"><div class="sb-user"><div class="sb-avatar">A</div><div><div class="sb-user-name">أدمن دراكو</div></div><a href="/logout" class="sb-logout">⏻</a></div></div>
</div>

<div class="main-wrap">
  <div class="topbar"><div><div class="topbar-title" id="topbar-title">لوحة التحكم</div></div><div class="topbar-actions"><button class="btn btn-primary btn-sm" onclick="testOrder()">🧪 طلب تجريبي</button><div class="tb-icon-btn" onclick="refreshPage()">🔄</div></div></div>
  <div class="content" id="content"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal"><div class="modal-head"><div class="modal-title" id="modal-title"></div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modal-body"></div><div class="modal-foot" id="modal-foot"></div></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ========== Helper Functions ==========
async function checkAuth() {
  try {
    const res = await fetch('/api/admin/stats', { credentials: 'include' });
    if (res.status === 401) window.location.href = '/login.html';
  } catch(e) { window.location.href = '/login.html'; }
}
checkAuth();

function generateToneWAV(frequency, duration, type = 'sine', volume = 0.3) { /* ... same as before ... */ return URL.createObjectURL(new Blob()); }
const soundInstances = {};
function createSound(name, ...tones) { soundInstances[name] = tones.map(t => new Howl({ src: [t], format: ['wav'], volume: 0.5 })); }
function playSound(name) { if (soundInstances[name]) soundInstances[name].forEach(h => h.play()); }
createSound('adminNewOrder', generateToneWAV(800,0.15,'square'), generateToneWAV(1000,0.15,'square'));
createSound('orderCancelled', generateToneWAV(400,0.3,'triangle'));
createSound('driverArrived', generateToneWAV(600,0.1,'sine'), generateToneWAV(800,0.1,'sine'));
createSound('orderAccepted', generateToneWAV(600,0.2,'sine'));

const API = '/api';
let currentPage = 'dashboard';
let allOrdersCache = [], allRestaurantsCache = [], allDriversCache = [], allProductsCache = [];

async function apiFetch(url, options = {}) {
  const res = await fetch(url, { ...options, credentials: 'include', headers: { ...(options.headers || {}), 'Content-Type': options.body instanceof FormData ? undefined : 'application/json' } });
  return res;
}

function toast(msg, type = 'success') {
  const w = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  w.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function openModal(title, body, foot) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-foot').innerHTML = foot || '';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function fmtTime(iso) { return iso ? new Date(iso).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }) : '—'; }
function fmtDate(iso) { return iso ? new Date(iso).toLocaleDateString('ar-EG') : '—'; }

const STATUS_AR = { PENDING: 'في الانتظار', ACCEPTED: 'مقبول', PREPARING: 'يتحضر', READY: 'جاهز', DRIVER_ASSIGNED: 'مع طيار', ON_THE_WAY: 'في الطريق', DELIVERED: 'تم التوصيل', CANCELLED: 'ملغي' };
function statusBadge(s) {
  const cl = { PENDING: 'badge-yellow', ACCEPTED: 'badge-blue', PREPARING: 'badge-orange', READY: 'badge-blue', DRIVER_ASSIGNED: 'badge-orange', ON_THE_WAY: 'badge-orange', DELIVERED: 'badge-green', CANCELLED: 'badge-red' };
  return `<span class="badge ${cl[s] || 'badge-gray'}">${STATUS_AR[s] || s}</span>`;
}

function refreshPage() { renderPage(currentPage); }
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
  document.getElementById('nav-' + page)?.classList.add('active');
  const titles = { dashboard: 'لوحة التحكم', orders: 'الطلبات', dispatch: 'توزيع الطلبات', restaurants: 'المطاعم', markets: 'الأسواق', pharmacies: 'الصيدليات', drivers: 'الطيارين', products: 'المنتجات', categories: 'التصنيفات', regions: 'المناطق', customers: 'العملاء', reports: 'التقارير', settings: 'الإعدادات' };
  document.getElementById('topbar-title').textContent = titles[page] || page;
  renderPage(page);
}

async function renderPage(page) {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="skeleton" style="height:200px"></div>';
  try {
    if (page === 'dashboard') await loadDashboard();
    else if (page === 'orders') await loadOrders();
    else if (page === 'dispatch') await loadDispatch();
    else if (page === 'restaurants') await loadRestaurants();
    else if (page === 'markets') await loadMarkets();
    else if (page === 'pharmacies') await loadPharmacies();
    else if (page === 'drivers') await loadDrivers();
    else if (page === 'products') await loadProducts();
    else if (page === 'categories') await loadCategories();
    else if (page === 'regions') await loadRegions();
    else if (page === 'customers') await loadCustomers();
    else if (page === 'reports') await loadReports();
    else if (page === 'settings') loadSettings();
  } catch (e) { toast('خطأ في التحميل', 'error'); console.error(e); }
}

// ========== Dashboard ==========
async function loadDashboard() {
  const stats = await apiFetch(API + '/admin/stats').then(r => r.json()).catch(() => ({}));
  const orders = await apiFetch(API + '/orders').then(r => r.json()).catch(() => []);
  const platformRev = await apiFetch(API + '/admin/platform-revenue').then(r => r.json()).catch(() => ({}));
  allOrdersCache = orders;
  const today = orders.filter(o => new Date(o.createdAt).toDateString() === new Date().toDateString());
  const active = orders.filter(o => !['DELIVERED', 'CANCELLED'].includes(o.status));
  const pending = orders.filter(o => o.status === 'PENDING').length;
  document.getElementById('pending-badge').textContent = pending || '';
  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="sc-top"><div><div class="sc-value">${(platformRev.today || 0)} ج</div><div class="sc-label">نسبة المنصة اليوم</div></div><div class="sc-icon" style="background:rgba(255,107,0,.12)">🏢</div></div></div>
      <div class="stat-card" onclick="navigate('orders')"><div class="sc-top"><div><div class="sc-value">${today.length}</div><div class="sc-label">طلبات اليوم</div></div><div class="sc-icon" style="background:var(--orange-dim)">📦</div></div></div>
      <div class="stat-card" onclick="navigate('orders')"><div class="sc-top"><div><div class="sc-value">${active.length}</div><div class="sc-label">طلبات نشطة</div></div><div class="sc-icon" style="background:rgba(251,191,36,.12)">🔥</div></div></div>
      <div class="stat-card" onclick="navigate('restaurants')"><div class="sc-top"><div><div class="sc-value">${stats.restaurants || 0}</div><div class="sc-label">المطاعم</div></div><div class="sc-icon" style="background:rgba(59,130,246,.12)">🍽️</div></div></div>
      <div class="stat-card"><div class="sc-top"><div><div class="sc-value">${(stats.totalRevenue || 0).toLocaleString()}</div><div class="sc-label">إجمالي الإيرادات</div></div><div class="sc-icon" style="background:rgba(0,214,143,.12)">💰</div></div></div>
    </div>
    <div class="section"><div class="sec-head"><div class="sec-title">⚡ آخر الطلبات</div></div>
    ${orders.slice(-6).reverse().map(o => `<div style="display:flex;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer" onclick="viewOrder('${o.id}')"><div><div style="color:var(--orange);font-weight:700">#${(o.id || '').slice(-6)}</div><div style="font-size:12px;color:var(--text2)">${o.customerName || '—'} • ${o.regionName || o.address || '—'}</div></div><div>${statusBadge(o.status)}</div></div>`).join('')}</div>`;
}

// ========== Orders (similar to before but improved) ==========
async function loadOrders() {
  const orders = await apiFetch(API + '/orders').then(r => r.json()).catch(() => []);
  allOrdersCache = orders;
  window._orders = orders.slice().reverse();
  document.getElementById('content').innerHTML = `
    <div class="page-header"><div><div class="page-title">📦 الطلبات</div></div>
      <input type="text" id="ord-search" placeholder="بحث..." style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px;font-size:13px;width:200px" oninput="applyCurrentTabFilter()">
    </div>
    <div class="tab-bar" id="order-tabs">
      <div class="tab-btn active" onclick="switchOrderTab('new')">🆕 طلبات جديدة</div>
      <div class="tab-btn" onclick="switchOrderTab('in-progress')">⏳ قيد التنفيذ</div>
      <div class="tab-btn" onclick="switchOrderTab('completed')">✅ مكتملة</div>
    </div>
    <div class="section"><div class="table-wrap"><table><thead><tr><th>رقم</th><th>العميل</th><th>المنطقة</th><th>العنوان</th><th>المطعم</th><th>الأصناف</th><th>المبلغ</th><th>الحالة</th><th>الطيار</th><th>الوقت</th><th>إجراء</th></tr></thead><tbody id="orders-tbody">${renderOrderRows(window._orders)}</tbody></tr></div></div>`;
  window._currentOrderTab = 'new';
  applyCurrentTabFilter();
}
function switchOrderTab(tab) {
  document.querySelectorAll('#order-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  event?.target?.classList.add('active');
  window._currentOrderTab = tab;
  applyCurrentTabFilter();
}
function applyCurrentTabFilter() {
  const tab = window._currentOrderTab || 'new';
  let filtered = window._orders || [];
  if (tab === 'new') filtered = filtered.filter(o => !o.adminApproved && o.status !== 'CANCELLED');
  else if (tab === 'in-progress') filtered = filtered.filter(o => o.adminApproved && !['DELIVERED', 'CANCELLED'].includes(o.status));
  else if (tab === 'completed') filtered = filtered.filter(o => ['DELIVERED', 'CANCELLED'].includes(o.status));
  const q = document.getElementById('ord-search')?.value || '';
  if (q) filtered = filtered.filter(o => (o.customerName || '').includes(q) || (o.id || '').includes(q));
  document.getElementById('orders-tbody').innerHTML = renderOrderRows(filtered);
}
function renderOrderRows(list) {
  if (!list.length) return `<td><td colspan="11"><div class="empty-state"><div class="icon">📭</div><div class="msg">لا توجد طلبات</div></div></td></tr>`;
  return list.map(o => {
    const actions = getOrderActions(o);
    const itemsDetail = (o.items || []).length === 0 ? '—' : o.items.map(i => `<div><strong>${i.name || ''}</strong> × ${i.quantity || 1} (${i.price || 0} ج)</div>${i.selectedOptions?.length ? `<div style="color:var(--text3); font-size:11px;">${i.selectedOptions.map(opt => opt.value).join('، ')}</div>` : ''}${i.notes ? `<div style="color:var(--text3); font-size:10px;">📝 ${i.notes}</div>` : ''}`).join('<div style="margin:4px 0; border-top:1px dotted var(--border);"></div>');
    return `<tr>
      <td style="color:var(--orange);font-weight:800">#${(o.id || '').slice(-6)}</td>
      <td><div style="font-weight:600">${o.customerName || '—'}</div><div style="font-size:11px;color:var(--text3)">${o.customerPhone || ''}</div></td>
      <td>${o.regionName || '—'}</td>
      <td style="color:var(--text2)">${o.address || '—'}</td>
      <td>${o.restaurantName || '—'}</td>
      <td style="max-width:200px;white-space:normal">${itemsDetail}</td>
      <td style="font-weight:700;color:var(--orange)">${o.total || 0} ج</td>
      <td>${statusBadge(o.status)}</td>
      <td>${o.driverName || '—'}</td>
      <td style="font-size:12px;color:var(--text3)">${fmtTime(o.createdAt)}<br>${fmtDate(o.createdAt)}</td>
      <td style="cursor:default" onclick="event.stopPropagation()">${actions}</td>
    </tr>`;
  }).join('');
}
function getOrderActions(o) {
  if (!o.adminApproved && o.status !== 'CANCELLED') {
    return `<button class="btn btn-success btn-sm" onclick="approveOrder('${o.id}')">✅ موافقة</button>
            <button class="btn btn-danger btn-sm" onclick="rejectOrder('${o.id}')">❌ رفض</button>
            <button class="btn btn-ghost btn-sm" onclick="editOrder('${o.id}')">✏️ تعديل</button>`;
  }
  if (o.adminApproved && o.status === 'PENDING') return '<span style="color:var(--green)">✓ معتمد</span>';
  return '—';
}

      <div class="field"><label>التصنيف</label><input id="prod-cat"></div>
      <div class="field"><label>المطعم</label><select id="prod-rest">${restOptions}</select></div>
      <div class="field"><label>صورة</label><input type="file" id="prod-img" accept="image/*"></div>
    `, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="addProduct()">إضافة</button>`);
  });
}
async function addProduct() {
  const fd = new FormData();
  fd.append('name', document.getElementById('prod-name').value);
  fd.append('description', document.getElementById('prod-desc').value);
  fd.append('price', document.getElementById('prod-price').value);
  fd.append('category', document.getElementById('prod-cat').value);
  fd.append('restaurantId', document.getElementById('prod-rest').value);
  const img = document.getElementById('prod-img').files[0];
  if (img) fd.append('image', img);
  const res = await apiFetch(API + '/admin/products', { method: 'POST', body: fd });
  const data = await res.json();
  if (data.error) toast(data.error, 'error');
  else { toast('تمت الإضافة'); closeModal(); loadProducts(); }
}
async function deleteProduct(id) { if (confirm('حذف المنتج؟')) { await apiFetch(API + '/admin/products/' + id, { method: 'DELETE' }); loadProducts(); } }

// ========== Categories ==========
async function loadCategories() {
  const res = await apiFetch(API + '/admin/categories').then(r => r.json()).catch(() => []);
  document.getElementById('content').innerHTML = `<div class="page-header"><div><div class="page-title">🏷️ التصنيفات</div></div><button class="btn btn-primary" onclick="showAddCategory()">+ إضافة</button></div>
    <div class="section"><div class="table-wrap"><table><thead><tr><th>#</th><th>الاسم</th><th>إجراءات</th></tr></thead><tbody>
    ${res.length ? res.map((c, i) => `<tr><td>${i+1}</td><td style="font-weight:600">${c.name}</td><td><button class="btn btn-danger btn-sm" onclick="deleteCategory('${c.id}')">🗑️</button></td></tr>`).join('') : `<tr><td colspan="3"><div class="empty-state"><div class="icon">🏷️</div><div class="msg">لا توجد تصنيفات</div></div><td></tr>`}
    </tbody></table></div></div>`;
}
function showAddCategory() { openModal('إضافة تصنيف', `<div class="field"><label>الاسم</label><input id="cat-name"></div>`, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="addCategory()">إضافة</button>`); }
async function addCategory() {
  const name = document.getElementById('cat-name').value;
  if (!name) return toast('أدخل اسماً', 'error');
  await apiFetch(API + '/admin/categories', { method: 'POST', body: JSON.stringify({ name }) });
  toast('تمت الإضافة'); closeModal(); loadCategories();
}
async function deleteCategory(id) { if (confirm('حذف؟')) { await apiFetch(API + '/admin/categories/' + id, { method: 'DELETE' }); loadCategories(); } }

// ========== Regions ==========
async function loadRegions() {
  const res = await apiFetch(API + '/admin/regions').then(r => r.json()).catch(() => []);
  document.getElementById('content').innerHTML = `<div class="page-header"><div><div class="page-title">🌍 مناطق التوصيل</div></div><button class="btn btn-primary" onclick="showAddRegion()">+ إضافة</button></div>
    <div class="section"><div class="table-wrap"><table><thead><tr><th>#</th><th>الاسم</th><th>الرسوم</th><th>إجراءات</th></tr></thead><tbody>
    ${res.length ? res.map((r, i) => `<tr><td>${i+1}</td><td style="font-weight:600">${r.name}</td><td style="color:var(--orange);font-weight:700">${r.fee} ج</td><td><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="editRegion('${r.id}','${r.name}',${r.fee})">✏️</button><button class="btn btn-danger btn-sm" onclick="deleteRegion('${r.id}')">🗑️</button></div></td></tr>`).join('') : `<tr><td colspan="4"><div class="empty-state"><div class="icon">🌍</div><div class="msg">لا توجد مناطق</div></div></td></tr>`}
    </tbody></table></div></div>`;
}
function showAddRegion() { openModal('إضافة منطقة', `<div class="field"><label>الاسم</label><input id="reg-name"></div><div class="field"><label>الرسوم</label><input id="reg-fee" type="number"></div>`, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="addRegion()">إضافة</button>`); }
async function addRegion() {
  const name = document.getElementById('reg-name').value;
  const fee = Number(document.getElementById('reg-fee').value);
  if (!name || !fee) return toast('أكمل الحقول', 'error');
  await apiFetch(API + '/admin/regions', { method: 'POST', body: JSON.stringify({ name, fee }) });
  toast('تمت الإضافة'); closeModal(); loadRegions();
}
function editRegion(id, name, fee) { openModal('تعديل منطقة', `<div class="field"><label>الاسم</label><input id="reg-name-e" value="${name}"></div><div class="field"><label>الرسوم</label><input id="reg-fee-e" type="number" value="${fee}"></div>`, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="updateRegion('${id}')">حفظ</button>`); }
async function updateRegion(id) {
  const name = document.getElementById('reg-name-e').value;
  const fee = Number(document.getElementById('reg-fee-e').value);
  await apiFetch(API + '/admin/regions/' + id, { method: 'PATCH', body: JSON.stringify({ name, fee }) });
  toast('تم التعديل'); closeModal(); loadRegions();
}
async function deleteRegion(id) { if (confirm('حذف؟')) { await apiFetch(API + '/admin/regions/' + id, { method: 'DELETE' }); loadRegions(); } }

// ========== Customers ==========
async function loadCustomers() {
  const c = document.getElementById('content');
  c.innerHTML = `<div class="page-header"><div><div class="page-title">👥 العملاء</div></div><input type="text" id="cust-search" placeholder="ابحث عن عميل..." style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px;width:200px" oninput="renderCustomersTable()"></div><div id="customers-table"></div>`;
  await renderCustomersTable();
}
async function renderCustomersTable() {
  const container = document.getElementById('customers-table');
  if (!container) return;
  container.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3)">⏳ جاري التحميل...</div>';
  const search = document.getElementById('cust-search')?.value || '';
  let url = API + '/admin/customers' + (search ? '?search=' + encodeURIComponent(search) : '');
  const res = await apiFetch(url);
  const customers = await res.json();
  if (!customers.length) { container.innerHTML = `<div class="empty-state"><div class="icon">👥</div><div class="msg">لا يوجد عملاء مسجلين</div></div>`; return; }
  container.innerHTML = `<div class="section"><div class="table-wrap"><table><thead><tr><th>الاسم</th><th>الهاتف</th><th>المنطقة</th><th>رسوم التوصيل</th><th>العنوان</th><th>عدد الطلبات</th><th>آخر طلب</th><th>إجراءات</th></tr></thead><tbody>${customers.map(c => `<tr><td style="font-weight:600">${c.name}</td><td>${c.phone}</td><td>${c.regionName}</td><td style="color:var(--orange)">${c.regionFee} ج</td><td>${c.address}</td><td>${c.totalOrders}</td><td>${c.lastOrderDate ? new Date(c.lastOrderDate).toLocaleDateString('ar-EG') : '—'}</td><td><button class="btn btn-ghost btn-sm" onclick="editCustomer('${c.id}')">✏️ تعديل</button></td></tr>`).join('')}</tbody></table></div></div>`;
}
async function editCustomer(id) {
  const res = await apiFetch(API + '/admin/customers/' + id);
  const customer = await res.json();
  const regionsRes = await apiFetch(API + '/admin/regions');
  const regions = await regionsRes.json();
  const regionOptions = regions.map(r => `<option value="${r.id}" ${r.id === customer.regionId ? 'selected' : ''}>${r.name} (${r.fee} ج)</option>`).join('');
  openModal('تعديل بيانات العميل', `<div class="field"><label>الاسم</label><input id="cust-name" value="${customer.name}"></div><div class="field"><label>رقم الهاتف</label><input id="cust-phone" value="${customer.phone}"></div><div class="field"><label>المنطقة</label><select id="cust-region">${regionOptions}</select></div><div class="field"><label>العنوان</label><input id="cust-address" value="${customer.address}"></div>`, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="saveCustomerEdit('${id}')">حفظ</button>`);
}
async function saveCustomerEdit(id) {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const regionId = document.getElementById('cust-region').value;
  const address = document.getElementById('cust-address').value.trim();
  if (!name || !phone || !address) return alert('أكمل جميع الحقول');
  const res = await apiFetch(API + '/admin/customers/' + id, { method: 'PATCH', body: JSON.stringify({ name, phone, regionId, address }) });
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  toast('تم تعديل بيانات العميل'); closeModal(); loadCustomers();
}

// ========== Reports ==========
async function loadReports() {
  const data = await apiFetch(API + '/admin/reports/full').then(r => r.json()).catch(() => null);
  document.getElementById('content').innerHTML = `<div class="page-header"><div><div class="page-title">📊 التقارير الشاملة</div></div></div><div class="tab-bar" id="report-tabs"><div class="tab-btn active" onclick="switchReportTab('daily')">اليوم</div><div class="tab-btn" onclick="switchReportTab('weekly')">الأسبوع</div><div class="tab-btn" onclick="switchReportTab('monthly')">الشهر</div><div class="tab-btn" onclick="switchReportTab('total')">الإجمالي</div></div><div id="report-content"></div>`;
  window._reportData = data; switchReportTab('daily');
}
function switchReportTab(tab) {
  document.querySelectorAll('#report-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  event?.target?.classList.add('active');
  const d = window._reportData;
  if (!d) { document.getElementById('report-content').innerHTML = '<div class="empty-state"><div class="icon">📊</div><div class="msg">لا توجد بيانات كافية</div></div>'; return; }
  const stats = d[tab] || d.daily || { productRevenue: 0, deliveryRevenue: 0, count: 0 };
  const restKey = tab === 'total' ? 'all' : (tab === 'weekly' ? 'week' : (tab === 'monthly' ? 'month' : 'today'));
  const restaurants = d.restaurants?.[restKey] || [];
  const drivers = d.drivers?.[restKey] || [];
  document.getElementById('report-content').innerHTML = `
    <div class="stats-grid" style="margin-bottom:20px;grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="sc-value">${(stats.productRevenue || 0).toLocaleString()} ج</div><div class="sc-label">دخل المنتجات</div></div>
      <div class="stat-card"><div class="sc-value">${(stats.deliveryRevenue || 0).toLocaleString()} ج</div><div class="sc-label">رسوم التوصيل</div></div>
      <div class="stat-card"><div class="sc-value">${stats.count || 0}</div><div class="sc-label">الطلبات</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="section"><div class="sec-head"><div class="sec-title">🍽️ دخل المطاعم (المنتجات)</div></div><div class="table-wrap"><table><thead><tr><th>المطعم</th><th>دخل المنتجات</th><th>نسبة المنصة</th><th>صافي الدخل</th><th>الطلبات</th></tr></thead><tbody>${restaurants.length ? restaurants.map(r => `<tr><td>${r.name}</td><td style="color:var(--orange)">${(r.productRevenue || 0).toLocaleString()} ج</td><td style="color:var(--red)">${(r.platformFee || 0).toLocaleString()} ج</td><td style="color:var(--green)">${(r.netRevenue || 0).toLocaleString()} ج</td><td>${r.count}</td></tr>`).join('') : `<tr><td colspan="5"><div class="empty-state"><div class="msg">لا توجد بيانات</div></div></td></tr>`}</tbody></table></div></div>
      <div class="section"><div class="sec-head"><div class="sec-title">👨‍✈️ عمولات الطيارين (التوصيل)</div></div><div class="table-wrap"><table><thead><tr><th>الطيار</th><th>العمولات</th><th>الطلبات</th></tr></thead><tbody>${drivers.length ? drivers.map(d => `<tr><td>${d.name}</td><td style="color:var(--orange)">${(d.revenue || 0).toLocaleString()} ج</td><td>${d.count}</td></tr>`).join('') : `<tr><td colspan="3"><div class="empty-state"><div class="msg">لا توجد بيانات</div></div></td></tr>`}</tbody></table></div></div>
    </div>`;
}

// ========== Settings ==========
function loadSettings() { document.getElementById('content').innerHTML = `<div class="page-header"><div><div class="page-title">⚙️ الإعدادات</div></div></div><div class="section" style="padding:20px"><p>الإصدار: Drako v2.0</p><a href="/logout" class="btn btn-danger" style="margin-top:16px">⏻ تسجيل الخروج</a></div>`; }

// ========== Test Order ==========
async function testOrder() {
  const restId = prompt('معرف المطعم (من صفحة المطاعم):');
  if (!restId) return;
  const res = await apiFetch(API + '/admin/test-order', { method: 'POST', body: JSON.stringify({ restaurantId: restId }) });
  const data = await res.json();
  if (data.success) { toast('تم إنشاء طلب تجريبي'); navigate('orders'); } else toast(data.error || 'فشل', 'error');
}

// ========== Init ==========
navigate('dashboard');

const socket = io();
socket.on('newOrder', (data) => { playSound('adminNewOrder'); toast('طلب جديد من ' + data.customerName, 'success'); const badge = document.getElementById('pending-badge'); badge.textContent = (parseInt(badge.textContent) || 0) + 1; });
socket.on('orderCancelled', (data) => { playSound('orderCancelled'); toast('تم إلغاء طلب #' + (data.orderId || '').slice(-6), 'error'); });
socket.on('driverArrived', (data) => { playSound('driverArrived'); toast('الطيار ' + (data.driverName || '') + ' وصل لاستلام الطلب', 'info'); });
</script>
</body>
</html>
