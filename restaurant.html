<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سفرة برو — لوحة مطعم متكاملة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<style>
:root{
  --bg:#0D0F14; --surface:#161B24; --surface2:#1E2535; --surface3:#252D40;
  --border:#2A3348; --orange:#FF6B00; --orange2:#FF8C3A;
  --orange-glow:rgba(255,107,0,.18); --orange-dim:rgba(255,107,0,.08);
  --text:#F0F2F8; --text2:#8B95A8; --text3:#55627A;
  --green:#00D68F; --blue:#3B82F6; --red:#F05252; --yellow:#FBBF24;
  --radius:14px; --radius-lg:20px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
body{background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow:hidden;}

.sidebar{ width:260px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto; }
.sb-logo{padding:20px 18px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.sb-logo-mark{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;box-shadow:0 4px 16px var(--orange-glow);}
.sb-logo-text{display:flex;flex-direction:column;}
.sb-logo-name{font-size:18px;font-weight:900;color:var(--text);}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--text2);transition:all .18s;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--orange-dim);color:var(--orange);}
.nav-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--surface2);}
.nav-item.active .nav-icon{background:var(--orange-dim);}
.sb-footer{padding:12px 10px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius);background:var(--surface2);}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.sb-user-name{font-size:13px;font-weight:700;}
.sb-user-role{font-size:11px;color:var(--text3);}
.sb-logout{color:var(--text3);font-size:18px;cursor:pointer;text-decoration:none;}

.main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;}
.topbar-title{font-size:20px;font-weight:800;}
.topbar-sub{font-size:12px;color:var(--text3);}
.content{flex:1;overflow-y:auto;padding:24px;}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:all .2s;}
.stat-card:hover{border-color:rgba(255,107,0,.3);transform:translateY(-2px);}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.sc-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.sc-value{font-size:28px;font-weight:900;}
.sc-label{font-size:12px;color:var(--text3);}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:20px;overflow:hidden;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.sec-title{font-size:15px;font-weight:800;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 20px;text-align:right;font-size:11px;font-weight:700;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);}
tbody td{padding:13px 20px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:hover{background:var(--surface2);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-green{background:rgba(0,214,143,.12);color:var(--green);}
.badge-orange{background:var(--orange-dim);color:var(--orange);}
.badge-red{background:rgba(240,82,82,.12);color:var(--red);}
.badge-blue{background:rgba(59,130,246,.12);color:var(--blue);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;border:none;transition:all .18s;}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{background:var(--orange2);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface3);color:var(--text);}
.btn-danger{background:rgba(240,82,82,.12);color:var(--red);border:1px solid rgba(240,82,82,.2);}
.btn-success{background:rgba(0,214,143,.12);color:var(--green);border:1px solid rgba(0,214,143,.2);}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:8px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}
.modal-title{font-size:16px;font-weight:800;}
.modal-close{width:30px;height:30px;background:var(--surface2);border:none;border-radius:8px;cursor:pointer;color:var(--text3);font-size:18px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px;max-height:60vh;overflow-y:auto;}
.modal-foot{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);}
.modal-foot .btn{flex:1;height:42px;justify-content:center;}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:12px;font-weight:700;color:var(--text3);}
.field input,.field select,.field textarea{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:13px;color:var(--text);outline:none;}

.filter-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
.filter-bar input[type="date"]{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--text);outline:none;}

.empty-state{text-align:center;padding:48px;color:var(--text3);}
.empty-state .icon{font-size:40px;margin-bottom:12px;}

.btn-add-row{background:var(--surface2);border:1px dashed var(--border);color:var(--text2);padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px;margin-top:4px;}
.group-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px;}
.option-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
.option-row input{flex:1;}

.tab-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .2s;}
.tab-btn.active{background:var(--orange);color:#fff;border-color:var(--orange);}

.templates-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:8px;background:var(--surface2);border-radius:12px;}
.btn-template{background:var(--surface3);border:1px solid var(--border);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;}
.btn-template:hover{background:var(--orange);color:#0C0E13;}
.product-type-selector{display:flex;gap:12px;margin-bottom:20px;}
.type-option{flex:1;text-align:center;padding:10px;border-radius:12px;background:var(--surface2);cursor:pointer;border:2px solid transparent;}
.type-option.selected{border-color:var(--orange);background:var(--orange-dim);}

.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;display:flex;flex-wrap:wrap;align-items:center;gap:24px;margin-bottom:20px;}
.profile-image{width:100px;height:100px;border-radius:20px;object-fit:cover;border:3px solid var(--orange);}
.profile-info{flex:1;}
.profile-name{font-size:24px;font-weight:900;margin-bottom:8px;}
.profile-bio{color:var(--text2);margin-bottom:12px;line-height:1.5;}
.profile-rating{display:flex;gap:16px;color:var(--text3);font-size:13px;}
.rating-stars{color:var(--yellow);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark">س</div><div class="sb-logo-text"><div class="sb-logo-name">سفرة برو</div><div class="sb-logo-sub">لوحة المطعم</div></div></div>
  <div class="sb-nav">
    <div class="nav-item" id="nav-profile" onclick="navigate('profile')"><div class="nav-icon">🏠</div>الملف الشخصي</div>
    <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')"><div class="nav-icon">📊</div>لوحة التحكم</div>
    <div class="nav-item" id="nav-orders" onclick="navigate('orders')"><div class="nav-icon">📦</div>الطلبات</div>
    <div class="nav-item" id="nav-categories" onclick="navigate('categories')"><div class="nav-icon">🏷️</div>التصنيفات</div>
    <div class="nav-item" id="nav-products" onclick="navigate('products')"><div class="nav-icon">📋</div>المنتجات</div>
  </div>
  <div class="sb-footer"><div class="sb-user"><div class="sb-avatar">🍽️</div><div><div class="sb-user-name" id="rest-name-side">مطعمي</div></div><a href="/logout" class="sb-logout">⏻</a></div></div>
</div>

<div class="main-wrap">
  <div class="topbar"><div><div class="topbar-title" id="topbar-title">لوحة التحكم</div><div class="topbar-sub">مرحباً بك</div></div></div>
  <div class="content" id="content"></div>
</div>

<div class="modal-overlay" id="modal"><div class="modal"><div class="modal-head"><div class="modal-title" id="modal-title"></div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modal-body"></div><div class="modal-foot" id="modal-foot"></div></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ========== أصوات وإعدادات ==========
async function checkAuth() {
  try {
    const res = await fetch('/api/restaurant/profile', { credentials: 'include' });
    if (res.status === 401) window.location.href = '/login.html';
  } catch(e) { window.location.href = '/login.html'; }
}
checkAuth();

function generateToneWAV(frequency, duration, type = 'sine', volume = 0.3) {
  const sampleRate = 44100;
  const numSamples = Math.floor(sampleRate * duration);
  const buffer = new Float32Array(numSamples);
  for (let i = 0; i < numSamples; i++) {
    const t = i / sampleRate;
    let sample = 0;
    if (type === 'sine') sample = Math.sin(2 * Math.PI * frequency * t);
    else if (type === 'square') sample = Math.sign(Math.sin(2 * Math.PI * frequency * t));
    else if (type === 'triangle') {
      const p = (frequency * t) % 1;
      sample = 4 * Math.abs(p - 0.5) - 1;
    }
    buffer[i] = sample * volume;
  }
  const dataLength = buffer.length * 2;
  const bufferArray = new ArrayBuffer(44 + dataLength);
  const view = new DataView(bufferArray);
  function writeString(offset, string) { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); }
  writeString(0, 'RIFF');
  view.setUint32(4, 36 + dataLength, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, dataLength, true);
  let offset = 44;
  for (let i = 0; i < buffer.length; i++) {
    const s = Math.max(-1, Math.min(1, buffer[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset += 2;
  }
  return URL.createObjectURL(new Blob([bufferArray], { type: 'audio/wav' }));
}
const soundInstances = {};
function createSound(name, ...tones) {
  soundInstances[name] = tones.map(t => new Howl({ src: [t], format: ['wav'], volume: 0.5 }));
}
function playSound(name) {
  if (soundInstances[name]) soundInstances[name].forEach(h => h.play());
}
createSound('newOrderBell', generateToneWAV(1200, 0.25, 'sine'));
createSound('driverArrived', generateToneWAV(600, 0.1, 'sine'), generateToneWAV(800, 0.1, 'sine'));
createSound('orderCancelled', generateToneWAV(400, 0.3, 'triangle'));

// ========== متغيرات عامة ==========
const API = '/api';
let currentPage = 'dashboard';
window._catOptions = '<option value="">بدون تصنيف</option>';
window.myRestaurantId = null;
let categoriesList = [];
let productsList = [];

async function apiFetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    credentials: 'include',
    headers: {
      ...(options.headers || {}),
      ...(typeof options.body === 'string' ? { 'Content-Type': 'application/json' } : {})
    }
  });
  if (res.status === 401) { location.href = '/'; }
  return res;
}
function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1E2535;color:#fff;padding:12px 20px;border-radius:12px;z-index:9999;font-weight:600;';
  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
function openModal(title, bodyHTML, footHTML) {
  document.getElementById('modal-title').innerHTML = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-foot').innerHTML = footHTML || '';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

const STATUS_AR = { PENDING: 'في الانتظار', ACCEPTED: 'مقبول', PREPARING: 'يتحضر', READY: 'جاهز', DRIVER_ASSIGNED: 'مع طيار', ON_THE_WAY: 'في الطريق', DELIVERED: 'تم التوصيل', CANCELLED: 'ملغي' };
function statusBadge(s) { const cl = { PENDING: 'badge-yellow', ACCEPTED: 'badge-blue', PREPARING: 'badge-orange', READY: 'badge-blue', DRIVER_ASSIGNED: 'badge-orange', ON_THE_WAY: 'badge-orange', DELIVERED: 'badge-green', CANCELLED: 'badge-red' }; return `<span class="badge ${cl[s] || 'badge-gray'}">${STATUS_AR[s] || s}</span>`; }

async function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + page).classList.add('active');
  const titles = { profile: 'الملف الشخصي', dashboard: 'لوحة التحكم', orders: 'الطلبات', categories: 'التصنيفات', products: 'المنتجات' };
  document.getElementById('topbar-title').innerHTML = titles[page] || page;
  await renderPage(page);
}
async function renderPage(page) {
  const c = document.getElementById('content');
  c.innerHTML = '<div style="text-align:center;padding:48px">⏳ جاري التحميل...</div>';
  if (page === 'profile') await renderProfile();
  else if (page === 'dashboard') await loadDashboard();
  else if (page === 'orders') await loadOrdersView();
  else if (page === 'categories') await loadCategories();
  else if (page === 'products') await loadProducts();
}

// ========== الملف الشخصي (جديد) ==========
async function renderProfile() {
  const profile = await apiFetch(API + '/restaurant/profile').then(r => r.json()).catch(() => ({ name: 'مطعمي', logo: '' }));
  const stats = await apiFetch(API + '/restaurant/stats').then(r => r.json()).catch(() => ({}));
  window.myRestaurantId = profile.id;
  document.getElementById('rest-name-side').innerHTML = profile.name || 'مطعمي';
  // استرجاع البيانات المحلية للسيرة
  const savedBio = localStorage.getItem('restaurant_bio') || 'مرحباً بكم في مطعمنا، نقدم أشهى المأكولات بجودة عالية.';
  const savedRating = localStorage.getItem('restaurant_rating') || '4.8';
  const savedReviews = localStorage.getItem('restaurant_reviews') || '128';
  const html = `
    <div class="profile-card">
      <img src="${profile.logo || 'https://placehold.co/100x100/FF6B00/white?text=🍽️'}" class="profile-image" id="profileLogo">
      <div class="profile-info">
        <div class="profile-name" id="profileName">${profile.name}</div>
        <div class="profile-bio" id="profileBio">${savedBio}</div>
        <div class="profile-rating"><span class="rating-stars">⭐⭐⭐⭐⭐</span><span>${savedRating} (${savedReviews} تقييم)</span></div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="openEditProfile()">✏️ تعديل</button>
        <button class="btn btn-ghost" onclick="document.getElementById('logoFile').click()">🖼️ تغيير الشعار</button>
        <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="uploadLogo(this)">
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card" onclick="navigate('orders');setOrdersTab('new')"><div class="sc-value">${stats.pending || 0}</div><div class="sc-label">جديدة</div></div>
      <div class="stat-card" onclick="navigate('orders');setOrdersTab('accepted')"><div class="sc-value">${stats.accepted || 0}</div><div class="sc-label">مقبولة</div></div>
      <div class="stat-card" onclick="navigate('orders');setOrdersTab('preparing')"><div class="sc-value">${stats.preparing || 0}</div><div class="sc-label">تحضير</div></div>
      <div class="stat-card"><div class="sc-value">${stats.todayRevenue || 0} ج</div><div class="sc-label">إيرادات اليوم</div></div>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}
function openEditProfile() {
  const name = document.getElementById('profileName')?.innerText || '';
  const bio = document.getElementById('profileBio')?.innerText || '';
  openModal('تعديل الملف الشخصي', `
    <div class="field"><label>اسم المطعم</label><input id="editName" value="${name.replace(/"/g, '&quot;')}"></div>
    <div class="field"><label>الوصف / السيرة</label><textarea id="editBio" rows="3">${bio.replace(/"/g, '&quot;')}</textarea></div>
    <div class="field"><label>التقييم (بالنجوم)</label><input id="editRating" type="number" step="0.1" value="${localStorage.getItem('restaurant_rating') || '4.8'}"></div>
    <div class="field"><label>عدد التقييمات</label><input id="editReviews" type="number" value="${localStorage.getItem('restaurant_reviews') || '128'}"></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="saveProfileEdit()">حفظ</button>`);
}
function saveProfileEdit() {
  const newName = document.getElementById('editName').value;
  const newBio = document.getElementById('editBio').value;
  const newRating = document.getElementById('editRating').value;
  const newReviews = document.getElementById('editReviews').value;
  document.getElementById('profileName').innerText = newName;
  document.getElementById('profileBio').innerText = newBio;
  localStorage.setItem('restaurant_bio', newBio);
  localStorage.setItem('restaurant_rating', newRating);
  localStorage.setItem('restaurant_reviews', newReviews);
  document.querySelector('.profile-rating').innerHTML = `<span class="rating-stars">⭐⭐⭐⭐⭐</span><span>${newRating} (${newReviews} تقييم)</span>`;
  toast('تم تحديث الملف الشخصي');
  closeModal();
}
async function uploadLogo(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData(); fd.append('logo', file);
  const res = await apiFetch(API + '/restaurant/profile', { method: 'PATCH', body: fd });
  const data = await res.json();
  if (data.logo) { document.getElementById('profileLogo').src = data.logo + '?t=' + Date.now(); toast('تم رفع الشعار'); }
  else toast('فشل الرفع', 'error');
}

// ========== لوحة التحكم (الأصلية) ==========
async function loadDashboard() {
  const [profile, stats, reports] = await Promise.all([
    apiFetch(API + '/restaurant/profile').then(r => r.json()).catch(() => ({ name: 'مطعمي', logo: '' })),
    apiFetch(API + '/restaurant/stats').then(r => r.json()).catch(() => ({})),
    apiFetch(API + '/restaurant/reports').then(r => r.json()).catch(() => ({}))
  ]);
  window.myRestaurantId = profile.id;
  document.getElementById('rest-name-side').innerHTML = profile.name || 'مطعمي';
  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" onclick="navigate('orders');setOrdersTab('new')"><div class="sc-value">${stats.pending || 0}</div><div class="sc-label">جديدة</div></div>
      <div class="stat-card" onclick="navigate('orders');setOrdersTab('accepted')"><div class="sc-value">${stats.accepted || 0}</div><div class="sc-label">مقبولة</div></div>
      <div class="stat-card" onclick="navigate('orders');setOrdersTab('preparing')"><div class="sc-value">${stats.preparing || 0}</div><div class="sc-label">تحضير</div></div>
      <div class="stat-card"><div class="sc-value">${stats.todayRevenue || 0} ج</div><div class="sc-label">إيرادات اليوم</div></div>
    </div>
    <div class="section"><div class="sec-head"><div class="sec-title">📈 تقارير الإيرادات</div></div>
      <div style="padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
        <div class="stat-card"><div class="sc-value" style="color:var(--orange)">${reports.daily?.productRevenue || 0} ج</div><div class="sc-label">اليوم</div></div>
        <div class="stat-card"><div class="sc-value" style="color:var(--blue)">${reports.weekly?.productRevenue || 0} ج</div><div class="sc-label">الأسبوع</div></div>
        <div class="stat-card"><div class="sc-value" style="color:var(--green)">${reports.monthly?.productRevenue || 0} ج</div><div class="sc-label">الشهر</div></div>
        <div class="stat-card"><div class="sc-value">${reports.total?.productRevenue || 0} ج</div><div class="sc-label">الإجمالي الكلي</div></div>
      </div>
    </div>`;
}

// ========== الطلبات (الأصلية) ==========
let ordersSelectedDate = new Date().toISOString().slice(0, 10);
let currentOrderTab = 'all';
function setOrdersTab(tab) { currentOrderTab = tab; }
async function loadOrdersView() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="tab-bar">
      <div class="tab-btn ${currentOrderTab==='all'?'active':''}" onclick="switchOrderTab('all')">الكل</div>
      <div class="tab-btn ${currentOrderTab==='new'?'active':''}" onclick="switchOrderTab('new')">جديدة</div>
      <div class="tab-btn ${currentOrderTab==='accepted'?'active':''}" onclick="switchOrderTab('accepted')">مقبولة</div>
      <div class="tab-btn ${currentOrderTab==='preparing'?'active':''}" onclick="switchOrderTab('preparing')">تحضير</div>
      <div class="tab-btn ${currentOrderTab==='completed'?'active':''}" onclick="switchOrderTab('completed')">مكتملة</div>
    </div>
    <div class="filter-bar"><input type="date" id="order-date-input" value="${ordersSelectedDate}" /><button class="btn btn-primary btn-sm" onclick="applyOrderFilter()">عرض</button><button class="btn btn-ghost btn-sm" onclick="setTodayOrders()">اليوم</button><button class="btn btn-ghost btn-sm" onclick="clearOrderFilter()">الكل</button></div>
    <div id="orders-table"></div>
  `;
  await loadOrdersData();
}
function switchOrderTab(tab) { currentOrderTab = tab; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); event?.target?.classList.add('active'); loadOrdersData(); }
function getFilteredOrders(orders) {
  switch(currentOrderTab){
    case 'new': return orders.filter(o=>o.status==='PENDING');
    case 'accepted': return orders.filter(o=>o.status==='ACCEPTED');
    case 'preparing': return orders.filter(o=>o.status==='PREPARING');
    case 'completed': return orders.filter(o=>['DELIVERED','CANCELLED'].includes(o.status));
    default: return orders;
  }
}
function calculateRemainingTime(preparingAt){
  if(!preparingAt) return null;
  const now = new Date(); const start = new Date(preparingAt);
  const elapsed = Math.floor((now-start)/1000);
  const remaining = Math.max(0,25*60 - elapsed);
  return { remaining, minutes: Math.floor(remaining/60), seconds: remaining%60, isOver: remaining<=0 };
}
async function loadOrdersData(){
  const container = document.getElementById('orders-table');
  container.innerHTML = '<div style="text-align:center;padding:32px">⏳ جاري التحميل...</div>';
  let url = API + '/restaurant/orders'; if(ordersSelectedDate) url += '?date='+ordersSelectedDate;
  const res = await apiFetch(url);
  const orders = await res.json();
  const filtered = getFilteredOrders(orders);
  if(!filtered.length){ container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>لا توجد طلبات</div></div>`; return; }
  let html = `<div class="section"><div class="table-wrap"><table><thead><tr><th>#</th><th>العميل</th><th>الهاتف</th><th>الأصناف</th><th>الإجمالي</th><th>الحالة</th><th>الوقت</th><th>إجراء</th></tr></thead><tbody>`;
  filtered.forEach(o => {
    const itemsStr = (o.items||[]).map(i=>`<strong>${i.name}</strong> ×${i.qty||1}`).join('<br>')||'—';
    const productTotal = (o.total||0)-(o.deliveryFee||0);
    let statusHTML = statusBadge(o.status);
    if(o.status==='PREPARING' && o.preparingAt){
      const rem = calculateRemainingTime(o.preparingAt);
      if(rem && !rem.isOver) statusHTML += `<br><span style="color:var(--orange);font-size:11px">⏱ ${String(rem.minutes).padStart(2,'0')}:${String(rem.seconds).padStart(2,'0')}</span>`;
    }
    html += `<tr><td style="color:var(--orange);font-weight:800">#${(o.id||'').slice(-6)}</td><td>${o.customerName||'—'}</td><td><a href="tel:${o.customerPhone}" style="color:var(--orange);text-decoration:none">${o.customerPhone||'—'}</a></td><td style="max-width:200px;white-space:normal">${itemsStr}</td><td style="color:var(--orange)">${productTotal} ج</td><td>${statusHTML}</td><td>${new Date(o.createdAt).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</td><td>${getOrderActions(o)}</td></tr>`;
  });
  html += `</tbody></table></div></div>`;
  container.innerHTML = html;
}
function getOrderActions(o){
  if(o.status==='PENDING') return `<button class="btn btn-success btn-sm" onclick="updateOrderStatus('${o.id}','ACCEPTED')">قبول</button> <button class="btn btn-danger btn-sm" onclick="updateOrderStatus('${o.id}','CANCELLED')">رفض</button>`;
  if(o.status==='ACCEPTED') return `<button class="btn btn-primary btn-sm" onclick="updateOrderStatus('${o.id}','PREPARING')">تحضير</button>`;
  if(o.status==='PREPARING') return `<button class="btn btn-success btn-sm" onclick="updateOrderStatus('${o.id}','READY')">جاهز</button>`;
  return '—';
}
async function updateOrderStatus(id,status){
  await apiFetch(API+'/restaurant/orders/'+id,{method:'PATCH',body:JSON.stringify({status})});
  toast('تم تحديث الحالة');
  loadOrdersData();
}
function applyOrderFilter(){ const inp = document.getElementById('order-date-input'); if(inp) ordersSelectedDate = inp.value; loadOrdersData(); }
function setTodayOrders(){ ordersSelectedDate = new Date().toISOString().slice(0,10); document.getElementById('order-date-input').value = ordersSelectedDate; loadOrdersData(); }
function clearOrderFilter(){ ordersSelectedDate = ''; document.getElementById('order-date-input').value = ''; loadOrdersData(); }

// ========== التصنيفات (الأصلية) ==========
async function loadCategories() {
  const res = await apiFetch(API + '/restaurant/categories');
  const cats = await res.json();
  categoriesList = cats;
  const html = `
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <h2>🏷️ التصنيفات</h2>
      <button class="btn btn-primary" onclick="showAddCategory()">+ إضافة</button>
    </div>
    <div class="section"><div class="table-wrap"><table><thead><tr><th>#</th><th>الاسم</th><th>إجراءات</th></tr></thead><tbody>
      ${cats.map((c,i) => `
        <tr>
          <td>${i+1}</td>
          <td style="font-weight:600;cursor:pointer" onclick="editCategory('${c.id}','${c.name}')">${c.name}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteCategory('${c.id}')">🗑️</button></td>
        </tr>
      `).join('')}
    </tbody></table></div></div>`;
  document.getElementById('content').innerHTML = html;
}
function editCategory(id, currentName) {
  const newName = prompt('الاسم الجديد:', currentName);
  if (!newName || newName === currentName) return;
  apiFetch(API + '/restaurant/categories/' + id, { method: 'PATCH', body: JSON.stringify({ name: newName }) })
    .then(() => { toast('تم التعديل'); loadCategories(); });
}
function showAddCategory() {
  openModal('إضافة تصنيف', `<div class="field"><label>اسم التصنيف</label><input id="cat-name" placeholder="مثال: برجر"></div>`, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="addCategory()">إضافة</button>`);
}
async function addCategory() {
  const name = document.getElementById('cat-name').value.trim();
  if (!name) return toast('أدخل اسماً', 'error');
  await apiFetch(API + '/restaurant/categories', { method: 'POST', body: JSON.stringify({ name }) });
  closeModal(); loadCategories(); toast('تمت الإضافة');
}
async function deleteCategory(id) {
  if (!confirm('حذف التصنيف؟')) return;
  await apiFetch(API + '/restaurant/categories/' + id, { method: 'DELETE' });
  loadCategories(); toast('تم الحذف');
}

// ========== المنتجات (مع تحسين عرض اسم التصنيف وإضافة القوالب السريعة ورفع الصور) ==========
async function loadProducts() {
  await loadCategoriesOptions();
  const prodRes = await apiFetch(API + '/restaurant/products');
  const products = await prodRes.json();
  productsList = products;
  // بناء قاموس اسم التصنيف
  const catMap = {};
  categoriesList.forEach(c => catMap[c.id] = c.name);
  let html = `<div style="display:flex;justify-content:space-between;margin-bottom:16px"><h2>📋 المنتجات</h2><button class="btn btn-primary" onclick="showAddProduct()">+ إضافة منتج</button></div><div class="section"><div class="table-wrap"><table><thead><tr><th>الصورة</th><th>الاسم</th><th>المجموعات</th><th>التصنيف</th><th>متاح</th><th></th></tr></thead><tbody>`;
  products.forEach(p => {
    const groupsStr = (p.groups || []).map(g => `<div style="font-size:11px">${g.name}: ${g.options?.map(o=>`${o.value}(${o.price}ج)`).join(', ')||''}</div>`).join('');
    const catName = catMap[p.category] || p.category || '—';
    html += `<tr>
      <td>${p.image?`<img src="${p.image}" style="width:42px;height:42px;border-radius:8px">`:'—'}</td>
      <td style="font-weight:600">${p.name}</td>
      <td>${groupsStr||'—'}</td>
      <td>${catName}</td>
      <td><span class="badge ${p.isAvailable?'badge-green':'badge-red'}">${p.isAvailable?'متاح':'غير متاح'}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="editProduct('${p.id}')">✏️</button> <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">🗑️</button></td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;
  document.getElementById('content').innerHTML = html;
}
async function loadCategoriesOptions() {
  try {
    const res = await apiFetch(API + '/restaurant/categories');
    const cats = await res.json();
    categoriesList = cats;
    let opts = '<option value="">بدون تصنيف</option>';
    cats.forEach(c => opts += `<option value="${c.id}">${c.name}</option>`);
    window._catOptions = opts;
  } catch(e){}
}
function showAddProduct() {
  const catOptions = window._catOptions;
  openModal('إضافة منتج', `
    <div class="field"><label>اسم المنتج</label><input id="prodName"></div>
    <div class="field"><label>الوصف</label><input id="prodDesc"></div>
    <div class="field"><label>التصنيف</label><select id="prodCat">${catOptions}</select></div>
    <div class="product-type-selector"><div class="type-option selected" data-type="single">🍔 منتج منفرد</div><div class="type-option" data-type="multi">🍕 منتج متعدد (أحجام/خيارات)</div></div>
    <div id="singleFields"><div class="field"><label>السعر الأساسي (ج)</label><input id="basePrice" type="number" value="20"></div></div>
    <div id="multiFields" style="display:none;"><div class="field"><label>سيتم حساب أقل سعر تلقائياً من الخيارات</label></div></div>
    <div class="templates-bar">
      <span>قوالب سريعة:</span>
      <button type="button" class="btn-template" onclick="addQuickGroup('sizes')">📏 أحجام</button>
      <button type="button" class="btn-template" onclick="addQuickGroup('chicken')">🍗 قطع دجاج</button>
      <button type="button" class="btn-template" onclick="addQuickGroup('hotcold')">🌡️ حار/بارد</button>
      <button type="button" class="btn-template" onclick="addQuickGroup('spicy')">🌶️ حرارة</button>
      <button type="button" class="btn-template" onclick="addQuickGroup('extras')">➕ إضافات</button>
    </div>
    <div id="groupsContainer"></div>
    <button type="button" class="btn-add-row" onclick="addGroupRow()">+ إضافة مجموعة مخصصة</button>
    <div class="field" style="margin-top:16px;"><label>صورة المنتج (من جهازك)</label><input type="file" id="prodImageFile" accept="image/*"></div>
    <div class="field"><label>أو رابط صورة (اختياري)</label><input id="prodImageUrl" placeholder="https://..."></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="saveProduct()">حفظ</button>`);
  addGroupRow();
  document.querySelectorAll('.type-option').forEach(opt => {
    opt.onclick = () => {
      document.querySelectorAll('.type-option').forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
      const isSingle = opt.dataset.type === 'single';
      document.getElementById('singleFields').style.display = isSingle ? 'block' : 'none';
      document.getElementById('multiFields').style.display = isSingle ? 'none' : 'block';
    };
  });
}
function addGroupRow(defaultName = '', defaultType = 'single', required = true, defaultOptions = []) {
  const container = document.getElementById('groupsContainer');
  const div = document.createElement('div'); div.className = 'group-box';
  div.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input placeholder="اسم المجموعة" class="grp-name" value="${defaultName.replace(/"/g, '&quot;')}">
      <select class="grp-type"><option value="single" ${defaultType==='single'?'selected':''}>اختيار واحد</option><option value="multiple" ${defaultType==='multiple'?'selected':''}>اختيار متعدد</option></select>
      <label><input type="checkbox" class="grp-required" ${required?'checked':''}> إجباري</label>
      <button type="button" class="btn-danger btn-sm" onclick="this.closest('.group-box').remove()">✕</button>
    </div>
    <div class="grp-options"></div>
    <button type="button" class="btn-add-row" onclick="addOptionToGroup(this)">+ إضافة خيار</button>
  `;
  container.appendChild(div);
  const optsDiv = div.querySelector('.grp-options');
  if(defaultOptions.length){
    defaultOptions.forEach(opt=>{
      const row = document.createElement('div'); row.className = 'option-row';
      row.innerHTML = `<input placeholder="القيمة" value="${opt.value.replace(/"/g,'&quot;')}" class="opt-value"><input placeholder="السعر" type="number" value="${opt.price}" class="opt-price"><button type="button" class="btn-ghost btn-sm" onclick="this.parentElement.remove()">✕</button>`;
      optsDiv.appendChild(row);
    });
  } else {
    addOptionToGroup(div.querySelector('.btn-add-row'));
  }
}
function addOptionToGroup(btn) {
  const groupBox = btn.closest('.group-box');
  const container = groupBox.querySelector('.grp-options');
  const row = document.createElement('div'); row.className = 'option-row';
  row.innerHTML = `<input placeholder="القيمة" class="opt-value"><input placeholder="السعر" type="number" value="0" class="opt-price"><button type="button" class="btn-ghost btn-sm" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(row);
}
function collectGroupsData() {
  const groups = [];
  document.querySelectorAll('#groupsContainer .group-box').forEach(box => {
    const name = box.querySelector('.grp-name')?.value.trim();
    if(!name) return;
    const type = box.querySelector('.grp-type')?.value;
    const required = box.querySelector('.grp-required')?.checked || false;
    const options = [];
    box.querySelectorAll('.option-row').forEach(row => {
      const val = row.querySelector('.opt-value')?.value.trim();
      const price = parseFloat(row.querySelector('.opt-price')?.value) || 0;
      if(val) options.push({ value: val, price });
    });
    if(options.length) groups.push({ name, type, required, options });
  });
  return groups;
}
function computeMinPriceFromGroups(groups) {
  let min = Infinity;
  groups.forEach(g => g.options.forEach(opt => { if(opt.price < min) min = opt.price; }));
  return min === Infinity ? 0 : min;
}
async function saveProduct() {
  const name = document.getElementById('prodName').value.trim();
  if(!name) return toast('اسم المنتج مطلوب','error');
  const type = document.querySelector('.type-option.selected').dataset.type;
  const category = document.getElementById('prodCat').value;
  const description = document.getElementById('prodDesc').value;
  let basePrice = 0;
  const groups = collectGroupsData();
  if(type === 'single'){
    basePrice = parseFloat(document.getElementById('basePrice').value) || 0;
  } else {
    basePrice = computeMinPriceFromGroups(groups);
  }
  const formData = new FormData();
  formData.append('name', name);
  formData.append('description', description);
  formData.append('basePrice', basePrice);
  formData.append('category', category);
  formData.append('groups', JSON.stringify(groups));
  const imageFile = document.getElementById('prodImageFile').files[0];
  if(imageFile) formData.append('image', imageFile);
  else {
    const imgUrl = document.getElementById('prodImageUrl').value;
    if(imgUrl) formData.append('image', imgUrl);
  }
  const res = await apiFetch(API + '/restaurant/products', { method: 'POST', body: formData });
  if(res && res.ok) { toast('تم إضافة المنتج'); closeModal(); loadProducts(); }
  else toast('حدث خطأ', 'error');
}
function addQuickGroup(templateKey) {
  const templates = {
    sizes: { name: 'الأحجام', type: 'single', required: true, options: [{ value: 'صغير', price: 0 }, { value: 'وسط', price: 5 }, { value: 'كبير', price: 10 }] },
    chicken: { name: 'عدد القطع', type: 'single', required: true, options: [{ value: '5 قطع', price: 35 }, { value: '8 قطع', price: 55 }, { value: '12 قطعة', price: 75 }] },
    hotcold: { name: 'درجة الحرارة', type: 'single', required: false, options: [{ value: 'عادي', price: 0 }, { value: 'حار', price: 0 }] },
    spicy: { name: 'مستوى الحرارة', type: 'single', required: false, options: [{ value: 'عادي', price: 0 }, { value: 'وسط', price: 0 }, { value: 'حار', price: 2 }] },
    extras: { name: 'إضافات', type: 'multiple', required: false, options: [{ value: 'ثومية', price: 2 }, { value: 'مخلل', price: 1.5 }, { value: 'عيش بر', price: 3 }, { value: 'بطاطس', price: 5 }] }
  };
  const tpl = templates[templateKey];
  if(tpl) addGroupRow(tpl.name, tpl.type, tpl.required, tpl.options);
}
async function editProduct(id) {
  const p = productsList.find(x => x.id === id);
  if(!p) return toast('المنتج غير موجود','error');
  const catOptions = window._catOptions;
  openModal('تعديل منتج', `
    <div class="field"><label>الاسم</label><input id="eName" value="${p.name.replace(/"/g,'&quot;')}"></div>
    <div class="field"><label>الوصف</label><input id="eDesc" value="${(p.description||'').replace(/"/g,'&quot;')}"></div>
    <div class="field"><label>التصنيف</label><select id="eCat">${catOptions}</select></div>
    <div class="field"><label>صورة جديدة</label><input type="file" id="eImage"></div>
    <div class="field"><label>متاح</label><select id="eAvail"><option ${p.isAvailable?'selected':''} value="true">نعم</option><option ${!p.isAvailable?'selected':''} value="false">لا</option></select></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="saveEditProduct('${id}')">حفظ</button>`);
  setTimeout(()=>{ document.getElementById('eCat').value = p.category || ''; },50);
}
async function saveEditProduct(id) {
  const name = document.getElementById('eName').value;
  const desc = document.getElementById('eDesc').value;
  const category = document.getElementById('eCat').value;
  const isAvailable = document.getElementById('eAvail').value === 'true';
  const formData = new FormData();
  formData.append('name', name);
  formData.append('description', desc);
  formData.append('category', category);
  formData.append('isAvailable', isAvailable);
  const imgFile = document.getElementById('eImage').files[0];
  if(imgFile) formData.append('image', imgFile);
  const res = await apiFetch(API + '/restaurant/products/' + id, { method: 'PATCH', body: formData });
  if(res && res.ok) { toast('تم التحديث'); closeModal(); loadProducts(); }
  else toast('حدث خطأ','error');
}
async function deleteProduct(id) {
  if(!confirm('حذف المنتج؟')) return;
  await apiFetch(API + '/restaurant/products/' + id, { method: 'DELETE' });
  loadProducts(); toast('تم الحذف');
}
