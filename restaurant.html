<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drako Restaurant Dashboard Concept</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Cairo,sans-serif}
body{background:#f5f7fb}
.sidebar{
position:fixed;right:0;top:0;width:280px;height:100vh;
background:linear-gradient(180deg,#111827,#1f2937);
color:#fff;padding:24px
}
.logo{
background:linear-gradient(135deg,#ff3b30,#ff6b61);
padding:18px;border-radius:20px;text-align:center;
font-size:28px;font-weight:900;margin-bottom:25px
}
.menu div{
padding:14px 16px;margin-bottom:8px;border-radius:14px;
background:rgba(255,255,255,.05)
}
.menu .active{background:#ff3b30}
.main{margin-right:280px;padding:25px}
.hero{
background:linear-gradient(135deg,#ff3b30,#ff6b61);
color:#fff;padding:30px;border-radius:28px;
display:flex;justify-content:space-between;align-items:center
}
.hero h1{font-size:34px}
.cards{
display:grid;grid-template-columns:repeat(4,1fr);
gap:18px;margin-top:24px
}
.card{
background:#fff;border-radius:24px;padding:22px;
box-shadow:0 10px 30px rgba(0,0,0,.08)
}
.num{font-size:34px;font-weight:900;color:#ff3b30}
.orders{
margin-top:25px;background:#fff;padding:25px;
border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)
}
.order{
display:flex;justify-content:space-between;
padding:16px;border-bottom:1px solid #eee
}
.badge{
background:#fff1f0;color:#ff3b30;
padding:6px 12px;border-radius:999px
}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">DRAKO</div>
<div class="menu">
<div class="active">📊 لوحة التحكم</div>
<div>📦 الطلبات</div>
<div>🍔 المنتجات</div>
<div>🏷 التصنيفات</div>
<div>📈 التقارير</div>
<div>⚙ الإعدادات</div>
</div>
</div>

<div class="main">
<div class="hero">
<div>
<h1>مرحباً بمطعم الشام</h1>
<p>إدارة الطلبات والإيرادات من مكان واحد</p>
</div>
<div style="font-size:70px">🍔</div>
</div>

<div class="cards">
<div class="card"><div>طلبات جديدة</div><div class="num">25</div></div>
<div class="card"><div>قيد التحضير</div><div class="num">11</div></div>
<div class="card"><div>إيرادات اليوم</div><div class="num">4,850</div></div>
<div class="card"><div>تقييم المطعم</div><div class="num">4.9</div></div>
</div>

<div class="orders">
<h2>أحدث الطلبات</h2>
<div class="order"><span>#1052 أحمد محمد</span><span class="badge">جديد</span></div>
<div class="order"><span>#1051 محمد علي</span><span class="badge">تحضير</span></div>
<div class="order"><span>#1050 محمود حامد</span><span class="badge">جاهز</span></div>
</div>
</div>
</body>
</html>
