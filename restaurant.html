<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>سفرة — لوحة مطعم احترافية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0C0E13; --surface:#141822; --surface2:#1B2130; --surface3:#232B3E;
  --border:#2A3448; --gold:#F5B042; --gold2:#FFC857;
  --gold-glow:rgba(245,176,66,.18); --gold-dim:rgba(245,176,66,.08);
  --text:#F2F4F8; --text2:#9AA2B9; --text3:#5C6A8A;
  --green:#2DD4BF; --blue:#3B82F6; --red:#F97373; --purple:#A855F7;
  --radius:16px; --radius-lg:24px;
  --shadow:0 12px 30px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow:hidden;}

/* custom scroll */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* sidebar */
.sidebar{ width:270px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto; backdrop-filter:blur(4px);}
.sb-logo{padding:22px 18px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.sb-logo-mark{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#0C0E13;box-shadow:0 6px 14px var(--gold-glow);}
.sb-logo-text{display:flex;flex-direction:column;}
.sb-logo-name{font-size:20px;font-weight:900;letter-spacing:-0.3px;}
.sb-nav{flex:1;padding:14px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:14px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text2);transition:all 0.2s ease;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--gold-dim);color:var(--gold);border-right:3px solid var(--gold);}
.nav-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--surface2);}
.nav-item.active .nav-icon{background:rgba(245,176,66,.15);}
.sb-footer{padding:12px 12px 20px;border-top:1px solid var(--border);margin-top:auto;}

/* main */
.main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:68px;background:rgba(20,24,34,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;flex-shrink:0;justify-content:space-between;}
.topbar-left .topbar-title{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent;}
.topbar-sub{font-size:12px;color:var(--text3);}
.content{flex:1;overflow-y:auto;padding:28px;}

/* cards & profile hero */
.profile-hero{background:linear-gradient(125deg, var(--surface) 0%, var(--surface2) 100%);border-radius:var(--radius-lg);border:1px solid var(--border);padding:28px;margin-bottom:32px;box-shadow:var(--shadow);display:flex;flex-wrap:wrap;gap:28px;align-items:center;position:relative;overflow:hidden;}
.profile-hero::before{content:"🍽️";position:absolute;font-size:180px;opacity:0.03;bottom:-20px;left:-20px;pointer-events:none;}
.profile-avatar{flex-shrink:0;}
.avatar-frame{width:130px;height:130px;border-radius:30px;background:linear-gradient(145deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;padding:4px;}
.rest-logo-img{width:120px;height:120px;border-radius:26px;object-fit:cover;background:var(--surface3);border:2px solid rgba(255,255,255,0.1);}
.profile-info{flex:2;min-width:220px;}
.rest-name{font-size:32px;font-weight:900;letter-spacing:-1px;background:linear-gradient(to left, #FFF8E7, var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px;}
.rest-bio{color:var(--text2);margin-bottom:16px;line-height:1.45;max-width:500px;}
.rest-stats{display:flex;gap:24px;flex-wrap:wrap;margin-top:8px;}
.star-rating{display:flex;align-items:center;gap:8px;background:var(--surface3);padding:5px 14px;border-radius:60px;}
.star-rating span{font-weight:800;color:var(--gold);font-size:18px;}
.review-count{color:var(--text3);font-size:13px;}
.rating-number{font-weight:800;font-size:18px;color:var(--text);}
.profile-actions{display:flex;gap:12px;margin-left:auto;align-items:center;}
.btn-edit-profile{background:var(--gold-dim);border:1px solid rgba(245,176,66,0.4);color:var(--gold);padding:10px 22px;border-radius:40px;font-weight:700;font-size:14px;cursor:pointer;transition:0.2s;}
.btn-edit-profile:hover{background:var(--gold);color:#0C0E13;border-color:var(--gold);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(180px,1fr));gap:18px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;transition:all 0.2s;}
.stat-card:hover{transform:translateY(-3px);border-color:rgba(245,176,66,0.5);}
.sc-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--surface2);margin-bottom:12px;}
.sc-value{font-size:28px;font-weight:900;}
.sc-label{font-size:13px;color:var(--text3);margin-top:6px;}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:24px;overflow:hidden;}
.sec-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sec-title{font-weight:800;font-size:16px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:40px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;}
.btn-primary{background:var(--gold);color:#0C0E13;}
.btn-primary:hover{background:var(--gold2);transform:scale(0.97);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface3);color:var(--text);}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:40px;font-size:12px;font-weight:700;}
.badge-gold{background:var(--gold-dim);color:var(--gold);}
.badge-green{background:rgba(45,212,191,0.12);color:var(--green);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:12px 16px;text-align:right;border-bottom:1px solid var(--border);font-size:13px;}
th{color:var(--text3);font-weight:700;background:var(--surface2);}
tbody tr:hover{background:rgba(245,176,66,0.05);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:28px;width:100%;max-width:520px;overflow:hidden;}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-weight:800;font-size:18px;}
.modal-close{background:var(--surface2);border:none;width:32px;height:32px;border-radius:40px;cursor:pointer;color:var(--text2);}
.modal-body{padding:22px;max-height:60vh;overflow-y:auto;}
.field{margin-bottom:16px;display:flex;flex-direction:column;gap:6px;}
.field label{font-size:13px;font-weight:700;color:var(--text3);}
.field input,.field textarea,.field select{background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;font-family:'Cairo';}
.field input:focus{border-color:var(--gold);}
.modal-foot{display:flex;gap:12px;padding:16px 22px;border-top:1px solid var(--border);}
.filter-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.tab-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{padding:6px 16px;border-radius:40px;font-size:13px;font-weight:600;background:var(--surface2);color:var(--text2);cursor:pointer;border:1px solid var(--border);transition:0.2s;}
.tab-btn.active{background:var(--gold);color:#0C0E13;border-color:var(--gold);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">س</div>
    <div class="sb-logo-text"><div class="sb-logo-name">سفرة</div><div class="sb-logo-sub" style="font-size:11px;color:var(--text3)">لوحة المطعم</div></div>
  </div>
  <div class="sb-nav">
    <div class="nav-item active" data-nav="dashboard"><div class="nav-icon">🏠</div>الملف الشخصي</div>
    <div class="nav-item" data-nav="stats"><div class="nav-icon">📊</div>الإحصائيات</div>
    <div class="nav-item" data-nav="orders"><div class="nav-icon">📦</div>الطلبات</div>
    <div class="nav-item" data-nav="products"><div class="nav-icon">🍔</div>قائمة الطعام</div>
  </div>
  <div class="sb-footer">
    <div class="sb-user" style="display:flex;gap:8px;align-items:center;background:var(--surface2);padding:10px;border-radius:18px;">
      <div style="width:32px;height:32px;background:var(--gold-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;">👨‍🍳</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700;" id="side-rest-name">مطعم النخبة</div><div style="font-size:10px;color:var(--text3)">مدير</div></div>
      <div style="font-size:16px;">⚙️</div>
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-left"><div class="topbar-title" id="page-headline">الملف الشخصي للمطعم</div><div class="topbar-sub">لوحة تحكم متكاملة</div></div>
    <div style="display:flex;gap:8px;"><span style="background:var(--surface2);padding:6px 12px;border-radius:40px;font-size:12px;">🌟 نسخة ذهبية</span></div>
  </div>
  <div class="content" id="app-content"></div>
</div>

<div class="modal-overlay" id="globalModal"><div class="modal"><div class="modal-head"><span class="modal-title" id="modalTitle"></span><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modalBody"></div><div class="modal-foot" id="modalFooter"></div></div></div>

<script>
// ------------------ MOCK API but fully functional as standalone dashboard with localstorage persistence ------------------
let restaurantData = {
  id: "rest_101",
  name: "مطعم أريكة الذهب",
  bio: "أشهى المأكولات الشرقية والغربية، جودة عالية وأسعار مناسبة. نقدم لكم تجربة فريدة مع أفضل الطهاة. خدمة سريعة وبيئة عائلية. 🥘🍕",
  logo: "https://placehold.co/400x400/FFB347/0C0E13?text=🍽️&font=playfair",
  rating: 4.7,
  reviewsCount: 1289,
  stats: { pendingOrders: 7, accepted: 4, preparing: 5, revenueToday: 2475, totalProducts: 24 }
};

let products = [
  { id: "p1", name: "شاورما دجاج", price: 18, category: "ساندويشات", isAvailable: true, description: "دجاج طازج + صلصة خاصة", image: "https://placehold.co/100x100/FFB347/white?text=🍗" },
  { id: "p2", name: "بيتزا مشكلة", price: 45, category: "بيتزا", isAvailable: true, description: "جبنة + زيتون + فلفل", image: "https://placehold.co/100x100/FFB347/white?text=🍕" },
  { id: "p3", name: "برجر كريسبي", price: 32, category: "برجر", isAvailable: true, description: "برجر لحم أنجوس", image: "https://placehold.co/100x100/FFB347/white?text=🍔" }
];

let ordersList = [
  { id: "ord_001", customerName: "أحمد محمود", customerPhone: "0561234567", total: 86, status: "PENDING", createdAt: new Date().toISOString(), items: [{ name: "بيتزا مشكلة", qty: 1, price: 45 }] },
  { id: "ord_002", customerName: "سارة خالد", customerPhone: "0529876543", total: 50, status: "PREPARING", createdAt: new Date(Date.now() - 3600000).toISOString(), items: [{ name: "برجر كريسبي", qty: 1, price: 32 }, { name: "شاورما", qty: 1, price: 18 }], preparingAt: new Date(Date.now() - 200000).toISOString() },
  { id: "ord_003", customerName: "ماجد العتيبي", customerPhone: "0591122334", total: 120, status: "ACCEPTED", createdAt: new Date().toISOString(), items: [{ name: "بيتزا عائلية", qty: 1, price: 120 }] }
];

// Load from localStorage if exists
function loadPersisted() {
  const savedRest = localStorage.getItem("restaurantProfile");
  if (savedRest) { try{ Object.assign(restaurantData, JSON.parse(savedRest)); }catch(e){} }
  const savedProducts = localStorage.getItem("restaurantProducts");
  if(savedProducts) products = JSON.parse(savedProducts);
  const savedOrders = localStorage.getItem("restaurantOrders");
  if(savedOrders) ordersList = JSON.parse(savedOrders);
  document.getElementById("side-rest-name").innerText = restaurantData.name;
}
loadPersisted();
function persistAll() { localStorage.setItem("restaurantProfile", JSON.stringify(restaurantData)); localStorage.setItem("restaurantProducts", JSON.stringify(products)); localStorage.setItem("restaurantOrders", JSON.stringify(ordersList)); }

// Helper functions
function closeModal() { document.getElementById("globalModal").classList.remove("open"); document.getElementById("globalModal").style.display = "none"; }
function openModal(title, bodyHTML, footerHTML) {
  const modalDiv = document.getElementById("globalModal");
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalBody").innerHTML = bodyHTML;
  document.getElementById("modalFooter").innerHTML = footerHTML || `<button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>`;
  modalDiv.style.display = "flex";
  modalDiv.classList.add("open");
}
function toast(msg, type="success"){ const t=document.createElement('div'); t.innerText=(type==='success'?'✅ ':'⚠️ ')+msg; t.style.cssText='position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:#1E293B;color:#F5B042;padding:12px 22px;border-radius:60px;z-index:9999;font-weight:600;backdrop-filter:blur(8px);border:1px solid #F5B042;'; document.body.appendChild(t); setTimeout(()=>t.remove(),2700);}

// navigation
const navItems = document.querySelectorAll(".nav-item");
let currentSection = "dashboard";
function setActiveNav(section){
  navItems.forEach(i=>i.classList.remove("active"));
  document.querySelector(`.nav-item[data-nav="${section}"]`).classList.add("active");
}
function renderPage(section){
  currentSection = section;
  setActiveNav(section);
  const headlineMap = { dashboard:"الملف الشخصي للمطعم", stats:"الإحصائيات والتقارير", orders:"إدارة الطلبات", products:"قائمة الطعام والمينيوم" };
  document.getElementById("page-headline").innerHTML = headlineMap[section] || "لوحة التحكم";
  if(section === "dashboard") renderDashboard();
  else if(section === "stats") renderStats();
  else if(section === "orders") renderOrders();
  else if(section === "products") renderProducts();
}
async function renderDashboard(){
  const html = `
    <div class="profile-hero">
      <div class="profile-avatar">
        <div class="avatar-frame"><img src="${restaurantData.logo}" class="rest-logo-img" id="restaurant-logo-img" alt="شعار"></div>
      </div>
      <div class="profile-info">
        <div class="rest-name" id="rest-name-display">${escapeHtml(restaurantData.name)}</div>
        <div class="rest-bio" id="rest-bio-display">${escapeHtml(restaurantData.bio)}</div>
        <div class="rest-stats">
          <div class="star-rating"><span>⭐ ${restaurantData.rating}</span> <div class="review-count">(${restaurantData.reviewsCount} تقييم)</div></div>
          <div class="star-rating"><span>📋</span> <div>${products.length} صنف</div></div>
        </div>
      </div>
      <div class="profile-actions">
        <button class="btn-edit-profile" id="editProfileBtn">✏️ تعديل الملف الشخصي</button>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="sc-icon">📦</div><div class="sc-value">${restaurantData.stats.pendingOrders}</div><div class="sc-label">طلبات معلقة</div></div>
      <div class="stat-card"><div class="sc-icon">👨‍🍳</div><div class="sc-value">${restaurantData.stats.preparing}</div><div class="sc-label">قيد التحضير</div></div>
      <div class="stat-card"><div class="sc-icon">💰</div><div class="sc-value">${restaurantData.stats.revenueToday} ج</div><div class="sc-label">إيرادات اليوم</div></div>
      <div class="stat-card"><div class="sc-icon">⭐</div><div class="sc-value">${restaurantData.rating}</div><div class="sc-label">التقييم العام</div></div>
    </div>
    <div class="section"><div class="sec-head"><div class="sec-title">🌟 نبذة عن المطعم</div></div><div style="padding:20px; line-height:1.6; color:var(--text2);">${escapeHtml(restaurantData.bio)}</div></div>
    <div class="section"><div class="sec-head"><div class="sec-title">🗣️ آراء العملاء</div><div><span class="badge badge-gold">⭐ ${restaurantData.rating} (${restaurantData.reviewsCount} مراجعة)</span></div></div><div style="padding:20px;"><div style="display:flex; gap:12px; align-items:center; background:var(--surface2); border-radius:20px; padding:14px;"><span style="font-size:32px;">😍</span> <div>“أفضل مطعم في المنطقة، جودة وسرعة في التوصيل” — <strong>أحمد س.</strong></div></div><div style="margin-top:12px;display:flex;gap:12px;"><span>⭐⭐⭐⭐⭐</span><span style="color:var(--text3)"> 5 نجوم من 1289 تقييمًا</span></div></div></div>
  `;
  document.getElementById("app-content").innerHTML = html;
  document.getElementById("editProfileBtn")?.addEventListener("click", showEditProfileModal);
}
function showEditProfileModal(){
  openModal("✏️ تحرير الملف الشخصي", `
    <div class="field"><label>اسم المطعم</label><input id="edit-name" value="${escapeHtml(restaurantData.name)}"></div>
    <div class="field"><label>نبذة تعريفية / سيرة المطعم</label><textarea id="edit-bio" rows="3">${escapeHtml(restaurantData.bio)}</textarea></div>
    <div class="field"><label>رابط الشعار (URL)</label><input id="edit-logo-url" value="${restaurantData.logo}"></div>
    <div class="field"><label>التقييم (مثلاً 4.7)</label><input id="edit-rating" type="number" step="0.1" value="${restaurantData.rating}"></div>
    <div class="field"><label>عدد التقييمات</label><input id="edit-reviews" type="number" value="${restaurantData.reviewsCount}"></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" id="saveProfileBtn">💾 حفظ الملف الشخصي</button>`);
  setTimeout(()=>{
    document.getElementById("saveProfileBtn")?.addEventListener("click",()=>{
      const newName = document.getElementById("edit-name").value.trim();
      const newBio = document.getElementById("edit-bio").value.trim();
      const newLogo = document.getElementById("edit-logo-url").value.trim();
      const newRating = parseFloat(document.getElementById("edit-rating").value);
      const newReviews = parseInt(document.getElementById("edit-reviews").value);
      if(newName) restaurantData.name = newName;
      if(newBio) restaurantData.bio = newBio;
      if(newLogo) restaurantData.logo = newLogo;
      if(!isNaN(newRating)) restaurantData.rating = newRating;
      if(!isNaN(newReviews)) restaurantData.reviewsCount = newReviews;
      persistAll();
      document.getElementById("side-rest-name").innerText = restaurantData.name;
      closeModal();
      renderPage("dashboard");
      toast("تم تحديث الملف الشخصي للمطعم!");
    });
  },50);
}
function renderStats(){
  const totalRevenueToday = ordersList.filter(o=>new Date(o.createdAt).toDateString() === new Date().toDateString()).reduce((sum,o)=>sum+o.total,0);
  const totalOrders = ordersList.length;
  const completed = ordersList.filter(o=>o.status==="DELIVERED").length;
  const avgRating = restaurantData.rating;
  const html = `<div class="stats-grid"><div class="stat-card"><div class="sc-icon">📅</div><div class="sc-value">${totalRevenueToday} ج</div><div class="sc-label">إيرادات اليوم</div></div>
  <div class="stat-card"><div class="sc-icon">📦</div><div class="sc-value">${totalOrders}</div><div class="sc-label">إجمالي الطلبات</div></div>
  <div class="stat-card"><div class="sc-icon">✅</div><div class="sc-value">${completed}</div><div class="sc-label">مكتملة</div></div>
  <div class="stat-card"><div class="sc-icon">⭐</div><div class="sc-value">${avgRating}</div><div class="sc-label">تقييم عام</div></div></div>
  <div class="section"><div class="sec-head"><div class="sec-title">📊 تفاصيل إضافية</div></div><div style="padding:20px;"><ul style="list-style:none"><li>🍽️ أطباق متوفرة: ${products.length}</li><li>📞 طلبات معلقة: ${restaurantData.stats.pendingOrders}</li><li>🏅 شعبية المطعم: ${restaurantData.reviewsCount} تقييم</li></ul></div></div>`;
  document.getElementById("app-content").innerHTML = html;
}
function renderOrders(){
  let filterStatus = "ALL";
  const generateTable = () => {
    let filtered = filterStatus === "ALL" ? ordersList : ordersList.filter(o=>o.status === filterStatus);
    let rows = filtered.map(o => `<tr><td>${o.id.slice(-6)}</td><td>${o.customerName}</td><td>${o.customerPhone}</td><td>${o.items.map(i=>i.name).join(", ")}</td><td>${o.total} ج</td><td><span class="badge badge-gold">${statusText(o.status)}</span></td><td>${new Date(o.createdAt).toLocaleTimeString()}</td><td>${orderActions(o)}</td></tr>`).join("");
    return `<div class="tab-bar"><div class="tab-btn ${filterStatus==='ALL'?'active':''}" data-filter="ALL">الكل</div><div class="tab-btn ${filterStatus==='PENDING'?'active':''}" data-filter="PENDING">جديدة</div><div class="tab-btn ${filterStatus==='PREPARING'?'active':''}" data-filter="PREPARING">تحضير</div><div class="tab-btn ${filterStatus==='ACCEPTED'?'active':''}" data-filter="ACCEPTED">مقبولة</div></div><div class="section"><div class="table-wrap"><table><thead><tr><th>رقم</th><th>العميل</th><th>هاتف</th><th>الأصناف</th><th>المجموع</th><th>الحالة</th><th>الوقت</th><th>إجراء</th></tr></thead><tbody>${rows||'<tr><td colspan="8" style="text-align:center">لا توجد طلبات</td></tr>'}</tbody></table></div></div>`;
  };
  const html = generateTable();
  document.getElementById("app-content").innerHTML = html;
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click",(e)=>{
      filterStatus = btn.getAttribute("data-filter");
      renderOrders();
    });
  });
}
function statusText(st){ const map={PENDING:"🕒 معلق", ACCEPTED:"✅ مقبول", PREPARING:"🔥 تحضير", DELIVERED:"🚚 مُسلّم"}; return map[st]||st; }
function orderActions(o){
  if(o.status==="PENDING") return `<button class="btn btn-primary btn-sm" onclick="updateOrderStatus('${o.id}','ACCEPTED')">قبول</button> <button class="btn btn-ghost btn-sm" onclick="updateOrderStatus('${o.id}','CANCELLED')">رفض</button>`;
  if(o.status==="ACCEPTED") return `<button class="btn btn-primary btn-sm" onclick="updateOrderStatus('${o.id}','PREPARING')">بدء التحضير</button>`;
  if(o.status==="PREPARING") return `<button class="btn btn-success btn-sm" onclick="updateOrderStatus('${o.id}','DELIVERED')">تسليم</button>`;
  return "—";
}
window.updateOrderStatus = function(id,newStatus){
  const order = ordersList.find(o=>o.id===id);
  if(order){ order.status = newStatus; if(newStatus==="PREPARING") order.preparingAt = new Date().toISOString(); persistAll(); renderPage("orders"); toast(`تم تحديث الحالة إلى ${newStatus}`); }
}
function renderProducts(){
  let html = `<div style="display:flex; justify-content:space-between; margin-bottom:18px;"><h2>🍽️ قائمة الطعام</h2><button class="btn btn-primary" id="addNewProductBtn">+ إضافة طبق جديد</button></div><div class="section"><div class="table-wrap"><table><thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>التصنيف</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>`;
  products.forEach(p=>{ html+=`<tr><td><img src="${p.image}" width="45" height="45" style="border-radius:12px;"></td><td><strong>${p.name}</strong><br><span style="font-size:11px;color:var(--text3)">${p.description||''}</span></td><td>${p.price} ج</td><td>${p.category}</td><td><span class="badge ${p.isAvailable ? 'badge-green' : 'badge-gold'}">${p.isAvailable ? "متاح" : "غير متاح"}</span></td><td><button class="btn btn-ghost btn-sm" onclick="editProductItem('${p.id}')">تعديل</button> <button class="btn btn-ghost btn-sm" onclick="deleteProductItem('${p.id}')">حذف</button></td></tr>`; });
  html+=`</tbody></table></div></div>`;
  document.getElementById("app-content").innerHTML = html;
  document.getElementById("addNewProductBtn")?.addEventListener("click",showAddProductModal);
}
function showAddProductModal(){
  openModal("➕ إضافة منتج جديد", `<div class="field"><label>اسم المنتج</label><input id="prodName"></div><div class="field"><label>السعر (ج)</label><input id="prodPrice" type="number" value="0"></div><div class="field"><label>التصنيف</label><input id="prodCat" placeholder="مثل: برجر، مشروبات"></div><div class="field"><label>وصف سريع</label><textarea id="prodDesc" rows="2"></textarea></div><div class="field"><label>رابط صورة</label><input id="prodImg" placeholder="https://..."></div>`, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" id="confirmAddProduct">إضافة المنتج</button>`);
  setTimeout(()=>{ document.getElementById("confirmAddProduct")?.addEventListener("click",()=>{ const newP={ id:"p"+Date.now(), name:document.getElementById("prodName").value, price:parseFloat(document.getElementById("prodPrice").value)||0, category:document.getElementById("prodCat").value, description:document.getElementById("prodDesc").value, isAvailable:true, image:document.getElementById("prodImg").value||"https://placehold.co/100x100/FFB347/white?text=🍽️"}; if(newP.name){ products.push(newP); persistAll(); toast("تمت الإضافة"); closeModal(); renderProducts(); } else toast("أدخل اسم المنتج","error"); }); },50);
}
window.editProductItem=(id)=>{
  const prod = products.find(p=>p.id===id);
  if(!prod) return;
  openModal("✏️ تعديل المنتج", `<div class="field"><label>الاسم</label><input id="epName" value="${prod.name}"></div><div class="field"><label>السعر</label><input id="epPrice" type="number" value="${prod.price}"></div><div class="field"><label>التصنيف</label><input id="epCat" value="${prod.category}"></div><div class="field"><label>الوصف</label><textarea id="epDesc">${prod.description||''}</textarea></div><div class="field"><label>الصورة URL</label><input id="epImg" value="${prod.image}"></div><div class="field"><label>متاح؟</label><select id="epAvail"><option ${prod.isAvailable?"selected":""} value="true">متاح</option><option ${!prod.isAvailable?"selected":""} value="false">غير متاح</option></select></div>`, `<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" id="saveProductEdit">حفظ التعديلات</button>`);
  setTimeout(()=>{ document.getElementById("saveProductEdit")?.addEventListener("click",()=>{ prod.name=document.getElementById("epName").value; prod.price=parseFloat(document.getElementById("epPrice").value); prod.category=document.getElementById("epCat").value; prod.description=document.getElementById("epDesc").value; prod.image=document.getElementById("epImg").value; prod.isAvailable=document.getElementById("epAvail").value==="true"; persistAll(); closeModal(); renderProducts(); toast("تم التحديث"); }); },50);
}
window.deleteProductItem=(id)=>{ if(confirm("حذف هذا المنتج نهائياً؟")){ products=products.filter(p=>p.id!==id); persistAll(); renderProducts(); toast("تم الحذف"); } }
function escapeHtml(str){ return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
navItems.forEach(item=>{ item.addEventListener("click", ()=>renderPage(item.getAttribute("data-nav"))); });
renderPage("dashboard");
</script>
</body>
</html>
