<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Drako - Food Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      background: #F7F7F7; max-width: 430px; margin: auto; height: 100vh; overflow: hidden;
      position: relative;
    }
    /* Brand Colors */
    :root {
      --brand: #E8180E;
      --brand-dark: #B80F09;
      --bg: #F7F7F7;
      --card: #FFFFFF;
      --text-muted: #7A7A7A;
      --border: #EBEBEB;
    }
    /* Auth Screens */
    .auth-wrapper { width: 100%; height: 100%; position: relative; overflow: hidden; background: var(--bg); }
    .auth-screen { position: absolute; inset: 0; overflow-y: auto; transition: transform 0.4s ease, opacity 0.4s; }
    .auth-screen.hidden-right { transform: translateX(-100%); opacity: 0; pointer-events: none; }
    .auth-screen.hidden-left { transform: translateX(100%); opacity: 0; pointer-events: none; }
    .auth-screen.visible { transform: translateX(0); opacity: 1; }
    .login-hero { position: relative; height: 310px; background: var(--brand); overflow: hidden; }
    .hero-circles span { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.06); }
    .hero-circles span:nth-child(1) { width: 280px; height: 280px; top: -80px; right: -60px; }
    .hero-circles span:nth-child(2) { width: 180px; height: 180px; bottom: -40px; left: -40px; background: rgba(0,0,0,0.08); }
    .hero-logo-wrap { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    .logo-icon { width: 80px; height: 80px; margin-bottom: 14px; animation: logoPop 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes logoPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .hero-logo-wrap h1 { font-size: 42px; font-weight: 900; color: #fff; }
    .hero-logo-wrap p { font-size: 13px; color: rgba(255,255,255,0.75); letter-spacing: 3px; }
    .login-wave { position: absolute; bottom: -2px; left: 0; right: 0; }
    .login-body { background: var(--bg); padding: 28px 24px 40px; }
    .field-group { margin-bottom: 16px; }
    .field-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; display: block; }
    .field-wrap { position: relative; }
    .field-icon { position: absolute; top: 50%; right: 16px; transform: translateY(-50%); font-size: 20px; color: var(--text-muted); }
    .field-wrap input { width: 100%; height: 54px; background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 0 48px 0 16px; outline: none; font-size: 15px; }
    .field-wrap input:focus { border-color: var(--brand); }
    .password-toggle { position: absolute; top: 50%; left: 16px; transform: translateY(-50%); background: none; border: none; cursor: pointer; }
    .btn-primary { width: 100%; height: 56px; background: var(--brand); border: none; border-radius: 12px; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn-ghost { width: 100%; height: 52px; background: transparent; border: 1.5px solid var(--brand); border-radius: 12px; color: var(--brand); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .reg-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--border); }
    .back-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .progress-bar-wrap { height: 3px; background: var(--border); }
    .progress-bar-fill { height: 100%; background: var(--brand); width: 50%; transition: width 0.4s; }
    .reg-body { padding: 24px 20px; }
    .reg-step { display: none; }
    .reg-step.active { display: block; }
    .step-badge { display: inline-flex; background: rgba(232,24,14,0.08); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--brand); margin-bottom: 16px; }
    .step-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
    .step-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A1A1A; color: #fff; padding: 12px 24px; border-radius: 100px; z-index: 9999; transition: 0.35s; opacity: 0; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    /* Main App */
    .main-app-wrapper { display: none; flex-direction: column; height: 100%; }
    .main-app-wrapper.active { display: flex; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 18px 16px; background: rgba(255,255,255,0.92); backdrop-filter: blur(14px); position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; z-index: 100; height: 70px; }
    .main-content { flex: 1; overflow-y: auto; padding: 16px; margin-top: 70px; margin-bottom: 70px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .logo-main { font-size: 26px; font-weight: 900; background: linear-gradient(135deg,#FF6B00,#ff9f5a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .icon-btn { width: 40px; height: 40px; border-radius: 12px; border: none; background: #F5F5F5; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
    .badge { position: absolute; top: -4px; left: -4px; width: 18px; height: 18px; border-radius: 50%; background: #FF6B00; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; }
    .restaurant-card { background: white; border-radius: 22px; padding: 14px; display: flex; gap: 14px; margin-bottom: 16px; align-items: center; box-shadow: 0 8px 24px rgba(0,0,0,0.06); cursor: pointer; }
    .restaurant-card img { width: 110px; height: 110px; border-radius: 18px; object-fit: cover; }
    .btn { background: linear-gradient(135deg,#FF6B00,#ff8a33); color: white; border-radius: 14px; height: 52px; width: 100%; border: none; font-weight: bold; cursor: pointer; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(255,255,255,0.94); backdrop-filter: blur(16px); display: flex; justify-content: space-around; padding: 8px 0; z-index: 999; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: #999; cursor: pointer; }
    .nav-item.active { color: #FF6B00; }
    .cart-item { background: white; border-radius: 14px; padding: 12px; display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
    .qty-box { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; }
    .qty-plus { background: #FF6B00; color: white; }
    .summary { background: white; border-radius: 16px; padding: 16px; margin-top: 18px; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1100; display: none; align-items: flex-end; justify-content: center; }
    .sheet-overlay.open { display: flex; }
    .sheet-box { background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 430px; max-height: 80vh; overflow-y: auto; padding: 20px; }
    .product-card { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid #eee; align-items: center; }
    .plus-btn { width: 36px; height: 36px; border-radius: 50%; background: #FF6B00; color: white; font-size: 22px; border: none; cursor: pointer; }
  </style>
</head>
<body>

<div class="auth-wrapper" id="authWrapper">
  <!-- Login Screen -->
  <div id="loginScreen" class="auth-screen visible">
    <div class="login-hero">
      <div class="hero-circles"><span></span><span></span></div>
      <div class="hero-logo-wrap">
        <svg class="logo-icon" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="rgba(255,255,255,0.15)"/><path d="M22 35 L52 20 Q82 20 82 38 Q82 55 60 55 L45 55 L45 58 L62 80 L38 80 L22 58 Z" fill="white"/><path d="M38 42 L58 42 Q66 42 66 50 Q66 58 58 58 L38 58 Z" fill="#E8180E"/></svg>
        <h1>Drako</h1>
        <p>FOOD DELIVERY</p>
      </div>
      <svg class="login-wave" viewBox="0 0 430 38" height="38"><path d="M0 38 C80 0 180 20 260 10 C330 2 390 28 430 18 L430 38 Z" fill="#F7F7F7"/></svg>
    </div>
    <div class="login-body">
      <h2>أهلاً بك! 👋</h2>
      <p class="subtitle" style="color:var(--text-muted);margin-bottom:28px;">سجّل دخولك لتبدأ طلباتك</p>
      <div class="field-group"><label class="field-label">رقم الهاتف</label><div class="field-wrap"><span class="field-icon">📱</span><input type="tel" id="loginPhone" placeholder="01xxxxxxxxx" /></div></div>
      <div class="field-group"><label class="field-label">كلمة المرور</label><div class="field-wrap"><span class="field-icon">🔒</span><input type="password" id="loginPass" placeholder="••••••••" /><button class="password-toggle" onclick="togglePass('loginPass')" type="button">👁️</button></div></div>
      <button class="btn-primary" onclick="customerLogin()">دخول</button>
      <div class="divider"><span>أو</span></div>
      <button class="btn-ghost" onclick="goToRegister()">إنشاء حساب جديد</button>
    </div>
  </div>

  <!-- Register Screen -->
  <div id="registerScreen" class="auth-screen hidden-left">
    <div class="reg-header"><button class="back-btn" onclick="goToLogin()">←</button><div><h2>إنشاء حساب</h2><p id="stepSubtitle" style="font-size:12px;color:var(--text-muted);">الخطوة 1 من 2</p></div></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="reg-body">
      <div class="reg-step active" id="step1">
        <div class="step-badge">✨ الخطوة الأولى</div>
        <h2 class="step-title">من أنت؟</h2>
        <p class="step-desc">نحتاج بياناتك الأساسية</p>
        <div class="field-group"><label class="field-label">الاسم</label><div class="field-wrap"><span class="field-icon">👤</span><input type="text" id="regName" placeholder="اسمك الكامل" /></div></div>
        <div class="field-group"><label class="field-label">رقم الهاتف</label><div class="field-wrap"><span class="field-icon">📱</span><input type="tel" id="regPhone" placeholder="01xxxxxxxxx" /></div></div>
        <div class="field-group"><label class="field-label">كلمة المرور</label><div class="field-wrap"><span class="field-icon">🔒</span><input type="password" id="regPass" placeholder="6 أحرف على الأقل" /><button class="password-toggle" onclick="togglePass('regPass')">👁️</button></div></div>
        <div class="field-group"><label class="field-label">تأكيد كلمة المرور</label><div class="field-wrap"><span class="field-icon">🔐</span><input type="password" id="regPassConfirm" placeholder="أعد كتابة كلمة المرور" /></div></div>
        <button class="btn-primary" onclick="goStep2()">التالي ←</button>
      </div>
      <div class="reg-step" id="step2">
        <div class="step-badge">📍 الخطوة الثانية</div>
        <h2 class="step-title">عنوانك</h2>
        <p class="step-desc">اختر منطقتك وعنوانك</p>
        <div class="field-group"><label class="field-label">المنطقة</label><div class="field-wrap"><select id="regRegion" style="width:100%;height:54px;border-radius:12px;border:1.5px solid var(--border);padding:0 16px;"></select></div></div>
        <div class="field-group"><label class="field-label">العنوان التفصيلي</label><div class="field-wrap"><span class="field-icon">🏠</span><input type="text" id="regAddress" placeholder="شارع، عمارة، شقة" /></div></div>
        <button class="btn-primary" onclick="customerRegister()">إنشاء الحساب 🎉</button>
      </div>
    </div>
  </div>
</div>

<div class="main-app-wrapper" id="mainAppWrapper">
  <div class="header"><div class="logo-main">Drako</div><button class="icon-btn" onclick="showScreen('cartScreen')">🛒<span class="badge" id="cartBadge">0</span></button></div>
  <div class="main-content">
    <section class="screen active" id="homeScreen"><div style="background:linear-gradient(135deg,#FF6B00,#ff9a4d);padding:20px;border-radius:24px;color:white;margin-bottom:20px;"><div style="font-size:24px;font-weight:900;">اطلب أكلك المفضل 🚀</div></div><div id="restaurantsContainer"></div></section>
    <section class="screen" id="cartScreen"><div id="cartItems"></div><div class="summary"><div class="summary-row"><span>الإجمالي</span><span id="totalAmount">0 ج</span></div></div><button class="btn" onclick="checkout()">إتمام الطلب</button></section>
    <section class="screen" id="ordersScreen"><div id="ordersList"></div></section>
    <section class="screen" id="accountScreen"><div id="accountInfo"></div></section>
  </div>
  <div class="bottom-nav"><div class="nav-item active" onclick="showScreen('homeScreen')">🏠 الرئيسية</div><div class="nav-item" onclick="showScreen('cartScreen')">🛒 السلة</div><div class="nav-item" onclick="showScreen('ordersScreen')">📦 طلباتي</div><div class="nav-item" onclick="showScreen('accountScreen')">👤 حسابي</div></div>
</div>
<div class="sheet-overlay" id="productSheet"><div class="sheet-box"><button onclick="closeSheet()" style="float:left;background:none;border:none;font-size:20px;">✕</button><div id="sheetContent"></div></div></div>
<div class="toast" id="toast"></div>

<script>
// ========== HELPERS ==========
function showToast(msg) { let t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
function togglePass(id) { let inp = document.getElementById(id); inp.type = inp.type === 'password' ? 'text' : 'password'; }

// ========== AUTH ==========
let currentUser = null;
let allRegions = [];

async function loadRegions() {
  try { let res = await fetch('/api/regions'); allRegions = await res.json(); } catch(e) { allRegions = [{id:'reg1',name:'مساكن جمصة',fee:10},{id:'reg2',name:'15 مايو',fee:15}]; }
  let sel = document.getElementById('regRegion');
  if(sel) sel.innerHTML = '<option value="">اختر منطقتك</option>' + allRegions.map(r => `<option value="${r.id}">${r.name} - ${r.fee} ج</option>`).join('');
}

function goToRegister() { document.getElementById('loginScreen').classList.replace('visible','hidden-right'); document.getElementById('registerScreen').classList.replace('hidden-left','visible'); loadRegions(); }
function goToLogin() { document.getElementById('registerScreen').classList.replace('visible','hidden-left'); document.getElementById('loginScreen').classList.replace('hidden-right','visible'); }
function goStep2() { let name=document.getElementById('regName').value.trim(), phone=document.getElementById('regPhone').value.trim(), pass=document.getElementById('regPass').value, pass2=document.getElementById('regPassConfirm').value; if(!name) return showToast('⚠️ اكتب اسمك'); if(phone.length<11) return showToast('⚠️ رقم هاتف غير صحيح'); if(pass.length<6) return showToast('⚠️ كلمة المرور قصيرة'); if(pass!==pass2) return showToast('❌ كلمتا المرور غير متطابقتين'); document.getElementById('step1').classList.remove('active'); document.getElementById('step2').classList.add('active'); document.getElementById('progressBar').style.width='100%'; }

async function customerLogin() {
  let phone = document.getElementById('loginPhone').value.trim(), password = document.getElementById('loginPass').value;
  if(!phone||!password) return showToast('⚠️ أكمل الحقول');
  try {
    let res = await fetch('/api/customer/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone,password}) });
    let data = await res.json();
    if(data.error) return showToast('❌ '+data.error);
    currentUser = data;
    localStorage.setItem('drako_user',JSON.stringify(currentUser));
    document.getElementById('authWrapper').style.display='none';
    document.getElementById('mainAppWrapper').classList.add('active');
    showToast('✅ مرحباً '+data.name);
    loadRestaurants(); loadOrders();
  } catch(e) { showToast('❌ فشل الاتصال'); }
}

async function customerRegister() {
  let name=document.getElementById('regName').value.trim(), phone=document.getElementById('regPhone').value.trim(), password=document.getElementById('regPass').value, regionId=document.getElementById('regRegion').value, address=document.getElementById('regAddress').value.trim();
  if(!regionId) return showToast('⚠️ اختر المنطقة');
  if(!address) return showToast('⚠️ اكتب العنوان');
  try {
    let res = await fetch('/api/customer/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,phone,password,regionId,address}) });
    let data = await res.json();
    if(data.error) return showToast('❌ '+data.error);
    currentUser = data;
    localStorage.setItem('drako_user',JSON.stringify(currentUser));
    document.getElementById('authWrapper').style.display='none';
    document.getElementById('mainAppWrapper').classList.add('active');
    showToast('🎉 تم إنشاء حسابك');
    loadRestaurants(); loadOrders();
  } catch(e) { showToast('❌ فشل الاتصال'); }
}

function logout() { currentUser=null; localStorage.removeItem('drako_user'); document.getElementById('mainAppWrapper').classList.remove('active'); document.getElementById('authWrapper').style.display='block'; goToLogin(); }

// ========== MAIN APP ==========
let restaurants = [], cart = JSON.parse(localStorage.getItem('drako_cart')) || [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach((n,i)=>{ if((id==='homeScreen'&&i===0)||(id==='cartScreen'&&i===1)||(id==='ordersScreen'&&i===2)||(id==='accountScreen'&&i===3)) n.classList.add('active'); else n.classList.remove('active'); });
  if(id==='accountScreen') document.getElementById('accountInfo').innerHTML = currentUser ? `<div style="text-align:center;"><div style="font-size:20px;">${currentUser.name}</div><div>📱 ${currentUser.phone}</div><div>🏠 ${currentUser.address||'—'}</div><button class="btn" style="margin-top:20px;" onclick="logout()">تسجيل الخروج</button></div>` : '<button class="btn" onclick="location.reload()">تسجيل الدخول</button>';
}

async function loadRestaurants() {
  try { let res = await fetch('/api/restaurants'); restaurants = await res.json(); renderRestaurants(); } catch(e){}
}
function renderRestaurants() {
  let container = document.getElementById('restaurantsContainer');
  if(!restaurants.length) { container.innerHTML='<div class="empty">لا توجد مطاعم</div>'; return; }
  container.innerHTML = restaurants.map(r => `<div class="restaurant-card" onclick="openRestaurant('${r.id}')"><img src="${r.logo||'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200'}"><div><h3>${r.name}</h3><button class="btn" style="margin-top:8px;padding:8px 16px;height:auto;width:auto;" onclick="event.stopPropagation();openRestaurant('${r.id}')">عرض المنيو</button></div></div>`).join('');
}

let currentRestaurant = null, currentProducts = [];
async function openRestaurant(id) {
  currentRestaurant = restaurants.find(r=>r.id===id);
  try { let res = await fetch('/api/restaurants/'+id+'/menu'); currentProducts = await res.json(); showProducts(); showScreen('restaurantScreen'); } catch(e){}
}
function showProducts() {
  let container = document.getElementById('productsContainer');
  if(!container) { let div = document.createElement('div'); div.id='productsContainer'; document.getElementById('restaurantScreen')?.appendChild(div); }
  document.getElementById('productsContainer').innerHTML = currentProducts.map(p => `<div class="product-card"><img src="${p.image||'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500'}" width="70"><div><h4>${p.name}</h4><div>${p.basePrice||p.price||0} ج</div></div><button class="plus-btn" onclick='addToCart(${JSON.stringify(p).replace(/'/g,"\\'")})'>+</button></div>`).join('');
}
function addToCart(product) {
  let existing = cart.find(i=>i.productId===product.id);
  if(existing) existing.quantity++;
  else cart.push({productId:product.id, name:product.name, price:product.basePrice||product.price||0, image:product.image, quantity:1});
  saveCart(); showToast('✅ تمت الإضافة');
}
function saveCart() { localStorage.setItem('drako_cart',JSON.stringify(cart)); document.getElementById('cartBadge').innerText = cart.reduce((a,b)=>a+b.quantity,0); renderCart(); }
function renderCart() {
  let container = document.getElementById('cartItems');
  if(!cart.length) { container.innerHTML='<div class="empty">السلة فارغة</div>'; document.getElementById('totalAmount').innerText='0 ج'; return; }
  container.innerHTML = cart.map((item,i)=>`<div class="cart-item"><img src="${item.image||'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500'}" width="60"><div><h4>${item.name}</h4><div>${item.price} ج</div><div class="qty-box"><button class="qty-btn" onclick="updateQty(${i},-1)">-</button><span>${item.quantity}</span><button class="qty-btn qty-plus" onclick="updateQty(${i},1)">+</button></div></div><button class="icon-btn" onclick="removeItem(${i})">🗑</button></div>`).join('');
  let total = cart.reduce((a,b)=>a+(b.price*b.quantity),0);
  document.getElementById('totalAmount').innerText = total+' ج';
}
function updateQty(i,delta) { let newQty = cart[i].quantity+delta; if(newQty<=0) cart.splice(i,1); else cart[i].quantity=newQty; saveCart(); renderCart(); }
function removeItem(i) { cart.splice(i,1); saveCart(); renderCart(); }

async function checkout() {
  if(!cart.length) return showToast('⚠️ السلة فارغة');
  if(!currentUser) return showToast('⚠️ يجب تسجيل الدخول');
  let total = cart.reduce((a,b)=>a+(b.price*b.quantity),0);
  let orderData = { restaurantId: currentRestaurant?.id, items: cart.map(i=>({productId:i.productId,name:i.name,price:i.price,quantity:i.quantity})), total, customerName:currentUser.name, customerPhone:currentUser.phone, address:currentUser.address||'', paymentMethod:'CASH', deliveryFee:10 };
  try {
    let res = await fetch('/api/orders', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(orderData) });
    let data = await res.json();
    if(data.error) return showToast('❌ '+data.error);
    cart = []; saveCart(); renderCart();
    showToast('✅ تم إرسال الطلب بنجاح');
    loadOrders();
    showScreen('ordersScreen');
  } catch(e){ showToast('❌ فشل'); }
}

async function loadOrders() {
  if(!currentUser) return;
  try {
    let res = await fetch('/api/orders?customerPhone='+currentUser.phone);
    let orders = await res.json();
    document.getElementById('ordersList').innerHTML = orders.length ? orders.map(o=>`<div class="cart-item"><div><h4>طلب #${o.id.slice(-6)}</h4><div>${o.total} ج</div><div>الحالة: ${o.status}</div></div></div>`).join('') : '<div class="empty">لا توجد طلبات</div>';
  } catch(e){}
}

// ========== INIT ==========
if(localStorage.getItem('drako_user')) { currentUser = JSON.parse(localStorage.getItem('drako_user')); document.getElementById('authWrapper').style.display='none'; document.getElementById('mainAppWrapper').classList.add('active'); loadRestaurants(); loadOrders(); renderCart(); showScreen('homeScreen'); }
else { document.getElementById('authWrapper').style.display='block'; loadRegions(); }
</script>
</body>
