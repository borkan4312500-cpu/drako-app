<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>دراكو - لوحة الماركت</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      background: #0D0F14;
      color: #F0F2F8;
      overflow-x: hidden;
    }
    .header {
      background: #161B24;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2A3348;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #FF6B00, #FF8C3A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-actions {
      display: flex;
      gap: 15px;
    }
    .icon-btn {
      background: #1E2535;
      border: none;
      color: #8B95A8;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      transition: 0.2s;
    }
    .icon-btn:hover {
      background: #FF6B00;
      color: white;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    .stats-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #161B24;
      border: 1px solid #2A3348;
      border-radius: 16px;
      padding: 20px;
      flex: 1;
      min-width: 150px;
    }
    .stat-title {
      color: #8B95A8;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: #FF6B00;
    }
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
    }
    .order-card {
      background: #161B24;
      border: 1px solid #2A3348;
      border-radius: 20px;
      overflow: hidden;
      transition: 0.2s;
    }
    .order-card:hover {
      border-color: #FF6B00;
      transform: translateY(-3px);
    }
    .order-header {
      background: #1E2535;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2A3348;
    }
    .order-id {
      font-weight: 700;
      color: #FF6B00;
    }
    .order-status {
      background: rgba(255,107,0,0.15);
      color: #FF6B00;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 12px;
    }
    .order-body {
      padding: 20px;
    }
    .customer-info {
      background: #1E2535;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 15px;
    }
    .customer-name {
      font-weight: 700;
      margin-bottom: 5px;
    }
    .customer-phone, .customer-address {
      font-size: 12px;
      color: #8B95A8;
    }
    .products-title {
      font-size: 14px;
      font-weight: 700;
      margin: 15px 0 10px;
    }
    .product-item {
      background: #1E2535;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
    }
    .product-info {
      flex: 1;
    }
    .product-name {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .product-details {
      font-size: 12px;
      color: #8B95A8;
    }
    .product-actions {
      display: flex;
      gap: 8px;
    }
    .edit-product, .delete-product {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 6px;
      border-radius: 8px;
      transition: 0.2s;
    }
    .edit-product {
      color: #3B82F6;
    }
    .edit-product:hover {
      background: #3B82F620;
    }
    .delete-product {
      color: #F05252;
    }
    .delete-product:hover {
      background: #F0525220;
    }
    .add-product-btn {
      background: #1E2535;
      border: 1px dashed #FF6B00;
      color: #FF6B00;
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      margin: 10px 0;
      cursor: pointer;
      transition: 0.2s;
    }
    .add-product-btn:hover {
      background: #FF6B0010;
    }
    .order-footer {
      padding: 15px 20px;
      border-top: 1px solid #2A3348;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-amount {
      font-size: 18px;
      font-weight: 800;
    }
    .total-amount span {
      color: #FF6B00;
    }
    .invoice-section {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }
    .invoice-input {
      flex: 1;
      background: #1E2535;
      border: 1px solid #2A3348;
      border-radius: 12px;
      padding: 10px;
      color: white;
    }
    .btn {
      background: #FF6B00;
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover {
      background: #FF8C3A;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #FF6B00;
      color: #FF6B00;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #161B24;
      border: 1px solid #2A3348;
      border-radius: 20px;
      width: 90%;
      max-width: 450px;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }
    .close-modal {
      background: none;
      border: none;
      color: #8B95A8;
      font-size: 20px;
      cursor: pointer;
    }
    .field {
      margin-bottom: 15px;
    }
    .field label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
      color: #8B95A8;
    }
    .field input, .field textarea {
      width: 100%;
      background: #1E2535;
      border: 1px solid #2A3348;
      border-radius: 10px;
      padding: 10px;
      color: white;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1E2535;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      z-index: 1100;
      transition: 0.3s;
      opacity: 0;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">دراكو - لوحة الماركت</div>
  <div class="header-actions">
    <button class="icon-btn" onclick="refreshOrders()"><i class="fas fa-sync-alt"></i></button>
    <button class="icon-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
  </div>
</div>
<div class="container">
  <div class="stats-row" id="statsContainer"></div>
  <div class="orders-grid" id="ordersContainer"></div>
</div>

<div class="modal" id="productModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">تعديل المنتج</div>
      <button class="close-modal" onclick="closeProductModal()">✕</button>
    </div>
    <div class="field">
      <label>اسم المنتج</label>
      <input type="text" id="productName">
    </div>
    <div class="field">
      <label>سعر الوحدة (ج)</label>
      <input type="number" id="productPrice">
    </div>
    <div class="field">
      <label>الكمية</label>
      <input type="number" id="productQuantity" min="1">
    </div>
    <div class="field">
      <label>ملاحظات</label>
      <textarea id="productNotes" rows="2"></textarea>
    </div>
    <button class="btn" onclick="saveProductChanges()" style="width:100%">حفظ التغييرات</button>
  </div>
</div>

<div class="toast" id="toast">تم الحفظ</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ========== Global ==========
  let currentOrderId = null;
  let currentProductIndex = null;
  let ordersData = [];

  const API = '/api';
  let currentUser = JSON.parse(localStorage.getItem('drako_user')) || null;
  if (!currentUser) window.location.href = '/login.html';

  // ========== Helper ==========
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = isError ? '#F05252' : '#1E2535';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  async function apiFetch(url, options = {}) {
    const res = await fetch(url, { ...options, credentials: 'include', headers: { ...(options.headers||{}), 'Content-Type': options.body instanceof FormData ? undefined : 'application/json' } });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  // ========== Load Orders ==========
  async function loadOrders() {
    try {
      const orders = await apiFetch(API + '/market/orders');
      ordersData = orders;
      renderStats(orders);
      renderOrders(orders);
    } catch(e) {
      console.error(e);
      showToast('فشل تحميل الطلبات', true);
    }
  }

  function renderStats(orders) {
    const pending = orders.filter(o => o.status === 'PENDING').length;
    const accepted = orders.filter(o => o.status === 'ACCEPTED').length;
    const ready = orders.filter(o => o.status === 'READY').length;
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card"><div class="stat-title">طلبات جديدة</div><div class="stat-value">${pending}</div></div>
      <div class="stat-card"><div class="stat-title">قيد التحضير</div><div class="stat-value">${accepted}</div></div>
      <div class="stat-card"><div class="stat-title">جاهزة للتوصيل</div><div class="stat-value">${ready}</div></div>
      <div class="stat-card"><div class="stat-title">إجمالي اليوم</div><div class="stat-value">${orders.length}</div></div>
    `;
  }

  function renderOrders(orders) {
    const container = document.getElementById('ordersContainer');
    if (!orders.length) {
      container.innerHTML = '<div style="text-align:center;padding:50px">لا توجد طلبات حالياً</div>';
      return;
    }
    container.innerHTML = orders.map(order => `
      <div class="order-card" data-order-id="${order.id}">
        <div class="order-header">
          <div class="order-id">طلب #${order.id.slice(-8)}</div>
          <div class="order-status">${getStatusText(order.status)}</div>
        </div>
        <div class="order-body">
          <div class="customer-info">
            <div class="customer-name">${order.customerName}</div>
            <div class="customer-phone">${order.customerPhone}</div>
            <div class="customer-address">📍 ${order.address || '—'}</div>
          </div>
          <div class="products-title">المنتجات المطلوبة</div>
          <div id="products-list-${order.id}">
            ${renderProducts(order.items, order.id)}
          </div>
          <button class="add-product-btn" onclick="addProductToOrder('${order.id}')">+ إضافة منتج جديد للطلب</button>
          ${order.status === 'PENDING' || order.status === 'ACCEPTED' ? `
            <div class="invoice-section">
              <input type="number" id="invoice-${order.id}" placeholder="قيمة الفاتورة الفعلية (ج)" class="invoice-input">
              <button class="btn btn-outline" onclick="setInvoice('${order.id}')">تحديد الفاتورة</button>
            </div>
          ` : ''}
          ${order.invoiceAmount ? `<div class="invoice-section">💰 قيمة الفاتورة: ${order.invoiceAmount} ج</div>` : ''}
        </div>
        <div class="order-footer">
          <div class="total-amount">الإجمالي: <span>${order.total} ج</span></div>
          ${order.status === 'PENDING' ? `<button class="btn" onclick="acceptOrder('${order.id}')">قبول الطلب</button>` : ''}
          ${order.status === 'ACCEPTED' ? `<button class="btn" onclick="markReady('${order.id}')">تجهيز الطلب</button>` : ''}
          ${order.status === 'READY' ? '<span class="order-status">جاهز للتوصيل</span>' : ''}
        </div>
      </div>
    `).join('');
  }

  function renderProducts(items, orderId) {
    if (!items || !items.length) return '<div style="color:#8B95A8">لا توجد منتجات</div>';
    return items.map((item, idx) => `
      <div class="product-item" data-order="${orderId}" data-index="${idx}">
        <div class="product-info">
          <div class="product-name">${item.name}</div>
          <div class="product-details">${item.quantity} × ${item.price} ج | ${item.notes ? '📝 '+item.notes : ''}</div>
        </div>
        <div class="product-actions">
          <button class="edit-product" onclick="editProduct('${orderId}', ${idx})"><i class="fas fa-edit"></i></button>
          <button class="delete-product" onclick="deleteProduct('${orderId}', ${idx})"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
    `).join('');
  }

  // ========== Edit / Delete / Add Products ==========
  function editProduct(orderId, idx) {
    const order = ordersData.find(o => o.id === orderId);
    if (!order) return;
    const product = order.items[idx];
    if (!product) return;
    currentOrderId = orderId;
    currentProductIndex = idx;
    document.getElementById('modalTitle').innerText = 'تعديل المنتج';
    document.getElementById('productName').value = product.name;
    document.getElementById('productPrice').value = product.price;
    document.getElementById('productQuantity').value = product.quantity;
    document.getElementById('productNotes').value = product.notes || '';
    document.getElementById('productModal').classList.add('active');
  }

  function deleteProduct(orderId, idx) {
    if (confirm('هل تريد حذف هذا المنتج من الطلب؟')) {
      updateOrderProducts(orderId, (items) => {
        items.splice(idx, 1);
        return items;
      });
    }
  }

  function addProductToOrder(orderId) {
    currentOrderId = orderId;
    currentProductIndex = -1; // new product
    document.getElementById('modalTitle').innerText = 'إضافة منتج جديد';
    document.getElementById('productName').value = '';
    document.getElementById('productPrice').value = '';
    document.getElementById('productQuantity').value = 1;
    document.getElementById('productNotes').value = '';
    document.getElementById('productModal').classList.add('active');
  }

  async function saveProductChanges() {
    const name = document.getElementById('productName').value.trim();
    const price = parseFloat(document.getElementById('productPrice').value);
    const quantity = parseInt(document.getElementById('productQuantity').value);
    const notes = document.getElementById('productNotes').value;

    if (!name || isNaN(price) || price <= 0 || isNaN(quantity) || quantity < 1) {
      showToast('البيانات غير صحيحة', true);
      return;
    }

    const newProduct = { productId: null, name, price, quantity, notes };
    if (currentProductIndex === -1) {
      // إضافة
      await updateOrderProducts(currentOrderId, (items) => [...items, newProduct]);
    } else {
      // تعديل
      await updateOrderProducts(currentOrderId, (items) => {
        items[currentProductIndex] = newProduct;
        return items;
      });
    }
    closeProductModal();
  }

  async function updateOrderProducts(orderId, updateFn) {
    try {
      const order = ordersData.find(o => o.id === orderId);
      if (!order) throw new Error('Order not found');
      const newItems = updateFn([...order.items]);
      const newTotal = newItems.reduce((sum, p) => sum + (p.price * p.quantity), 0) + (order.deliveryFee || 0);
      // send update to server
      await apiFetch(API + '/market/orders/' + orderId + '/items', {
        method: 'PATCH',
        body: JSON.stringify({ items: newItems, total: newTotal })
      });
      // refresh local data
      order.items = newItems;
      order.total = newTotal;
      refreshOrderUI(orderId);
      showToast('تم تحديث الطلب بنجاح');
    } catch(e) {
      showToast('فشل التحديث', true);
      console.error(e);
    }
  }

  function refreshOrderUI(orderId) {
    const order = ordersData.find(o => o.id === orderId);
    if (!order) return;
    const container = document.getElementById(`products-list-${orderId}`);
    if (container) {
      container.innerHTML = renderProducts(order.items, orderId);
    }
    // تحديث الإجمالي في الواجهة
    const orderCard = document.querySelector(`.order-card[data-order-id="${orderId}"]`);
    if (orderCard) {
      const totalSpan = orderCard.querySelector('.total-amount span');
      if (totalSpan) totalSpan.innerText = order.total + ' ج';
    }
  }

  // ========== Order Actions ==========
  async function acceptOrder(orderId) {
    await apiFetch(API + '/market/orders/' + orderId + '/accept', { method: 'PATCH' });
    showToast('تم قبول الطلب');
    loadOrders();
  }

  async function setInvoice(orderId) {
    const invoiceAmount = parseFloat(document.getElementById(`invoice-${orderId}`).value);
    if (isNaN(invoiceAmount) || invoiceAmount <= 0) {
      showToast('أدخل قيمة الفاتورة الصحيحة', true);
      return;
    }
    await apiFetch(API + '/market/orders/' + orderId + '/invoice', { method: 'PATCH', body: JSON.stringify({ invoiceAmount }) });
    showToast('تم تحديث الفاتورة');
    loadOrders();
  }

  async function markReady(orderId) {
    await apiFetch(API + '/market/orders/' + orderId + '/ready', { method: 'PATCH' });
    showToast('تم تجهيز الطلب، في انتظار الطيار');
    loadOrders();
  }

  function getStatusText(status) {
    const map = { PENDING: 'جديد', ACCEPTED: 'قيد التحضير', READY: 'جاهز', DELIVERED: 'تم التوصيل', CANCELLED: 'ملغي' };
    return map[status] || status;
  }

  function closeProductModal() {
    document.getElementById('productModal').classList.remove('active');
  }

  function refreshOrders() {
    loadOrders();
  }

  function logout() {
    localStorage.removeItem('drako_user');
    window.location.href = '/login.html';
  }

  // Socket realtime updates
  const socket = io();
  socket.on('orderStatusUpdate', (data) => {
    if (data.orderId) loadOrders();
  });
  socket.on('newSpecialOrder', () => loadOrders());

  loadOrders();
</script>
</body>
</html>
